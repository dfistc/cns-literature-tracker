name: Update literature and deploy Pages

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC is 08:00 in Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip PubMed refresh and deploy the committed site"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - "site/**"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: literature-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ !inputs.deploy_only }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch PubMed records
        if: ${{ !inputs.deploy_only }}
        run: python scripts/update_literature.py --retmax 220 --tpd-retmax 1000

      - name: Translate new or changed records
        if: ${{ !inputs.deploy_only }}
        run: python scripts/translate_literature.py --workers 4

      - name: Generate static website
        if: ${{ !inputs.deploy_only }}
        run: python scripts/generate_static_site.py

      - name: Validate literature data and website
        if: ${{ !inputs.deploy_only }}
        run: python scripts/validate_literature.py

      - name: Commit refreshed data
        if: ${{ !inputs.deploy_only }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/literature.json site/index.html site/.nojekyll "文献库网页.html"
          if ! git diff --cached --quiet; then
            git commit -m "Update literature data [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
