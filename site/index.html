-ATPase-AMPK pathway by LCA reproduces the benefits of calorie restriction.", "summaryZh": "石胆酸 (LCA) 在哺乳动物热量限制期间积累，它可以激活 AMP 激活蛋白激酶 (AMPK) 以延缓衰老 1 。然而，LCA 如何激活 AMPK 并诱导这些生物效应的分子细节尚不清楚。在这里，我们发现 LCA 增强了 Sirtuins 的脱乙酰化活性，随后抑制液泡 H + -ATP 酶（v-ATP 酶），从而通过溶酶体葡萄糖传感途径导致 AMPK 激活。对与 Sirtuin 1 (SIRT1) 共免疫沉淀的蛋白质进行蛋白质组学分析，确定 TUB 样蛋白 3 (TULP3)（一种 Sirtuin 相互作用蛋白 2 ）为 LCA 受体。具体来说，LCA 结合的 TULP3 变构激活 Sirtuins，然后使 v-ATPase 的 V1E1 亚基在残基 K52、K99 和 K191 上脱乙酰化。 V1E1 突变体 (3KR) 的肌肉特异性表达模拟脱乙酰化状态，强烈激活 AMPK 并使衰老小鼠的肌肉恢复活力。在线虫和果蝇中，LCA 分别依赖于 TULP3 同源物 tube-1 和 ktub 来激活 AMPK 并延长寿命和健康寿命。我们的研究表明，LCA 激活 TULP3-sirtuin-v-ATPase-AMPK 通路可重现热量限制的益处。", "titleZh": "石胆酸结合 TULP3，激活去乙酰化酶和 AMPK，从而延缓衰老。", "translationSource": "e4c29ecb208683c3"}, {"pmid": "39708808", "title": "Structural determinants of co-translational protein complex assembly.", "journal": "Cell", "year": 2025, "published": "2025-02-06", "doi": "10.1016/j.cell.2024.11.013", "doiUrl": "https://doi.org/10.1016/j.cell.2024.11.013", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39708808/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "Protein assembly into functional complexes is critical to life's processes. While complex assembly is classically described as occurring between fully synthesized proteins, recent work showed that co-translational assembly is prevalent in human cells. However, the biological basis for the existence of this process and the identity of protein pairs that assemble co-translationally remain unknown. We show that co-translational assembly is governed by structural characteristics of complexes and involves mutually stabilized subunits. Accordingly, co-translationally assembling subunits are unstable in isolation and exhibit synchronized proteostasis with their partner. By leveraging structural signatures and AlphaFold2-based predictions, we accurately predicted co-translational assembly, including pair identities, at proteome scale and across species. We validated our predictions by ribosome profiling, stoichiometry perturbations, and single-molecule RNA-fluorescence in situ hybridization (smFISH) experiments that revealed co-localized mRNAs. This work establishes a fundamental connection between protein structure and the translation process, highlighting the overarching impact of three-dimensional structure on gene expression, mRNA localization, and proteostasis.", "summaryZh": "蛋白质组装成功能复合物对于生命过程至关重要。虽然复杂组装通常被描述为发生在完全合成的蛋白质之间，但最近的研究表明，共翻译组装在人类细胞中普遍存在。然而，这一过程存在的生物学基础以及共翻译组装的蛋白质对的身份仍然未知。我们表明，共翻译组装受复合物的结构特征控制，并涉及相互稳定的亚基。因此，共翻译组装的亚基在孤立状态下是不稳定的，并且与它们的伙伴表现出同步的蛋白质稳态。通过利用结构特征和基于 AlphaFold2 的预测，我们准确地预测了蛋白质组规模和跨物种的共翻译组装，包括配对身份。我们通过核糖体分析、化学计量扰动和单分子 RNA 荧光原位杂交 (smFISH) 实验验证了我们的预测，这些实验揭示了共定位的 mRNA。这项工作在蛋白质结构和翻译过程之间建立了基本联系，强调了三维结构对基因表达、mRNA 定位和蛋白质稳态的总体影响。", "titleZh": "共翻译蛋白复合物组装的结构决定因素。", "translationSource": "19b06eac65e6751d"}, {"pmid": "39706189", "title": "Synthetic organizer cells guide development via spatial and biochemical instructions.", "journal": "Cell", "year": 2025, "published": "2025-02-06", "doi": "10.1016/j.cell.2024.11.017", "doiUrl": "https://doi.org/10.1016/j.cell.2024.11.017", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39706189/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "In vitro development relies primarily on treating progenitor cells with media-borne morphogens and thus lacks native-like spatial information. Here, we engineer morphogen-secreting organizer cells programmed to self-assemble, via cell adhesion, around mouse embryonic stem (ES) cells in defined architectures. By inducing the morphogen WNT3A and its antagonist DKK1 from organizer cells, we generated diverse morphogen gradients, varying in range and steepness. These gradients were strongly correlated with morphogenetic outcomes: the range of minimum-maximum WNT activity determined the resulting range of anterior-to-posterior (A-P) axis cell lineages. Strikingly, shallow WNT activity gradients, despite showing truncated A-P lineages, yielded higher-resolution tissue morphologies, such as a beating, chambered cardiac-like structure associated with an endothelial network. Thus, synthetic organizer cells, which integrate spatial, temporal, and biochemical information, provide a powerful way to systematically and flexibly direct the development of ES or other progenitor cells in different directions within the morphogenetic landscape.", "summaryZh": "体外发育主要依赖于用介质传播的形态发生素处理祖细胞，因此缺乏类似天然的空间信息。在这里，我们设计了分泌形态素的组织者细胞，这些细胞被编程为通过细胞粘附在小鼠胚胎干 (ES) 细胞周围以定义的结构进行自组装。通过从组织细胞中诱导形态发生素 WNT3A 及其拮抗剂 DKK1，我们产生了不同的形态发生素梯度，其范围和陡度各不相同。这些梯度与形态发生结果密切相关：最小-最大 WNT 活性范围决定了前后 (A-P) 轴细胞谱系的范围。引人注目的是，尽管显示出截断的 A-P 谱系，但浅 WNT 活性梯度却产生了更高分辨率的组织形态，例如与内皮网络相关的跳动、有室的心脏样结构。因此，整合了空间、时间和生化信息的合成组织细胞提供了一种强大的方法来系统地、灵活地指导胚胎干细胞或其他祖细胞在形态发生景观中不同方向的发育。", "titleZh": "合成组织细胞通过空间和生化指令指导发育。", "translationSource": "6f08f39d0b5fdf8d"}, {"pmid": "39663458", "title": "Crosslinking intermodular condensation in non-ribosomal peptide biosynthesis.", "journal": "Nature", "year": 2025, "published": "2025-02-01", "doi": "10.1038/s41586-024-08306-y", "doiUrl": "https://doi.org/10.1038/s41586-024-08306-y", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39663458/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Non-ribosomal peptide synthetases are assembly line biosynthetic pathways that are used to produce critical therapeutic drugs and are typically arranged as large multi-domain proteins called megasynthetases 1 . They synthesize polypeptides using peptidyl carrier proteins that shuttle each amino acid through modular loading, modification and elongation 2 steps, and remain challenging to structurally characterize, owing in part to the inherent dynamics of their multi-domain and multi-modular architectures 3 . Here we have developed site-selective crosslinking probes to conformationally constrain and resolve the interactions between carrier proteins and their partner enzymatic domains 4,5 . We apply tetrazine click chemistry to trap the condensation of two carrier protein substrates within the active site of the condensation domain that unites the first two modules of tyrocidine biosynthesis and report the high-resolution cryo-EM structure of this complex. Together with the X-ray crystal structure of the first carrier protein crosslinked to its epimerization domain, these structures highlight captured intermodular recognition events and define the processive movement of a carrier protein from one catalytic step to the next. Characterization of these structural relationships remains central to understanding the molecular details of these unique synthetases and critically informs future synthetic biology design of these pathways.", "summaryZh": "非核糖体肽合成酶是用于生产关键治疗药物的装配线生物合成途径，通常排列为称为大合成酶的大型多结构域蛋白质 1 。他们使用肽基载体蛋白合成多肽，肽基载体蛋白通过模块化加载、修饰和延伸 2 步骤来穿梭每个氨基酸，并且在结构表征方面仍然具有挑战性，部分原因在于其多结构域和多模块架构的固有动态 3 。在这里，我们开发了位点选择性交联探针，以构象限制和解决载体蛋白及其伙伴酶结构域之间的相互作用 4,5 。我们应用四嗪点击化学将两种载体蛋白底物的缩合捕获在缩合域的活性位点内，该缩合域将酪氨酸生物合成的前两个模块结合在一起，并报告了该复合物的高分辨率冷冻电镜结构。与第一个载体蛋白与其差向异构结构域交联的 X 射线晶体结构一起，这些结构突出了捕获的模块间识别事件，并定义了载体蛋白从一个催化步骤到下一个催化步骤的持续运动。这些结构关系的表征对于理解这些独特合成酶的分子细节仍然至关重要，并为这些途径的未来合成生物学设计提供重要信息。", "titleZh": "非核糖体肽生物合成中的交联模块间缩合。", "translationSource": "aa8332f88c5173df"}, {"pmid": "39542025", "title": "Engineered receptors for soluble cellular communication and disease sensing.", "journal": "Nature", "year": 2025, "published": "2025-02-01", "doi": "10.1038/s41586-024-08366-0", "doiUrl": "https://doi.org/10.1038/s41586-024-08366-0", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39542025/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Despite recent advances in mammalian synthetic biology, there remains a lack of modular synthetic receptors that can robustly respond to soluble ligands and, in turn, activate bespoke cellular functions. Such receptors would have extensive clinical potential to regulate the activity of engineered therapeutic cells, but so far only receptors against cell-surface targets have approached clinical translation 1 . To address this gap, here we adapt a receptor architecture called the synthetic intramembrane proteolysis receptor (SNIPR) for activation by soluble ligands. Our SNIPR platform can be activated by both natural and synthetic soluble factors, with notably low baseline activity and high fold activation, through an endocytic, pH-dependent cleavage mechanism. We demonstrate the therapeutic capabilities of the receptor platform by localizing the activity of chimeric antigen receptor (CAR) T cells to solid tumours in which soluble disease-associated factors are expressed, bypassing the major hurdle of on-target off-tumour toxicity in bystander organs. We further apply the SNIPR platform to engineer fully synthetic signalling networks between cells orthogonal to natural signalling pathways, expanding the scope of synthetic biology. Our design framework enables cellular communication and environmental interactions, extending the capabilities of synthetic cellular networking in clinical and research contexts.", "summaryZh": "尽管哺乳动物合成生物学最近取得了进展，但仍然缺乏能够对可溶性配体做出强烈反应并进而激活定制细胞功能的模块化合成受体。此类受体在调节工程治疗细胞的活性方面具有广泛的临床潜力，但迄今为止，只有针对细胞表面靶标的受体已接近临床转化 1 。为了解决这个问题，我们采用了一种称为合成膜内蛋白水解受体（SNIPR）的受体结构，用于通过可溶性配体激活。我们的 SNIPR 平台可以通过天然和合成的可溶性因子激活，通过内吞、pH 依赖性裂解机制，具有显着低的基线活性和高倍数激活。我们通过将嵌合抗原受体（CAR）T细胞的活性定位于表达可溶性疾病相关因子的实体瘤来证明受体平台的治疗能力，绕过了旁观者器官中的靶向非肿瘤毒性的主要障碍。我们进一步应用 SNIPR 平台来设计与自然信号通路正交的细胞之间的完全合成信号网络，扩大了合成生物学的范围。我们的设计框架支持细胞通信和环境交互，扩展了合成细胞网络在临床和研究环境中的功能。", "titleZh": "用于可溶性细胞通讯和疾病传感的工程受体。", "translationSource": "4617ac4f5209c754"}, {"pmid": "39322662", "title": "Designed endocytosis-inducing proteins degrade targets and amplify signals.", "journal": "Nature", "year": 2025, "published": "2025-02-01", "doi": "10.1038/s41586-024-07948-2", "doiUrl": "https://doi.org/10.1038/s41586-024-07948-2", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39322662/", "categories": ["靶向蛋白降解", "溶酶体/蛋白酶体"], "matchedTerms": ["degrader", "lytac", "lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degrader, lytac, lysosome, lysosomal。", "abstractEn": "Endocytosis and lysosomal trafficking of cell surface receptors can be triggered by endogenous ligands. Therapeutic approaches such as lysosome-targeting chimaeras 1,2 (LYTACs) and cytokine receptor-targeting chimeras 3 (KineTACs) have used this to target specific proteins for degradation by fusing modified native ligands to target binding proteins. Although powerful, these approaches can be limited by competition with native ligands and requirements for chemical modification that limit genetic encodability and can complicate manufacturing, and, more generally, there may be no native ligands that stimulate endocytosis through a given receptor. Here we describe computational design approaches for endocytosis-triggering binding proteins (EndoTags) that overcome these challenges. We present EndoTags for insulin-like growth factor 2 receptor (IGF2R) and asialoglycoprotein receptor (ASGPR), sortilin and transferrin receptors, and show that fusing these tags to soluble or transmembrane target protein binders leads to lysosomal trafficking and target degradation. As these receptors have different tissue distributions, the different EndoTags could enable targeting of degradation to different tissues. EndoTag fusion to a PD-L1 antibody considerably increases efficacy in a mouse tumour model compared to antibody alone. The modularity and genetic encodability of EndoTags enables AND gate control for higher-specificity targeted degradation, and the localized secretion of degraders from engineered cells. By promoting endocytosis, EndoTag fusion increases signalling through an engineered ligand-receptor system by nearly 100-fold. EndoTags have considerable therapeutic potential as targeted degradation inducers, signalling activators for endocytosis-dependent pathways, and cellular uptake inducers for targeted antibody-drug and antibody-RNA conjugates.", "summaryZh": "细胞表面受体的内吞作用和溶酶体运输可以由内源配体触发。溶酶体靶向嵌合体 1,2 (LYTAC) 和细胞因子受体靶向嵌合体 3 (KineTAC) 等治疗方法已利用这种方法通过将修饰的天然配体与靶向结合蛋白融合来靶向特定蛋白质进行降解。尽管功能强大，但这些方法可能受到与天然配体的竞争和化学修饰要求的限制，这些化学修饰限制了遗传可编码性并使制造复杂化，并且更一般地，可能不存在通过给定受体刺激内吞作用的天然配体。在这里，我们描述了克服这些挑战的内吞作用触发结合蛋白（EndoTags）的计算设计方法。我们提出了胰岛素样生长因子 2 受体 (IGF2R) 和脱唾液酸糖蛋白受体 (ASGPR)、分拣蛋白和转铁蛋白受体的 EndoTags，并表明将这些标签融合到可溶性或跨膜靶蛋白结合物会导致溶酶体运输和靶点降解。由于这些受体具有不同的组织分布，不同的 EndoTags 可以实现针对不同组织的降解。与单独的抗体相比，EndoTag 与 PD-L1 抗体的融合显着提高了小鼠肿瘤模型的疗效。 EndoTags 的模块化和遗传可编码性使得 AND 门控制能够实现更高特异性的靶向降解，以及工程细胞中降解剂的局部分泌。通过促进内吞作用，EndoTag 融合将通过工程配体-受体系统的信号传导增强近 100 倍。 EndoTags 作为靶向降解诱导剂、内吞依赖途径的信号激活剂以及靶向抗体-药物和抗体-RNA 缀合物的细胞摄取诱导剂具有相当大的治疗潜力。", "titleZh": "设计的内吞诱导蛋白可降解靶标并放大信号。", "translationSource": "f2f64394ce112111"}, {"pmid": "39322661", "title": "Transferrin receptor targeting chimeras for membrane protein degradation.", "journal": "Nature", "year": 2025, "published": "2025-02-01", "doi": "10.1038/s41586-024-07947-3", "doiUrl": "https://doi.org/10.1038/s41586-024-07947-3", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39322661/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Cancer cells require high levels of iron for rapid proliferation, leading to significant upregulation of cell-surface transferrin receptor 1 (TfR1), which mediates iron uptake by binding to the iron-carrying protein transferrin 1-3 . Leveraging this phenomenon and the fast endocytosis rate of TfR1 (refs. 4,5 ), we developed transferrin receptor targeting chimeras (TransTACs), a heterobispecific antibody modality for membrane protein degradation. TransTACs are engineered to drive rapid co-internalization of a target protein of interest and TfR1 from the cell surface, and to enable target protein entry into the lysosomal degradation pathway. We show that TransTACs can efficiently degrade a diverse range of single-pass, multi-pass, native or synthetic membrane proteins, including epidermal growth factor receptor, programmed cell death 1 ligand 1, cluster of differentiation 20 and chimeric antigen receptor. In example applications, TransTACs enabled the reversible control of human primary chimeric antigen receptor T cells and the targeting of drug-resistant epidermal growth factor receptor-driven lung cancer with the exon 19 deletion/T790M/C797S mutations in a mouse xenograft model. TransTACs represent a promising new family of bifunctional antibodies for precise manipulation of membrane proteins and targeted cancer therapy.", "summaryZh": "癌细胞需要高水平的铁来快速增殖，导致细胞表面转铁蛋白受体 1 (TfR1) 显着上调，TfR1 通过与携带铁的蛋白转铁蛋白 1-3 结合来介导铁的吸收。利用这种现象和 TfR1 的快速内吞速率（参考文献 4,5），我们开发了转铁蛋白受体靶向嵌合体 (TransTAC)，这是一种用于膜蛋白降解的异双特异性抗体形式。 TransTAC 被设计用于驱动目标靶蛋白和 TfR1 从细胞表面快速共内化，并使靶蛋白进入溶酶体降解途径。我们证明 TransTAC 可以有效降解多种单程、多程、天然或合成膜蛋白，包括表皮生长因子受体、程序性细胞死亡 1 配体 1、分化簇 20 和嵌合抗原受体。在示例应用中，TransTAC 能够在小鼠异种移植模型中实现对人初级嵌合抗原受体 T 细胞的可逆控制，并靶向具有外显子 19 缺失/T790M/C797S 突变的耐药表皮生长因子受体驱动的肺癌。 TransTAC 代表了一个有前途的新双功能抗体家族，可用于精确操作膜蛋白和靶向癌症治疗。", "titleZh": "靶向嵌合体的转铁蛋白受体用于膜蛋白降解。", "translationSource": "eecabac6ccdcf1c4"}, {"pmid": "39579764", "title": "snoRNA-facilitated protein secretion revealed by transcriptome-wide snoRNA target identification.", "journal": "Cell", "year": 2025, "published": "2025-01-23", "doi": "10.1016/j.cell.2024.10.046", "doiUrl": "https://doi.org/10.1016/j.cell.2024.10.046", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39579764/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Small nucleolar RNAs (snoRNAs) are non-coding RNAs known for guiding RNA modifications, including 2'-O-methylation (N m ) and pseudouridine (Ψ). While snoRNAs may also interact with other RNAs, such as mRNA, the full repertoire of RNAs targeted by snoRNA remains elusive due to the lack of effective technologies that identify snoRNA targets transcriptome wide. Here, we develop a chemical crosslinking-based approach that comprehensively detects cellular RNA targets of snoRNAs, yielding thousands of previously unrecognized snoRNA-mRNA interactions in human cells and mouse brain tissues. Many interactions occur outside of snoRNA-guided RNA modification sites, hinting at non-canonical functions beyond RNA modification. We find that one of these snoRNAs, SNORA73, targets mRNAs that encode secretory proteins and membrane proteins. SNORA73 also interacts with 7SL RNA, part of the signal recognition particle (SRP) required for protein secretion. The mRNA-SNORA73-7SL RNA interactions enhance the association of the SNORA73-target mRNAs with SRP, thereby facilitating the secretion of encoded proteins.", "summaryZh": "小核仁 RNA (snoRNA) 是已知用于指导 RNA 修饰的非编码 RNA，包括 2'-O-甲基化 (N m ) 和假尿苷 (Ψ)。虽然 snoRNA 也可能与其他 RNA（例如 mRNA）相互作用，但由于缺乏识别 snoRNA 转录组目标的有效技术，snoRNA 靶向的全部 RNA 仍然难以捉摸。在这里，我们开发了一种基于化学交联的方法，可以全面检测 snoRNA 的细胞 RNA 靶标，在人类细胞和小鼠脑组织中产生数千种以前未被识别的 snoRNA-mRNA 相互作用。许多相互作用发生在 snoRNA 引导的 RNA 修饰位点之外，暗示了 RNA 修饰之外的非规范功能。我们发现这些 snoRNA 之一 SNORA73 靶向编码分泌蛋白和膜蛋白的 mRNA。 SNORA73 还与 7SL RNA 相互作用，7SL RNA 是蛋白质分泌所需的信号识别颗粒 (SRP) 的一部分。 mRNA-SNORA73-7SL RNA 相互作用增强了 SNORA73 靶标 mRNA 与 SRP 的关联，从而促进编码蛋白的分泌。", "titleZh": "通过全转录组 snoRNA 靶标鉴定揭示了 snoRNA 促进的蛋白质分泌。", "translationSource": "14c6196aec516bf9"}, {"pmid": "39532095", "title": "Decreased lipidated ApoE-receptor interactions confer protection against pathogenicity of ApoE and its lipid cargoes in lysosomes.", "journal": "Cell", "year": 2025, "published": "2025-01-09", "doi": "10.1016/j.cell.2024.10.027", "doiUrl": "https://doi.org/10.1016/j.cell.2024.10.027", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39532095/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal, endolysosomal。", "abstractEn": "While apolipoprotein E (APOE) is the strongest genetic modifier for late-onset Alzheimer's disease (LOAD), the molecular mechanisms underlying isoform-dependent risk and the relevance of ApoE-associated lipids remain elusive. Here, we report that impaired low-density lipoprotein (LDL) receptor (LDLR) binding of lipidated ApoE2 (lipApoE2) avoids LDLR recycling defects observed with lipApoE3/E4 and decreases the uptake of cholesteryl esters (CEs), which are lipids linked to neurodegeneration. In human neurons, the addition of ApoE carrying polyunsaturated fatty acids (PUFAs)-CE revealed an allelic series (ApoE4 > ApoE3 > ApoE2) associated with lipofuscinosis, an age-related lysosomal pathology resulting from lipid peroxidation. Lipofuscin increased lysosomal accumulation of tau fibrils and was elevated in the APOE4 mouse brain with exacerbation by tau pathology. Intrahippocampal injection of PUFA-CE-lipApoE4 was sufficient to induce lipofuscinosis in wild-type mice. Finally, the protective Christchurch mutation also reduced LDLR binding and phenocopied ApoE2. Collectively, our data strongly suggest decreased lipApoE-LDLR interactions minimize LOAD risk by reducing the deleterious effects of endolysosomal targeting of ApoE and associated pathogenic lipids.", "summaryZh": "虽然载脂蛋白 E (APOE) 是晚发性阿尔茨海默氏病 (LOAD) 最强的遗传修饰剂，但异构体依赖性风险的分子机制以及 ApoE 相关脂质的相关性仍然难以捉摸。在这里，我们报告说，脂质化 ApoE2 (lipApoE2) 的低密度脂蛋白 (LDL) 受体 (LDLR) 结合受损，可以避免 lipApoE3/E4 观察到的 LDLR 循环缺陷，并减少胆固醇酯 (CE) 的摄取，胆固醇酯是与神经退行性疾病相关的脂质。在人类神经元中，添加携带多不饱和脂肪酸 (PUFA)-CE 的 ApoE 揭示了与脂褐质沉着症相关的等位基因系列 (ApoE4 > ApoE3 > ApoE2)，脂褐质沉着症是一种由脂质过氧化引起的与年龄相关的溶酶体病理学。脂褐质增加了 tau 原纤维的溶酶体积累，并且在 APOE4 小鼠大脑中升高，并因 tau 病理学而加剧。海马内注射 PUFA-CE-lipApoE4 足以诱导野生型小鼠发生脂褐质沉着症。最后，保护性 Christchurch 突变还减少了 LDLR 结合和表型化的 ApoE2。总的来说，我们的数据强烈表明，lipApoE-LDLR 相互作用的减少可以通过减少内溶酶体靶向 ApoE 和相关致病脂质的有害影响来最大限度地降低 LOAD 风险。", "titleZh": "脂质化 ApoE-受体相互作用的减少可防止 ApoE 及其在溶酶体中的脂质货物的致病性。", "translationSource": "c34a5abaed31adc3"}, {"pmid": "39657677", "title": "Dual BACH1 regulation by complementary SCF-type E3 ligases.", "journal": "Cell", "year": 2024, "published": "2024-12-26", "doi": "10.1016/j.cell.2024.11.006", "doiUrl": "https://doi.org/10.1016/j.cell.2024.11.006", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39657677/", "categories": ["靶向蛋白降解"], "matchedTerms": ["degron"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degron。", "abstractEn": "Broad-complex, tramtrack, and bric-à-brac domain (BTB) and CNC homolog 1 (BACH1) is a key regulator of the cellular oxidative stress response and an oncogene that undergoes tight post-translational control by two distinct F-box ubiquitin ligases, SCF FBXO22 and SCF FBXL17 . However, how both ligases recognize BACH1 under oxidative stress is unclear. In our study, we elucidate the mechanism by which FBXO22 recognizes a quaternary degron in a domain-swapped β-sheet of the BACH1 BTB dimer. Cancer-associated mutations and cysteine modifications destabilize the degron and impair FBXO22 binding but simultaneously expose an otherwise shielded degron in the dimer interface, allowing FBXL17 to recognize BACH1 as a monomer. These findings shed light on a ligase switch mechanism that enables post-translational regulation of BACH1 by complementary ligases depending on the stability of its BTB domain. Our results provide mechanistic insights into the oxidative stress response and may spur therapeutic approaches for targeting oxidative stress-related disorders and cancer.", "summaryZh": "广泛复合物、tramtrack 和 bric-à-brac 结构域 (BTB) 和 CNC 同源物 1 (BACH1) 是细胞氧化应激反应的关键调节因子，也是一种癌基因，受到两种不同的 F-box 泛素连接酶 SCF FBXO22 和 SCF FBXL17 的严格翻译后控制。然而，两种连接酶如何在氧化应激下识别 BACH1 尚不清楚。在我们的研究中，我们阐明了 FBXO22 识别 BACH1 BTB 二聚体的结构域交换 β-折叠中的四元降解决定子的机制。癌症相关突变和半胱氨酸修饰会破坏降解决定子的稳定性并损害 FBXO22 结合，但同时会暴露二聚体界面中原本被屏蔽的降解决定子，从而使 FBXL17 能够将 BACH1 识别为单体。这些发现揭示了一种连接酶开关机制，该机制能够根据 BTB 结构域的稳定性，通过互补连接酶对 BACH1 进行翻译后调节。我们的结果提供了对氧化应激反应的机制见解，并可能刺激针对氧化应激相关疾病和癌症的治疗方法。", "titleZh": "通过互补的 SCF 型 E3 连接酶对 BACH1 进行双重调节。", "translationSource": "6c66d803184f6a7d"}, {"pmid": "39504958", "title": "Recognition of BACH1 quaternary structure degrons by two F-box proteins under oxidative stress.", "journal": "Cell", "year": 2024, "published": "2024-12-26", "doi": "10.1016/j.cell.2024.10.012", "doiUrl": "https://doi.org/10.1016/j.cell.2024.10.012", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39504958/", "categories": ["靶向蛋白降解"], "matchedTerms": ["degron"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degron。", "abstractEn": "Ubiquitin-dependent proteolysis regulates diverse cellular functions with high substrate specificity, which hinges on the ability of ubiquitin E3 ligases to decode the targets' degradation signals, i.e., degrons. Here, we show that BACH1, a transcription repressor of antioxidant response genes, features two distinct unconventional degrons encrypted in the quaternary structure of its homodimeric BTB domain. These two degrons are both functionalized by oxidative stress and are deciphered by two complementary E3s. FBXO22 recognizes a degron constructed by the BACH1 BTB domain dimer interface, which is unmasked from transcriptional co-repressors after oxidative stress releases BACH1 from chromatin. When this degron is impaired by oxidation, a second BACH1 degron manifested by its destabilized BTB dimer is probed by a pair of FBXL17 proteins that remodels the substrate into E3-bound monomers for ubiquitination. Our findings highlight the multidimensionality of protein degradation signals and the functional complementarity of different ubiquitin ligases targeting the same substrate.", "summaryZh": "泛素依赖性蛋白水解以高底物特异性调节多种细胞功能，这取决于泛素 E3 连接酶解码目标降解信号（即降解决定子）的能力。在这里，我们展示了 BACH1（抗氧化反应基因的转录抑制子）具有两个不同的非常规降解决定子，加密在其同二聚体 BTB 结构域的四级结构中。这两个降解决定子均通过氧化应激而功能化，并由两个互补的 E3 破译。 FBXO22 识别由 BACH1 BTB 结构域二聚体界面构建的降解决定子，氧化应激从染色质释放 BACH1 后，该降解决定子就会被转录共阻遏物暴露出来。当该降解决定子因氧化而受损时，一对 FBXL17 蛋白会探测由其不稳定的 BTB 二聚体表现的第二个 BACH1 降解决定子，该蛋白将底物重塑为 E3 结合单体以进行泛素化。我们的研究结果强调了蛋白质降解信号的多维性以及针对同一底物的不同泛素连接酶的功能互补性。", "titleZh": "氧化应激下两个 F-box 蛋白对 BACH1 四级结构降解决定子的识别。", "translationSource": "f085c96ac0314d8d"}, {"pmid": "39488207", "title": "Selective degradation of multimeric proteins by TRIM21-based molecular glue and PROTAC degraders.", "journal": "Cell", "year": 2024, "published": "2024-12-12", "doi": "10.1016/j.cell.2024.10.015", "doiUrl": "https://doi.org/10.1016/j.cell.2024.10.015", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39488207/", "categories": ["靶向蛋白降解"], "matchedTerms": ["targeted protein degradation", "protac", "proteolysis-targeting chimera", "molecular glue", "degrader"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：targeted protein degradation, protac, proteolysis-targeting chimera, molecular glue, degrader。", "abstractEn": "Targeted protein degradation (TPD) utilizes molecular glues or proteolysis-targeting chimeras (PROTACs) to eliminate disease-causing proteins by promoting their interaction with E3 ubiquitin ligases. Current TPD approaches are limited by reliance on a small number of constitutively active E3 ubiquitin ligases. Here, we report that (S)-ACE-OH, a metabolite of the antipsychotic drug acepromazine, acts as a molecular glue to induce an interaction between the E3 ubiquitin ligase TRIM21 and the nucleoporin NUP98, leading to the degradation of nuclear pore proteins and disruption of nucleocytoplasmic trafficking. Functionalization of acepromazine into PROTACs enabled selective degradation of multimeric proteins, such as those within biomolecular condensates, while sparing monomeric proteins. This selectivity is consistent with the requirement of substrate-induced clustering for TRIM21 activation. As aberrant protein assemblies cause diseases such as autoimmunity, neurodegeneration, and cancer, our findings highlight the potential of TRIM21-based multimer-selective degraders as a strategy to tackle the direct causes of these diseases.", "summaryZh": "靶向蛋白质降解 (TPD) 利用分子胶或蛋白水解靶向嵌合体 (PROTAC) 通过促进致病蛋白质与 E3 泛素连接酶的相互作用来消除致病蛋白质。目前的 TPD 方法因依赖少量的组成型活性 E3 泛素连接酶而受到限制。在此，我们报道抗精神病药物乙酰丙嗪的代谢物 (S)-ACE-OH 作为分子胶诱导 E3 泛素连接酶 TRIM21 和核孔蛋白 NUP98 之间的相互作用，导致核孔蛋白降解并破坏核细胞质运输。将乙酰丙嗪功能化到 PROTAC 中可以选择性降解多聚体蛋白质，例如生物分子凝聚物中的蛋白质，同时保留单体蛋白质。这种选择性与 TRIM21 激活的底物诱导聚类的要求一致。由于异常的蛋白质组装会导致自身免疫、神经变性和癌症等疾病，我们的研究结果强调了基于 TRIM21 的多聚体选择性降解剂作为解决这些疾病直接原因的策略的潜力。", "titleZh": "基于 TRIM21 的分子胶和 PROTAC 降解剂选择性降解多聚蛋白。", "translationSource": "2f3320091c91a1d7"}, {"pmid": "39481378", "title": "IRGQ-mediated autophagy in MHC class I quality control promotes tumor immune evasion.", "journal": "Cell", "year": 2024, "published": "2024-12-12", "doi": "10.1016/j.cell.2024.09.048", "doiUrl": "https://doi.org/10.1016/j.cell.2024.09.048", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39481378/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal, autophagy。", "abstractEn": "The autophagy-lysosome system directs the degradation of a wide variety of cargo and is also involved in tumor progression. Here, we show that the immunity-related GTPase family Q protein (IRGQ), an uncharacterized protein to date, acts in the quality control of major histocompatibility complex class I (MHC class I) molecules. IRGQ directs misfolded MHC class I toward lysosomal degradation through its binding mode to GABARAPL2 and LC3B. In the absence of IRGQ, free MHC class I heavy chains do not only accumulate in the cell but are also transported to the cell surface, thereby promoting an immune response. Mice and human patients suffering from hepatocellular carcinoma show improved survival rates with reduced IRGQ levels due to increased reactivity of CD8+ T cells toward IRGQ knockout tumor cells. Thus, we reveal IRGQ as a regulator of MHC class I quality control, mediating tumor immune evasion.", "summaryZh": "自噬-溶酶体系统指导多种货物的降解，并且还参与肿瘤进展。在这里，我们展示了免疫相关的 GTP 酶家族 Q 蛋白 (IRGQ)，一种迄今为止尚未表征的蛋白质，在主要组织相容性复合物 I 类 (MHC I 类) 分子的质量控制中发挥作用。 IRGQ 通过其与 GABARAPL2 和 LC3B 的结合模式，将错误折叠的 I 类 MHC 引导至溶酶体降解。在缺乏 IRGQ 的情况下，游离的 MHC I 类重链不仅会在细胞中积累，还会被转运到细胞表面，从而促进免疫反应。由于 CD8+ T 细胞对 IRGQ 敲除肿瘤细胞的反应性增加，患有肝细胞癌的小鼠和人类患者的生存率随着 IRGQ 水平的降低而提高。因此，我们揭示 IRGQ 作为 MHC I 类质量控制的调节剂，介导肿瘤免疫逃避。", "titleZh": "MHC I 类质量控制中 IRGQ 介导的自噬促进肿瘤免疫逃避。", "translationSource": "80474c03da830357"}, {"pmid": "39423811", "title": "PLD3 and PLD4 synthesize S,S-BMP, a key phospholipid enabling lipid degradation in lysosomes.", "journal": "Cell", "year": 2024, "published": "2024-11-27", "doi": "10.1016/j.cell.2024.09.036", "doiUrl": "https://doi.org/10.1016/j.cell.2024.09.036", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39423811/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "Bis(monoacylglycero)phosphate (BMP) is an abundant lysosomal phospholipid required for degradation of lipids, particularly gangliosides. Alterations in BMP levels are associated with neurodegenerative diseases. Unlike typical glycerophospholipids, lysosomal BMP has two chiral glycerol carbons in the S (rather than the R) stereo-conformation, protecting it from lysosomal degradation. How this unusual and yet crucial S,S-stereochemistry is achieved is unknown. Here, we report that phospholipases D3 and D4 (PLD3 and PLD4) synthesize lysosomal S,S-BMP, with either enzyme catalyzing the critical glycerol stereo-inversion reaction in vitro. Deletion of PLD3 or PLD4 markedly reduced BMP levels in cells or in murine tissues where either enzyme is highly expressed (brain for PLD3; spleen for PLD4), leading to gangliosidosis and lysosomal abnormalities. PLD3 mutants associated with neurodegenerative diseases, including risk of Alzheimer's disease, diminished PLD3 catalytic activity. We conclude that PLD3/4 enzymes synthesize lysosomal S,S-BMP, a crucial lipid for maintaining brain health.", "summaryZh": "双（单酰基甘油）磷酸酯 (BMP) 是一种丰富的溶酶体磷脂，是降解脂质（尤其是神经节苷脂）所需的。 BMP 水平的改变与神经退行性疾病有关。与典型的甘油磷脂不同，溶酶体 BMP 在 S（而不是 R）立体构象中具有两个手性甘油碳，从而保护其免受溶酶体降解。这种不寻常但至关重要的 S,S-立体化学是如何实现的尚不清楚。在这里，我们报道磷脂酶 D3 和 D4（PLD3 和 PLD4）合成溶酶体 S,S-BMP，其中任一酶在体外催化关键的甘油立体反转反应。删除 PLD3 或 PLD4 会显着降低细胞或小鼠组织（PLD3 为脑；PLD4 为脾）的细胞或小鼠组织中的 BMP 水平，导致神经节苷脂沉积症和溶酶体异常。与神经退行性疾病（包括阿尔茨海默病风险）相关的 PLD3 突变体会​​降低 PLD3 催化活性。我们得出结论，PLD3/4 酶合成溶酶体 S,S-BMP，这是维持大脑健康的关键脂质。", "titleZh": "PLD3 和 PLD4 合成 S,S-BMP，这是一种能够在溶酶体中降解脂质的关键磷脂。", "translationSource": "e570346e072ae45e"}, {"pmid": "39366381", "title": "Rift Valley fever virus coordinates the assembly of a programmable E3 ligase to promote viral replication.", "journal": "Cell", "year": 2024, "published": "2024-11-27", "doi": "10.1016/j.cell.2024.09.008", "doiUrl": "https://doi.org/10.1016/j.cell.2024.09.008", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39366381/", "categories": ["靶向蛋白降解", "溶酶体/蛋白酶体"], "matchedTerms": ["degrader", "proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degrader, proteasome。", "abstractEn": "Viruses encode strategies to degrade cellular proteins to promote infection and pathogenesis. Here, we revealed that the non-structural protein NSs of Rift Valley fever virus forms a filamentous E3 ligase to trigger efficient degradation of targeted proteins. Reconstitution in vitro and cryoelectron microscopy analysis with the 2.9-Å resolution revealed that NSs forms right-handed helical fibrils. The NSs filamentous oligomers associate with the cellular FBXO3 to form a remodeled E3 ligase. The NSs-FBXO3 E3 ligase targets the cellular TFIIH complex through the NSs-P62 interaction, leading to ubiquitination and proteasome-dependent degradation of the TFIIH complex. NSs-FBXO3-triggered TFIIH complex degradation resulted in robust inhibition of antiviral immunity and promoted viral pathogenesis in vivo. Furthermore, it is demonstrated that NSs can be programmed to target additional proteins for proteasome-dependent degradation, serving as a versatile targeted protein degrader. These results showed that a virulence factor forms a filamentous and programmable degradation machinery to induce organized degradation of cellular proteins to promote viral infection.", "summaryZh": "病毒编码降解细胞蛋白质的策略，以促进感染和发病机制。在这里，我们揭示了裂谷热病毒的非结构蛋白 NS 形成丝状 E3 连接酶，以触发目标蛋白的有效降解。体外重构和分辨率为 2.9-Å 的冷冻电子显微镜分析表明，NSs 形成右旋螺旋原纤维。 NSs 丝状寡聚体与细胞 FBXO3 结合形成重构的 E3 连接酶。 NSs-FBXO3 E3 连接酶通过 NSs-P62 相互作用靶向细胞 TFIIH 复合物，导致 TFIIH 复合物泛素化和蛋白酶体依赖性降解。 NSs-FBXO3 触发的 TFIIH 复合物降解导致抗病毒免疫的强烈抑制并促进体内病毒发病机制。此外，研究表明，NS 可以被编程为靶向其他蛋白质进行蛋白酶体依赖性降解，作为一种多功能的靶向蛋白质降解剂。这些结果表明，毒力因子形成丝状且可编程的降解机制，诱导细胞蛋白质的有组织降解，从而促进病毒感染。", "titleZh": "裂谷热病毒协调可编程 E3 连接酶的组装以促进病毒复制。", "translationSource": "f5598d774fd1cf9d"}, {"pmid": "39547212", "title": "SnapShot: Targeted protein degradation.", "journal": "Cell", "year": 2024, "published": "2024-11-14", "doi": "10.1016/j.cell.2024.10.025", "doiUrl": "https://doi.org/10.1016/j.cell.2024.10.025", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39547212/", "categories": ["靶向蛋白降解"], "matchedTerms": ["targeted protein degradation"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：targeted protein degradation。", "abstractEn": "Targeted protein degradation strategies leverage endogenous cellular degradation machinery to selectively eliminate a protein of interest. Emerging technologies are opening avenues in drug discovery and functional characterization of intracellular, membrane, and extracellular proteins. To view this SnapShot, open or download the PDF.", "summaryZh": "靶向蛋白质降解策略利用内源性细胞降解机制选择性地消除感兴趣的蛋白质。新兴技术为药物发现和细胞内、膜和细胞外蛋白的功能表征开辟了途径。要查看此快照，请打开或下载 PDF。", "titleZh": "快照：靶向蛋白质降解。", "translationSource": "f444ee69ae83fdc9"}, {"pmid": "39547211", "title": "Bound by the love for cholesterol: A transporter meets a GPCR.", "journal": "Cell", "year": 2024, "published": "2024-11-14", "doi": "10.1016/j.cell.2024.10.033", "doiUrl": "https://doi.org/10.1016/j.cell.2024.10.033", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39547211/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "In a recently published article in Nature, Bayly-Jones et al. report the cryo-EM structures of a lysosomal cholesterol sensor, LYCHOS, also known as GPR155, which reveals a unique fusion of a plant auxin-transporter-like domain with a seven-transmembrane GPCR-like domain and elucidates mechanistic insights into cellular regulation of mTORC1 activity.", "summaryZh": "Bayly-Jones 等人最近在《自然》杂志上发表了一篇文章。报道了溶酶体胆固醇传感器 LYCHOS（也称为 GPR155）的冷冻电镜结构，它揭示了植物生长素转运蛋白样结构域与七跨膜 GPCR 样结构域的独特融合，并阐明了 mTORC1 活性的细胞调节机制。", "titleZh": "受到对胆固醇的热爱的束缚：转运蛋白遇上 GPCR。", "translationSource": "15263a1bb973b6bb"}, {"pmid": "39276772", "title": "Co-opting templated aggregation to degrade pathogenic tau assemblies and improve motor function.", "journal": "Cell", "year": 2024, "published": "2024-10-17", "doi": "10.1016/j.cell.2024.08.024", "doiUrl": "https://doi.org/10.1016/j.cell.2024.08.024", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39276772/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Protein aggregation causes a wide range of neurodegenerative diseases. Targeting and removing aggregates, but not the functional protein, is a considerable therapeutic challenge. Here, we describe a therapeutic strategy called \"RING-Bait,\" which employs an aggregating protein sequence combined with an E3 ubiquitin ligase. RING-Bait is recruited into aggregates, whereupon clustering dimerizes the RING domain and activates its E3 function, resulting in the degradation of the aggregate complex. We exemplify this concept by demonstrating the specific degradation of tau aggregates while sparing soluble tau. Unlike immunotherapy, RING-Bait is effective against both seeded and cell-autonomous aggregation. RING-Bait removed tau aggregates seeded from Alzheimer's disease (AD) and progressive supranuclear palsy (PSP) brain extracts and was also effective in primary neurons. We used a brain-penetrant adeno-associated virus (AAV) to treat P301S tau transgenic mice, reducing tau pathology and improving motor function. A RING-Bait strategy could be applied to other neurodegenerative proteinopathies by replacing the Bait sequence to match the target aggregate. Crown", "summaryZh": "蛋白质聚集导致多种神经退行性疾病。靶向并去除聚集物，而不是功能性蛋白质，是一个相当大的治疗挑战。在这里，我们描述了一种称为“RING-Bait”的治疗策略，该策略采用聚集蛋白序列与 E3 泛素连接酶相结合。 RING-Bait 被招募到聚集体中，随后聚集使 RING 结构域二聚化并激活其 E3 功能，导致聚集体复合物降解。我们通过展示 tau 蛋白聚集体的特异性降解同时保留可溶性 tau 蛋白来例证这一概念。与免疫疗法不同，RING-Bait 对种子聚集和细胞自主聚集均有效。 RING-Bait 去除了从阿尔茨海默病 (AD) 和进行性核上性麻痹 (PSP) 大脑提取物中接种的 tau 蛋白聚集体，并且对原代神经元也有效。我们使用脑渗透性腺相关病毒 (AAV) 治疗 P301S tau 转基因小鼠，减少 tau 病理并改善运动功能。通过替换诱饵序列以匹配目标聚集体，环诱饵策略可以应用于其他神经退行性蛋白质病。皇冠", "titleZh": "选择模板化聚合来降解致病性 tau 蛋白组装体并改善运动功能。", "translationSource": "87f4f7e5dae83be5"}, {"pmid": "39265577", "title": "TEX264 drives selective autophagy of DNA lesions to promote DNA repair and cell survival.", "journal": "Cell", "year": 2024, "published": "2024-10-03", "doi": "10.1016/j.cell.2024.08.020", "doiUrl": "https://doi.org/10.1016/j.cell.2024.08.020", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39265577/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "proteasome", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, proteasome, autophagy。", "abstractEn": "DNA repair and autophagy are distinct biological processes vital for cell survival. Although autophagy helps maintain genome stability, there is no evidence of its direct role in the repair of DNA lesions. We discovered that lysosomes process topoisomerase 1 cleavage complexes (TOP1cc) DNA lesions in vertebrates. Selective degradation of TOP1cc by autophagy directs DNA damage repair and cell survival at clinically relevant doses of topoisomerase 1 inhibitors. TOP1cc are exported from the nucleus to lysosomes through a transient alteration of the nuclear envelope and independent of the proteasome. Mechanistically, the autophagy receptor TEX264 acts as a TOP1cc sensor at DNA replication forks, triggering TOP1cc processing by the p97 ATPase and mediating the delivery of TOP1cc to lysosomes in an MRE11-nuclease- and ATR-kinase-dependent manner. We found an evolutionarily conserved role for selective autophagy in DNA repair that enables cell survival, protects genome stability, and is clinically relevant for colorectal cancer patients.", "summaryZh": "DNA 修复和自噬是对细胞生存至关重要的不同生物过程。尽管自噬有助于维持基因组稳定性，但没有证据表明其在 DNA 损伤修复中具有直接作用。我们发现溶酶体在脊椎动物中处理拓扑异构酶 1 裂解复合物 (TOP1cc) DNA 损伤。在临床相关剂量的拓扑异构酶 1 抑制剂下，自噬选择性降解 TOP1cc 可指导 DNA 损伤修复和细胞存活。 TOP1cc 通过核膜的短暂改变从细胞核输出到溶酶体，并且不依赖于蛋白酶体。从机制上讲，自噬受体 TEX264 在 DNA 复制叉上充当 TOP1cc 传感器，触发 p97 ATP 酶处理 TOP1cc，并以 MRE11 核酸酶和 ATR 激酶依赖性方式介导 TOP1cc 向溶酶体的递送。我们发现选择性自噬在 DNA 修复中具有进化上保守的作用，可以使细胞存活，保护基因组稳定性，并且与结直肠癌患者具有临床相关性。", "titleZh": "TEX264 驱动 DNA 损伤的选择性自噬，以促进 DNA 修复和细胞存活。", "translationSource": "a58b08e86d7ad0c2"}, {"pmid": "39385023", "title": "Biomolecular condensates mediate bending and scission of endosome membranes.", "journal": "Nature", "year": 2024, "published": "2024-10-01", "doi": "10.1038/s41586-024-07990-0", "doiUrl": "https://doi.org/10.1038/s41586-024-07990-0", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39385023/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["endosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：endosome。", "abstractEn": "Multivesicular bodies are key endosomal compartments implicated in cellular quality control through their degradation of membrane-bound cargo proteins 1-3 . The ATP-consuming ESCRT protein machinery mediates the capture and engulfment of membrane-bound cargo proteins through invagination and scission of multivesicular-body membranes to form intraluminal vesicles 4,5 . Here we report that the plant ESCRT component FREE1 6 forms liquid-like condensates that associate with membranes to drive intraluminal vesicle formation. We use a minimal physical model, reconstitution experiments and in silico simulations to identify the dynamics of this process and describe intermediate morphologies of nascent intraluminal vesicles. Furthermore, we find that condensate-wetting-induced line tension forces and membrane asymmetries are sufficient to mediate scission of the membrane neck without the ESCRT protein machinery or ATP consumption. Genetic manipulation of the ESCRT pathway in several eukaryotes provides additional evidence for condensate-mediated membrane scission in vivo. We find that the interplay between condensate and machinery-mediated scission mechanisms is indispensable for osmotic stress tolerance in plants. We propose that condensate-mediated scission represents a previously undescribed scission mechanism that depends on the physicomolecular properties of the condensate and is involved in a range of trafficking processes. More generally, FREE1 condensate-mediated membrane scission in multivesicular-body biogenesis highlights the fundamental role of wetting in intracellular dynamics and organization.", "summaryZh": "多泡体是关键的内体区室，通过膜结合货物蛋白的降解参与细胞质量控制 1-3 。消耗 ATP 的 ESCRT 蛋白机制通过多囊泡体膜的内陷和分裂形成管腔内囊泡，介导膜结合货物蛋白的捕获和吞噬 4,5 。在这里，我们报道植物 ESCRT 成分 FREE1 6 形成液体状冷凝物，与膜结合以驱动管腔内囊泡的形成。我们使用最小的物理模型、重构实验和计算机模拟来识别该过程的动力学并描述新生管腔内囊泡的中间形态。此外，我们发现冷凝水润湿引起的线张力和膜不对称足以介导膜颈的断裂，而无需 ESCRT 蛋白质机制或 ATP 消耗。几种真核生物中 ESCRT 途径的基因操作为体内冷凝物介导的膜断裂提供了额外的证据。我们发现冷凝物和机械介导的断裂机制之间的相互作用对于植物的渗透胁迫耐受性是不可或缺的。我们认为，冷凝物介导的断裂代表了一种先前未描述的断裂机制，该机制取决于冷凝物的物理分子特性，并参与一系列的运输过程。更一般地说，多囊泡体生物发生中 FREE1 冷凝物介导的膜分裂凸显了润湿在细胞内动力学和组织中的基本作用。", "titleZh": "生物分子缩合物介导内体膜的弯曲和断裂。", "translationSource": "6a418243ecddc706"}, {"pmid": "39358511", "title": "LYCHOS is a human hybrid of a plant-like PIN transporter and a GPCR.", "journal": "Nature", "year": 2024, "published": "2024-10-01", "doi": "10.1038/s41586-024-08012-9", "doiUrl": "https://doi.org/10.1038/s41586-024-08012-9", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39358511/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "Lysosomes have crucial roles in regulating eukaryotic metabolism and cell growth by acting as signalling platforms to sense and respond to changes in nutrient and energy availability 1 . LYCHOS (GPR155) is a lysosomal transmembrane protein that functions as a cholesterol sensor, facilitating the cholesterol-dependent activation of the master protein kinase mechanistic target of rapamycin complex 1 (mTORC1) 2 . However, the structural basis of LYCHOS assembly and activity remains unclear. Here we determine several high-resolution cryo-electron microscopy structures of human LYCHOS, revealing a homodimeric transmembrane assembly of a transporter-like domain fused to a G-protein-coupled receptor (GPCR) domain. The class B2-like GPCR domain is captured in the apo state and packs against the surface of the transporter-like domain, providing an unusual example of a GPCR as a domain in a larger transmembrane assembly. Cholesterol sensing is mediated by a conserved cholesterol-binding motif, positioned between the GPCR and transporter domains. We reveal that the LYCHOS transporter-like domain is an orthologue of the plant PIN-FORMED (PIN) auxin transporter family, and has greater structural similarity to plant auxin transporters than to known human transporters. Activity assays support a model in which the LYCHOS transporter and GPCR domains coordinate to sense cholesterol and regulate mTORC1 activation.", "summaryZh": "溶酶体作为信号平台来感知和响应营养和能量可用性的变化，在调节真核代谢和细胞生长中发挥着至关重要的作用 1 。 LYCHOS (GPR155) 是一种溶酶体跨膜蛋白，可充当胆固醇传感器，促进雷帕霉素复合物 1 (mTORC1) 2 主蛋白激酶机制靶标的胆固醇依赖性激活。然而，LYCHOS 组装和活性的结构基础仍不清楚。在这里，我们确定了人类 LYCHOS 的几种高分辨率冷冻电子显微镜结构，揭示了与 G 蛋白偶联受体 (GPCR) 结构域融合的转运蛋白样结构域的同二聚跨膜组装。 B2 类 GPCR 结构域在 apo 状态下被捕获，并堆积在类转运蛋白结构域的表面，这提供了 GPCR 作为较大跨膜组件中的结构域的一个不寻常的例子。胆固醇传感由位于 GPCR 和转运蛋白结构域之间的保守胆固醇结合基序介导。我们发现，LYCHOS 转运蛋白样结构域是植物 PIN 型 (PIN) 生长素转运蛋白家族的直系同源物，与已知的人类转运蛋白相比，与植物生长素转运蛋白具有更大的结构相似性。活性测定支持一个模型，其中 LYCHOS 转运蛋白和 GPCR 结构域协调来感知胆固醇并调节 mTORC1 激活。", "titleZh": "LYCHOS 是类植物 PIN 转运蛋白和 GPCR 的人类杂交体。", "translationSource": "cbb10a14a6589378"}, {"pmid": "38081298", "title": "SlyB encapsulates outer membrane proteins in stress-induced lipid nanodomains.", "journal": "Nature", "year": 2024, "published": "2024-02-01", "doi": "10.1038/s41586-023-06925-5", "doiUrl": "https://doi.org/10.1038/s41586-023-06925-5", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/38081298/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "The outer membrane in Gram-negative bacteria consists of an asymmetric phospholipid-lipopolysaccharide bilayer that is densely packed with outer-membrane β-barrel proteins (OMPs) and lipoproteins 1 . The architecture and composition of this bilayer is closely monitored and is essential to cell integrity and survival 2-4 . Here we find that SlyB, a lipoprotein in the PhoPQ stress regulon, forms stable stress-induced complexes with the outer-membrane proteome. SlyB comprises a 10 kDa periplasmic β-sandwich domain and a glycine zipper domain that forms a transmembrane α-helical hairpin with discrete phospholipid- and lipopolysaccharide-binding sites. After loss in lipid asymmetry, SlyB oligomerizes into ring-shaped transmembrane complexes that encapsulate β-barrel proteins into lipid nanodomains of variable size. We find that the formation of SlyB nanodomains is essential during lipopolysaccharide destabilization by antimicrobial peptides or acute cation shortage, conditions that result in a loss of OMPs and compromised outer-membrane barrier function in the absence of a functional SlyB. Our data reveal that SlyB is a compartmentalizing transmembrane guard protein that is involved in cell-envelope proteostasis and integrity, and suggest that SlyB represents a larger family of broadly conserved lipoproteins with 2TM glycine zipper domains with the ability to form lipid nanodomains.", "summaryZh": "革兰氏阴性细菌的外膜由不对称的磷脂-脂多糖双层组成，其中紧密包裹着外膜 β-桶蛋白 (OMP) 和脂蛋白 1 。该双层的结构和组成受到密切监控，对于细胞完整性和存活至关重要 2-4 。在这里，我们发现 PhoPQ 应激调节子中的脂蛋白 SlyB 与外膜蛋白质组形成稳定的应激诱导复合物。 SlyB 包含 10 kDa 周质 β-夹心结构域和甘氨酸拉链结构域，形成跨膜 α-螺旋发夹，具有离散的磷脂和脂多糖结合位点。脂质不对称性丧失后，SlyB 寡聚成环形跨膜复合物，将 β-桶蛋白封装到不同大小的脂质纳米结构域中。我们发现，SlyB 纳米结构域的形成在抗菌肽或急性阳离子短缺引起的脂多糖不稳定过程中至关重要，在缺乏功能性 SlyB 的情况下，这些条件会导致 OMP 损失和外膜屏障功能受损。我们的数据表明，SlyB 是一种区室跨膜保护蛋白，参与细胞包膜蛋白质稳态和完整性，并表明 SlyB 代表了一个更大的广泛保守脂蛋白家族，具有 2TM 甘氨酸拉链结构域，能够形成脂质纳米结构域。", "titleZh": "SlyB 将外膜蛋白封装在应激诱导的脂质纳米结构域中。", "translationSource": "76ab3a66feb38383"}, {"pmid": "38101409", "title": "Super-enhancers include classical enhancers and facilitators to fully activate gene expression.", "journal": "Cell", "year": 2023, "published": "2023-12-21", "doi": "10.1016/j.cell.2023.11.030", "doiUrl": "https://doi.org/10.1016/j.cell.2023.11.030", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/38101409/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Super-enhancers are compound regulatory elements that control expression of key cell identity genes. They recruit high levels of tissue-specific transcription factors and co-activators such as the Mediator complex and contact target gene promoters with high frequency. Most super-enhancers contain multiple constituent regulatory elements, but it is unclear whether these elements have distinct roles in activating target gene expression. Here, by rebuilding the endogenous multipartite α-globin super-enhancer, we show that it contains bioinformatically equivalent but functionally distinct element types: classical enhancers and facilitator elements. Facilitators have no intrinsic enhancer activity, yet in their absence, classical enhancers are unable to fully upregulate their target genes. Without facilitators, classical enhancers exhibit reduced Mediator recruitment, enhancer RNA transcription, and enhancer-promoter interactions. Facilitators are interchangeable but display functional hierarchy based on their position within a multipartite enhancer. Facilitators thus play an important role in potentiating the activity of classical enhancers and ensuring robust activation of target genes.", "summaryZh": "超级增强子是控制关键细胞识别基因表达的复合调节元件。它们以高频率招募高水平的组织特异性转录因子和共激活子，例如介体复合物和接触靶基因启动子。大多数超级增强子含有多个组成调控元件，但尚不清楚这些元件在激活靶基因表达中是否具有不同的作用。在这里，通过重建内源性多部分 α-珠蛋白超级增强子，我们表明它包含生物信息学上等效但功能不同的元素类型：经典增强子和促进子元素。促进子没有内在的增强子活性，但在缺乏增强子的情况下，经典增强子无法完全上调其靶基因。如果没有促进子，经典增强子会表现出介体招募、增强子 RNA 转录和增强子-启动子相互作用减少。促进者是可以互换的，但根据其在多部分增强器中的位置显示功能层次结构。因此，促进子在增强经典增强子的活性和确保靶基因的稳健激活方面发挥着重要作用。", "titleZh": "超级增强子包括经典增强子和促进子，以充分激活基因表达。", "translationSource": "d4a4f6226568beee"}, {"pmid": "37992713", "title": "Glycosylated queuosines in tRNAs optimize translational rate and post-embryonic growth.", "journal": "Cell", "year": 2023, "published": "2023-12-07", "doi": "10.1016/j.cell.2023.10.026", "doiUrl": "https://doi.org/10.1016/j.cell.2023.10.026", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37992713/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "Transfer RNA (tRNA) modifications are critical for protein synthesis. Queuosine (Q), a 7-deaza-guanosine derivative, is present in tRNA anticodons. In vertebrate tRNAs for Tyr and Asp, Q is further glycosylated with galactose and mannose to generate galQ and manQ, respectively. However, biogenesis and physiological relevance of Q-glycosylation remain poorly understood. Here, we biochemically identified two RNA glycosylases, QTGAL and QTMAN, and successfully reconstituted Q-glycosylation of tRNAs using nucleotide diphosphate sugars. Ribosome profiling of knockout cells revealed that Q-glycosylation slowed down elongation at cognate codons, UAC and GAC (GAU), respectively. We also found that galactosylation of Q suppresses stop codon readthrough. Moreover, protein aggregates increased in cells lacking Q-glycosylation, indicating that Q-glycosylation contributes to proteostasis. Cryo-EM of human ribosome-tRNA complex revealed the molecular basis of codon recognition regulated by Q-glycosylations. Furthermore, zebrafish qtgal and qtman knockout lines displayed shortened body length, implying that Q-glycosylation is required for post-embryonic growth in vertebrates.", "summaryZh": "转移 RNA (tRNA) 修饰对于蛋白质合成至关重要。 Queuosine (Q) 是一种 7-脱氮鸟苷衍生物，存在于 tRNA 反密码子中。在脊椎动物的 Tyr 和 Asp tRNA 中，Q 进一步被半乳糖和甘露糖糖基化，分别生成 galQ 和 manQ。然而，Q-糖基化的生物发生和生理相关性仍然知之甚少。在这里，我们通过生化方法鉴定了两种 RNA 糖基化酶 QTGAL 和 QTMAN，并使用核苷酸二磷酸糖成功重建了 tRNA 的 Q-糖基化。敲除细胞的核糖体分析表明，Q-糖基化分别减缓了同源密码子 UAC 和 GAC (GAU) 的延伸。我们还发现 Q 的半乳糖基化抑制终止密码子通读。此外，缺乏 Q-糖基化的细胞中蛋白质聚集体增加，表明 Q-糖基化有助于蛋白质稳态。人核糖体-tRNA 复合物的冷冻电镜揭示了受 Q-糖基化调节的密码子识别的分子基础。此外，斑马鱼 qtgal 和 qtman 敲除系表现出体长缩短，这意味着脊椎动物胚胎后生长需要 Q-糖基化。", "titleZh": "tRNA 中的糖基化队列优化了翻译速率和胚胎后生长。", "translationSource": "f7820fe9c1deb197"}, {"pmid": "37993723", "title": "Publisher Correction: Stress granules plug and stabilize damaged endolysosomal membranes.", "journal": "Nature", "year": 2023, "published": "2023-12-01", "doi": "10.1038/s41586-023-06882-z", "doiUrl": "https://doi.org/10.1038/s41586-023-06882-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37993723/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, endolysosomal。", "abstractEn": "", "summaryZh": "PubMed 未提供可翻译的摘要。", "titleZh": "出版商更正：应激颗粒堵塞并稳定受损的内溶酶体膜。", "translationSource": "57aaa95f3e05bc4c"}, {"pmid": "37944512", "title": "Design, construction, and functional characterization of a tRNA neochromosome in yeast.", "journal": "Cell", "year": 2023, "published": "2023-11-22", "doi": "10.1016/j.cell.2023.10.015", "doiUrl": "https://doi.org/10.1016/j.cell.2023.10.015", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37944512/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Here, we report the design, construction, and characterization of a tRNA neochromosome, a designer chromosome that functions as an additional, de novo counterpart to the native complement of Saccharomyces cerevisiae. Intending to address one of the central design principles of the Sc2.0 project, the ∼190-kb tRNA neochromosome houses all 275 relocated nuclear tRNA genes. To maximize stability, the design incorporates orthogonal genetic elements from non-S. cerevisiae yeast species. Furthermore, the presence of 283 rox recombination sites enables an orthogonal tRNA SCRaMbLE system. Following construction in yeast, we obtained evidence of a potent selective force, manifesting as a spontaneous doubling in cell ploidy. Furthermore, tRNA sequencing, transcriptomics, proteomics, nucleosome mapping, replication profiling, FISH, and Hi-C were undertaken to investigate questions of tRNA neochromosome behavior and function. Its construction demonstrates the remarkable tractability of the yeast model and opens up opportunities to directly test hypotheses surrounding these essential non-coding RNAs.", "summaryZh": "在这里，我们报告了 tRNA 新染色体的设计、构建和表征，这是一种设计染色体，可作为酿酒酵母天然互补体的额外的从头对应物。为了解决 Sc2.0 项目的核心设计原则之一，~190-kb tRNA 新染色体容纳了所有 275 个重新定位的核 tRNA 基因。为了最大限度地提高稳定性，该设计结合了来自非 S 的正交遗传元件。酿酒酵母种类。此外，283 个 rox 重组位点的存在使得正交 tRNA SCRaMbLE 系统成为可能。在酵母中构建后，我们获得了有效选择力的证据，表现为细胞倍性的自发加倍。此外，还采用 tRNA 测序、转录组学、蛋白质组学、核小体作图、复制分析、FISH 和 Hi-C 来研究 tRNA 新染色体行为和功能的问题。它的构建展示了酵母模型卓越的易处理性，并为直接测试围绕这些重要非编码 RNA 的假设提供了机会。", "titleZh": "酵母 tRNA 新染色体的设计、构建和功能表征。", "translationSource": "3fd9c619ee184e91"}, {"pmid": "37944511", "title": "Debugging and consolidating multiple synthetic chromosomes reveals combinatorial genetic interactions.", "journal": "Cell", "year": 2023, "published": "2023-11-22", "doi": "10.1016/j.cell.2023.09.025", "doiUrl": "https://doi.org/10.1016/j.cell.2023.09.025", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37944511/", "categories": ["合成生物学"], "matchedTerms": ["synthetic genome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic genome。", "abstractEn": "The Sc2.0 project is building a eukaryotic synthetic genome from scratch. A major milestone has been achieved with all individual Sc2.0 chromosomes assembled. Here, we describe the consolidation of multiple synthetic chromosomes using advanced endoreduplication intercrossing with tRNA expression cassettes to generate a strain with 6.5 synthetic chromosomes. The 3D chromosome organization and transcript isoform profiles were evaluated using Hi-C and long-read direct RNA sequencing. We developed CRISPR Directed Biallelic URA3-assisted Genome Scan, or \"CRISPR D-BUGS,\" to map phenotypic variants caused by specific designer modifications, known as \"bugs.\" We first fine-mapped a bug in synthetic chromosome II (synII) and then discovered a combinatorial interaction associated with synIII and synX, revealing an unexpected genetic interaction that links transcriptional regulation, inositol metabolism, and tRNA Ser CGA abundance. Finally, to expedite consolidation, we employed chromosome substitution to incorporate the largest chromosome (synIV), thereby consolidating >50% of the Sc2.0 genome in one strain.", "summaryZh": "Sc2.0项目正在从头开始构建真核合成基因组。所有单独的 Sc2.0 染色体的组装已经实现了一个重要的里程碑。在这里，我们描述了使用先进的内复制与 tRNA 表达盒交叉来整合多个合成染色体，以生成具有 6.5 条合成染色体的菌株。使用 Hi-C 和长读长直接 RNA 测序评估 3D 染色体组织和转录亚型图谱。我们开发了 CRISPR 定向双等位基因 URA3 辅助基因组扫描，或“CRISPR D-BUGS”，以绘制由特定设计者修改（称为“bug”）引起的表型变异。我们首先精细定位了合成染色体 II (synII) 中的一个错误，然后发现了与 synIII 和 synX 相关的组合相互作用，揭示了一种意想不到的遗传相互作用，该相互作用将转录调控、肌醇代谢和 tRNA Ser CGA 丰度联系起来。最后，为了加速整合，我们采用染色体替换来合并最大的染色体 (synIV)，从而将 > 50% 的 Sc2.0 基因组整合到一个菌株中。", "titleZh": "调试和整合多个合成染色体揭示了组合遗传相互作用。", "translationSource": "6418c616cb553eab"}, {"pmid": "37883971", "title": "Nutrient-regulated control of lysosome function by signaling lipid conversion.", "journal": "Cell", "year": 2023, "published": "2023-11-22", "doi": "10.1016/j.cell.2023.09.027", "doiUrl": "https://doi.org/10.1016/j.cell.2023.09.027", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37883971/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "Lysosomes serve dual antagonistic functions in cells by mediating anabolic growth signaling and the catabolic turnover of macromolecules. How these janus-faced activities are regulated in response to cellular nutrient status is poorly understood. We show here that lysosome morphology and function are reversibly controlled by a nutrient-regulated signaling lipid switch that triggers the conversion between peripheral motile mTOR complex 1 (mTORC1) signaling-active and static mTORC1-inactive degradative lysosomes clustered at the cell center. Starvation-triggered relocalization of phosphatidylinositol 4-phosphate (PI(4)P)-metabolizing enzymes reshapes the lysosomal surface proteome to facilitate lysosomal proteolysis and to repress mTORC1 signaling. Concomitantly, lysosomal phosphatidylinositol 3-phosphate (PI(3)P), which marks motile signaling-active lysosomes in the cell periphery, is erased. Interference with this PI(3)P/PI(4)P lipid switch module impairs the adaptive response of cells to altering nutrient supply. Our data unravel a key function for lysosomal phosphoinositide metabolism in rewiring organellar membrane dynamics in response to cellular nutrient status.", "summaryZh": "溶酶体通过介导合成代谢生长信号和大分子的分解代谢周转在细胞中发挥双重拮抗功能。人们对这些两面性活动如何根据细胞营养状态进行调节的了解甚少。我们在这里表明，溶酶体的形态和功能是由营养调节的信号脂质开关可逆控制的，该开关触发聚集在细胞中心的外周运动mTOR复合物1（mTORC1）信号活性和静态mTORC1非活性降解溶酶体之间的转换。饥饿触发的 4-磷酸磷脂酰肌醇 (PI(4)P) 代谢酶的重新定位会重塑溶酶体表面蛋白质组，以促进溶酶体蛋白水解并抑制 mTORC1 信号传导。与此同时，标记细胞外周运动信号活性溶酶体的溶酶体磷脂酰肌醇 3-磷酸 (PI(3)P) 被擦除。干扰这种 PI(3)P/PI(4)P 脂质开关模块会损害细胞对改变营养供应的适应性反应。我们的数据揭示了溶酶体磷酸肌醇代谢在重新连接细胞器膜动力学以响应细胞营养状态中的关键功能。", "titleZh": "通过信号脂质转化来调节溶酶体功能的营养调节。", "translationSource": "b831e3ef2b7c5cf1"}, {"pmid": "37949057", "title": "Proteostasis governs differential temperature sensitivity across embryonic cell types.", "journal": "Cell", "year": 2023, "published": "2023-11-09", "doi": "10.1016/j.cell.2023.10.013", "doiUrl": "https://doi.org/10.1016/j.cell.2023.10.013", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37949057/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "Embryonic development is remarkably robust, but temperature stress can degrade its ability to generate animals with invariant anatomy. Phenotypes associated with environmental stress suggest that some cell types are more sensitive to stress than others, but the basis of this sensitivity is unknown. Here, we characterize hundreds of individual zebrafish embryos under temperature stress using whole-animal single-cell RNA sequencing (RNA-seq) to identify cell types and molecular programs driving phenotypic variability. We find that temperature perturbs the normal proportions and gene expression programs of numerous cell types and also introduces asynchrony in developmental timing. The notochord is particularly sensitive to temperature, which we map to a specialized cell type: sheath cells. These cells accumulate misfolded protein at elevated temperature, leading to a cascading structural failure of the notochord and anatomic defects. Our study demonstrates that whole-animal single-cell RNA-seq can identify mechanisms for developmental robustness and pinpoint cell types that constitute key failure points.", "summaryZh": "胚胎发育非常强劲，但温度应激会降低其产生具有不变解剖结构的动物的能力。与环境压力相关的表型表明某些细胞类型比其他细胞类型对压力更敏感，但这种敏感性的基础尚不清楚。在这里，我们使用全动物单细胞 RNA 测序 (RNA-seq) 来表征温度应激下的数百个斑马鱼胚胎，以识别驱动表型变异的细胞类型和分子程序。我们发现温度扰乱了多种细胞类型的正常比例和基因表达程序，并且还引入了发育时间的异步性。脊索对温度特别敏感，我们将其映射到一种特殊的细胞类型：鞘细胞。这些细胞在高温下积累错误折叠的蛋白质，导致脊索的级联结构故障和解剖缺陷。我们的研究表明，全动物单细胞 RNA-seq 可以识别发育稳健性的机制，并查明构成关键失败点的细胞类型。", "titleZh": "蛋白质稳态控制胚胎细胞类型的不同温度敏感性。", "translationSource": "b4134550595f87c8"}, {"pmid": "37968398", "title": "Stress granules plug and stabilize damaged endolysosomal membranes.", "journal": "Nature", "year": 2023, "published": "2023-11-01", "doi": "10.1038/s41586-023-06726-w", "doiUrl": "https://doi.org/10.1038/s41586-023-06726-w", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37968398/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal, endolysosomal。", "abstractEn": "Endomembrane damage represents a form of stress that is detrimental for eukaryotic cells 1,2 . To cope with this threat, cells possess mechanisms that repair the damage and restore cellular homeostasis 3-7 . Endomembrane damage also results in organelle instability and the mechanisms by which cells stabilize damaged endomembranes to enable membrane repair remains unknown. Here, by combining in vitro and in cellulo studies with computational modelling we uncover a biological function for stress granules whereby these biomolecular condensates form rapidly at endomembrane damage sites and act as a plug that stabilizes the ruptured membrane. Functionally, we demonstrate that stress granule formation and membrane stabilization enable efficient repair of damaged endolysosomes, through both ESCRT (endosomal sorting complex required for transport)-dependent and independent mechanisms. We also show that blocking stress granule formation in human macrophages creates a permissive environment for Mycobacterium tuberculosis, a human pathogen that exploits endomembrane damage to survive within the host.", "summaryZh": "内膜损伤代表一种对真核细胞有害的应激形式 1,2 。为了应对这种威胁，细胞拥有修复损伤并恢复细胞稳态的机制 3-7 。内膜损伤还会导致细胞器不稳定，而细胞稳定受损内膜以实现膜修复的机制仍不清楚。在这里，通过将体外和细胞研究与计算模型相结合，我们发现了应激颗粒的生物学功能，即这些生物分子凝聚物在内膜损伤部位快速形成，并充当稳定破裂膜的塞子。在功能上，我们证明应力颗粒的形成和膜稳定能够通过ESCRT（运输所需的内体分选复合物）依赖和独立的机制有效修复受损的内溶酶体。我们还表明，阻断人类巨噬细胞中应激颗粒的形成为结核分枝杆菌创造了一个宽松的环境，结核分枝杆菌是一种利用内膜损伤在宿主体内生存的人类病原体。", "titleZh": "应激颗粒堵塞并稳定受损的内溶酶体膜。", "translationSource": "5c1c2ba98b455928"}, {"pmid": "37968394", "title": "Illuminating protein space with a programmable generative model.", "journal": "Nature", "year": 2023, "published": "2023-11-01", "doi": "10.1038/s41586-023-06728-8", "doiUrl": "https://doi.org/10.1038/s41586-023-06728-8", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37968394/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Three billion years of evolution has produced a tremendous diversity of protein molecules 1 , but the full potential of proteins is likely to be much greater. Accessing this potential has been challenging for both computation and experiments because the space of possible protein molecules is much larger than the space of those likely to have functions. Here we introduce Chroma, a generative model for proteins and protein complexes that can directly sample novel protein structures and sequences, and that can be conditioned to steer the generative process towards desired properties and functions. To enable this, we introduce a diffusion process that respects the conformational statistics of polymer ensembles, an efficient neural architecture for molecular systems that enables long-range reasoning with sub-quadratic scaling, layers for efficiently synthesizing three-dimensional structures of proteins from predicted inter-residue geometries and a general low-temperature sampling algorithm for diffusion models. Chroma achieves protein design as Bayesian inference under external constraints, which can involve symmetries, substructure, shape, semantics and even natural-language prompts. The experimental characterization of 310 proteins shows that sampling from Chroma results in proteins that are highly expressed, fold and have favourable biophysical properties. The crystal structures of two designed proteins exhibit atomistic agreement with Chroma samples (a backbone root-mean-square deviation of around 1.0 Å). With this unified approach to protein design, we hope to accelerate the programming of protein matter to benefit human health, materials science and synthetic biology.", "summaryZh": "三十亿年的进化已经产生了蛋白质分子的巨大多样性 1 ，但蛋白质的全部潜力可能要大得多。挖掘这种潜力对于计算和实验来说都是一个挑战，因为可能的蛋白质分子的空间比那些可能具有功能的空间大得多。在这里，我们介绍 Chroma，一种蛋白质和蛋白质复合物的生成模型，可以直接对新的蛋白质结构和序列进行采样，并且可以进行调节以引导生成过程实现所需的特性和功能。为了实现这一点，我们引入了一种尊重聚合物整体构象统计的扩散过程、一种有效的分子系统神经架构，可以通过次二次缩放进行远程推理、根据预测的残基间几何形状有效合成蛋白质三维结构的层，以及扩散模型的通用低温采样算法。 Chroma 将蛋白质设计实现为外部约束下的贝叶斯推理，其中可能涉及对称性、子结构、形状、语义甚至自然语言提示。 310 种蛋白质的实验表征表明，从 Chroma 取样可产生高度表达、折叠并具有良好生物物理特性的蛋白质。两种设计的蛋白质的晶体结构与 Chroma 样品表现出原子一致性（主链均方根偏差约为 1.0 Å）。通过这种统一的蛋白质设计方法，我们希望加速蛋白质物质的编程，以造福人类健康、材料科学和合成生物学。", "titleZh": "用可编程生成模型照亮蛋白质空间。", "translationSource": "59b2020740ae1b0d"}, {"pmid": "37914927", "title": "Mouse genome rewriting and tailoring of three important disease loci.", "journal": "Nature", "year": 2023, "published": "2023-11-01", "doi": "10.1038/s41586-023-06675-4", "doiUrl": "https://doi.org/10.1038/s41586-023-06675-4", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37914927/", "categories": ["合成生物学"], "matchedTerms": ["genome writing"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：genome writing。", "abstractEn": "Genetically engineered mouse models (GEMMs) help us to understand human pathologies and develop new therapies, yet faithfully recapitulating human diseases in mice is challenging. Advances in genomics have highlighted the importance of non-coding regulatory genome sequences, which control spatiotemporal gene expression patterns and splicing in many human diseases 1,2 . Including regulatory extensive genomic regions, which requires large-scale genome engineering, should enhance the quality of disease modelling. Existing methods set limits on the size and efficiency of DNA delivery, hampering the routine creation of highly informative models that we call genomically rewritten and tailored GEMMs (GREAT-GEMMs). Here we describe 'mammalian switching antibiotic resistance markers progressively for integration' (mSwAP-In), a method for efficient genome rewriting in mouse embryonic stem cells. We demonstrate the use of mSwAP-In for iterative genome rewriting of up to 115 kb of a tailored Trp53 locus, as well as for humanization of mice using 116 kb and 180 kb human ACE2 loci. The ACE2 model recapitulated human ACE2 expression patterns and splicing, and notably, presented milder symptoms when challenged with SARS-CoV-2 compared with the existing K18-hACE2 model, thus representing a more human-like model of infection. Finally, we demonstrated serial genome writing by humanizing mouse Tmprss2 biallelically in the ACE2 GREAT-GEMM, highlighting the versatility of mSwAP-In in genome writing.", "summaryZh": "基因工程小鼠模型（GEMM）帮助我们了解人类病理学并开发新疗法，但在小鼠中忠实地重现人类疾病具有挑战性。基因组学的进步凸显了非编码调控基因组序列的重要性，它控制着许多人类疾病中的时空基因表达模式和剪接 1,2 。包括需要大规模基因组工程的广泛监管基因组区域，应该可以提高疾病建模的质量。现有方法对 DNA 传递的大小和效率设置了限制，阻碍了高信息量模型的常规创建，我们称之为基因组重写和定制 GEMM（GREAT-GEMM）。在这里，我们描述了“哺乳动物逐步转换抗生素抗性标记以进行整合”（mSwAP-In），这是一种在小鼠胚胎干细胞中有效重写基因组的方法。我们演示了使用 mSwAP-In 对高达 115 kb 的定制 Trp53 位点进行迭代基因组重写，以及使用 116 kb 和 180 kb 人类 ACE2 位点对小鼠进行人源化。 ACE2 模型重现了人类 ACE2 表达模式和剪接，值得注意的是，与现有的 K18-hACE2 模型相比，在受到 SARS-CoV-2 攻击时表现出更轻微的症状，因此代表了一种更类似于人类的感染模型。最后，我们在 ACE2 GREAT-GEMM 中演示了通过人源化小鼠 Tmprss2 双等位基因进行连续基因组写入，强调了 mSwAP-In 在基因组写入中的多功能性。", "titleZh": "小鼠基因组重写和三个重要疾病位点的剪裁。", "translationSource": "617ca72390a474f4"}, {"pmid": "37774705", "title": "Synthetic Par polarity induces cytoskeleton asymmetry in unpolarized mammalian cells.", "journal": "Cell", "year": 2023, "published": "2023-10-12", "doi": "10.1016/j.cell.2023.08.034", "doiUrl": "https://doi.org/10.1016/j.cell.2023.08.034", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/37774705/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Polarized cells rely on a polarized cytoskeleton to function. Yet, how cortical polarity cues induce cytoskeleton polarization remains elusive. Here, we capitalized on recently established designed 2D protein arrays to ectopically engineer cortical polarity of virtually any protein of interest during mitosis in various cell types. This enables direct manipulation of polarity signaling and the identification of the cortical cues sufficient for cytoskeleton polarization. Using this assay, we dissected the logic of the Par complex pathway, a key regulator of cytoskeleton polarity during asymmetric cell division. We show that cortical clustering of any Par complex subunit is sufficient to trigger complex assembly and that the primary kinetic barrier to complex assembly is the relief of Par6 autoinhibition. Further, we found that inducing cortical Par complex polarity induces two hallmarks of asymmetric cell division in unpolarized mammalian cells: spindle orientation, occurring via Par3, and central spindle asymmetry, depending on aPKC activity.", "summaryZh": "极化细胞依靠极化细胞骨架来发挥作用。然而，皮质极性线索如何诱导细胞骨架极化仍然难以捉摸。在这里，我们利用最近建立的设计的二维蛋白质阵列来异位设计几乎任何感兴趣的蛋白质在各种细胞类型的有丝分裂过程中的皮质极性。这使得能够直接操纵极性信号传导并识别足以细胞骨架极化的皮质线索。使用这种测定，我们剖析了 Par 复合体途径的逻辑，Par 复合体途径是不对称细胞分裂过程中细胞骨架极性的关键调节因子。我们表明，任何 Par 复合体亚基的皮质聚类足以触发复合体组装，并且复合体组装的主要动力学障碍是 Par6 自抑制的缓解。此外，我们发现诱导皮质 Par 复合体极性会诱导非极化哺乳动物细胞中不对称细胞分裂的两个特征：纺锤体方向（通过 Par3 发生）和中央纺锤体不对称（取决于 aPKC 活性）。", "titleZh": "合成 Par 极性会诱导未极化哺乳动物细胞的细胞骨架不对称。", "translationSource": "7a94165089081371"}, {"pmid": "36493755", "title": "Structural visualization of the tubulin folding pathway directed by human chaperonin TRiC/CCT.", "journal": "Cell", "year": 2022, "published": "2022-12-08", "doi": "10.1016/j.cell.2022.11.014", "doiUrl": "https://doi.org/10.1016/j.cell.2022.11.014", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36493755/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "The ATP-dependent ring-shaped chaperonin TRiC/CCT is essential for cellular proteostasis. To uncover why some eukaryotic proteins can only fold with TRiC assistance, we reconstituted the folding of β-tubulin using human prefoldin and TRiC. We find unstructured β-tubulin is delivered by prefoldin to the open TRiC chamber followed by ATP-dependent chamber closure. Cryo-EM resolves four near-atomic-resolution structures containing progressively folded β-tubulin intermediates within the closed TRiC chamber, culminating in native tubulin. This substrate folding pathway appears closely guided by site-specific interactions with conserved regions in the TRiC chamber. Initial electrostatic interactions between the TRiC interior wall and both the folded tubulin N domain and its C-terminal E-hook tail establish the native substrate topology, thus enabling C-domain folding. Intrinsically disordered CCT C termini within the chamber promote subsequent folding of tubulin's core and middle domains and GTP-binding. Thus, TRiC's chamber provides chemical and topological directives that shape the folding landscape of its obligate substrates.", "summaryZh": "ATP 依赖性环状伴侣蛋白 TRiC/CCT 对于细胞蛋白质稳态至关重要。为了揭示为什么一些真核蛋白只能在 TRiC 的帮助下折叠，我们使用人预折叠蛋白和 TRiC 重建了 β-微管蛋白的折叠。我们发现非结构化 β-微管蛋白通过预折叠蛋白递送至开放的 TRiC 室，然后依赖 ATP 关闭室。冷冻电镜可解析封闭 TRiC 室内包含逐渐折叠的 β-微管蛋白中间体的四种近原子分辨率结构，最终形成天然微管蛋白。该底物折叠途径似乎受到与 TRiC 室中保守区域的位点特异性相互作用的密切引导。 TRiC 内壁与折叠的微管蛋白 N 结构域及其 C 端 E 钩尾之间的初始静电相互作用建立了天然底物拓扑，从而实现了 C 结构域折叠。腔内本质上无序的 CCT C 末端促进微管蛋白核心和中间结构域的后续折叠以及 GTP 结合。因此，TRiC 的腔室提供了化学和拓扑指令，以塑造其专用基板的折叠景观。", "titleZh": "由人伴侣蛋白 TRiC/CCT 指导的微管蛋白折叠途径的结构可视化。", "translationSource": "e54c2e4cd61e65f2"}, {"pmid": "36477541", "title": "A plant-derived natural photosynthetic system for improving cell anabolism.", "journal": "Nature", "year": 2022, "published": "2022-12-01", "doi": "10.1038/s41586-022-05499-y", "doiUrl": "https://doi.org/10.1038/s41586-022-05499-y", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36477541/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome。", "abstractEn": "Insufficient intracellular anabolism is a crucial factor involved in many pathological processes in the body 1,2 . The anabolism of intracellular substances requires the consumption of sufficient intracellular energy and the production of reducing equivalents. ATP acts as an 'energy currency' for biological processes in cells 3,4 , and the reduced form of NADPH is a key electron donor that provides reducing power for anabolism 5 . Under pathological conditions, it is difficult to correct impaired anabolism and to increase insufficient levels of ATP and NADPH to optimum concentrations 1,4,6-8 . Here we develop an independent and controllable nanosized plant-derived photosynthetic system based on nanothylakoid units (NTUs). To enable cross-species applications, we use a specific mature cell membrane (the chondrocyte membrane (CM)) for camouflage encapsulation. As proof of concept, we demonstrate that these CM-NTUs enter chondrocytes through membrane fusion, avoid lysosome degradation and achieve rapid penetration. Moreover, the CM-NTUs increase intracellular ATP and NADPH levels in situ following exposure to light and improve anabolism in degenerated chondrocytes. They can also systemically correct energy imbalance and restore cellular metabolism to improve cartilage homeostasis and protect against pathological progression of osteoarthritis. Our therapeutic strategy for degenerative diseases is based on a natural photosynthetic system that can controllably enhance cell anabolism by independently providing key energy and metabolic carriers. This study also provides an enhanced understanding of the preparation and application of bioorganisms and composite biomaterials for the treatment of disease.", "summaryZh": "细胞内合成代谢不足是体内许多病理过程的关键因素 1,2 。细胞内物质的合成代谢需要消耗足够的细胞内能量并产生还原当量。 ATP 充当细胞生物过程的“能量货币” 3,4 ，而 NADPH 的还原形式是关键的电子供体，为合成代谢提供还原能力 5 。在病理条件下，很难纠正受损的合成代谢并将不足的 ATP 和 NADPH 水平增加到最佳浓度 1,4,6-8 。在这里，我们开发了一种基于纳米类囊体单位（NTU）的独立可控的纳米级植物源光合作用系统。为了实现跨物种应用，我们使用特定的成熟细胞膜（软骨细胞膜（CM））进行伪装封装。作为概念证明，我们证明这些 CM-NTU 通过膜融合进入软骨细胞，避免溶酶体降解并实现快速渗透。此外，CM-NTU 在暴露于光后原位增加细胞内 ATP 和 NADPH 水平，并改善退化软骨细胞的合成代谢。它们还可以系统地纠正能量失衡并恢复细胞代谢，以改善软骨稳态并防止骨关节炎的病理进展。我们针对退行性疾病的治疗策略基于自然光合作用系统，该系统可以通过独立提供关键能量和代谢载体来可控地增强细胞合成代谢。这项研究还加深了人们对生物有机体和复合生物材料用于治疗疾病的制备和应用的理解。", "titleZh": "一种源自植物的天然光合作用系统，用于改善细胞合成代谢。", "translationSource": "bf25030a46324c22"}, {"pmid": "36450991", "title": "PLD3 affects axonal spheroids and network defects in Alzheimer's disease.", "journal": "Nature", "year": 2022, "published": "2022-12-01", "doi": "10.1038/s41586-022-05491-6", "doiUrl": "https://doi.org/10.1038/s41586-022-05491-6", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36450991/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, endolysosomal。", "abstractEn": "The precise mechanisms that lead to cognitive decline in Alzheimer's disease are unknown. Here we identify amyloid-plaque-associated axonal spheroids as prominent contributors to neural network dysfunction. Using intravital calcium and voltage imaging, we show that a mouse model of Alzheimer's disease demonstrates severe disruption in long-range axonal connectivity. This disruption is caused by action-potential conduction blockades due to enlarging spheroids acting as electric current sinks in a size-dependent manner. Spheroid growth was associated with an age-dependent accumulation of large endolysosomal vesicles and was mechanistically linked with Pld3-a potential Alzheimer's-disease-associated risk gene 1 that encodes a lysosomal protein 2,3 that is highly enriched in axonal spheroids. Neuronal overexpression of Pld3 led to endolysosomal vesicle accumulation and spheroid enlargement, which worsened axonal conduction blockades. By contrast, Pld3 deletion reduced endolysosomal vesicle and spheroid size, leading to improved electrical conduction and neural network function. Thus, targeted modulation of endolysosomal biogenesis in neurons could potentially reverse axonal spheroid-induced neural circuit abnormalities in Alzheimer's disease, independent of amyloid removal.", "summaryZh": "导致阿尔茨海默病认知能力下降的确切机制尚不清楚。在这里，我们确定淀粉样斑块相关的轴突球体是神经网络功能障碍的重要贡献者。使用活体钙和电压成像，我们发现阿尔茨海默病小鼠模型表现出长程轴突连接的严重破坏。这种破坏是由于扩大的球体以尺寸相关的方式充当电流吸收器而导致的动作电位传导阻断引起的。球状体的生长与年龄依赖性的大溶酶体囊泡的积累有关，并且与 Pld3 有机械联系，Pld3 是一种潜在的阿尔茨海默病相关风险基因 1，它编码在轴突球状体中高度富集的溶酶体蛋白 2,3。 Pld3 的神经元过度表达导致内溶酶体囊泡积聚和球体增大，从而加剧轴突传导阻滞。相比之下，Pld3 缺失减少了内溶酶体囊泡和球体的大小，从而改善了电传导和神经网络功能。因此，有针对性地调节神经元内溶酶体生物发生可能会逆转阿尔茨海默病中轴突球体诱导的神经回路异常，而与淀粉样蛋白的去除无关。", "titleZh": "PLD3 影响阿尔茨海默病中的轴突球体和网络缺陷。", "translationSource": "888a744fca985d91"}, {"pmid": "36424410", "title": "MYC multimers shield stalled replication forks from RNA polymerase.", "journal": "Nature", "year": 2022, "published": "2022-12-01", "doi": "10.1038/s41586-022-05469-4", "doiUrl": "https://doi.org/10.1038/s41586-022-05469-4", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36424410/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteasome。", "abstractEn": "Oncoproteins of the MYC family drive the development of numerous human tumours 1 . In unperturbed cells, MYC proteins bind to nearly all active promoters and control transcription by RNA polymerase II 2,3 . MYC proteins can also coordinate transcription with DNA replication 4,5 and promote the repair of transcription-associated DNA damage 6 , but how they exert these mechanistically diverse functions is unknown. Here we show that MYC dissociates from many of its binding sites in active promoters and forms multimeric, often sphere-like structures in response to perturbation of transcription elongation, mRNA splicing or inhibition of the proteasome. Multimerization is accompanied by a global change in the MYC interactome towards proteins involved in transcription termination and RNA processing. MYC multimers accumulate on chromatin immediately adjacent to stalled replication forks and surround FANCD2, ATR and BRCA1 proteins, which are located at stalled forks 7,8 . MYC multimerization is triggered in a HUWE1 6 and ubiquitylation-dependent manner. At active promoters, MYC multimers block antisense transcription and stabilize FANCD2 association with chromatin. This limits DNA double strand break formation during S-phase, suggesting that the multimerization of MYC enables tumour cells to proliferate under stressful conditions.", "summaryZh": "MYC 家族的癌蛋白驱动多种人类肿瘤的发展 1 。在未受干扰的细胞中，MYC 蛋白与几乎所有活性启动子结合并通过 RNA 聚合酶 II 控制转录 2,3 。 MYC 蛋白还可以协调转录与 DNA 复制 4,5 并促进转录相关 DNA 损伤的修复 6 ，但它们如何发挥这些机制上不同的功能尚不清楚。在这里，我们表明，MYC 从活性启动子中的许多结合位点解离，并形成多聚体，通常为球状结构，以响应转录延伸、mRNA 剪接或蛋白酶体抑制的扰动。多聚化伴随着 MYC 相互作用组向参与转录终止和 RNA 加工的蛋白质的整体变化。 MYC 多聚体在紧邻停滞复制叉的染色质上积聚，并围绕位于停滞复制叉的 FANCD2、ATR 和 BRCA1 蛋白 7,8 。 MYC 多聚化以 HUWE1 6 和泛素化依赖性方式触发。在活性启动子处，MYC 多聚体阻断反义转录并稳定 FANCD2 与染色质的关联。这限制了 S 期 DNA 双链断裂的形成，表明 MYC 的多聚化使肿瘤细胞能够在应激条件下增殖。", "titleZh": "MYC 多聚体保护停滞的复制叉免受 RNA 聚合酶的影响。", "translationSource": "16dadca721ffc1f0"}, {"pmid": "36323787", "title": "Real-time bioelectronic sensing of environmental contaminants.", "journal": "Nature", "year": 2022, "published": "2022-11-01", "doi": "10.1038/s41586-022-05356-y", "doiUrl": "https://doi.org/10.1038/s41586-022-05356-y", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36323787/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology", "genetic circuit"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology, genetic circuit。", "abstractEn": "Real-time chemical sensing is crucial for applications in environmental and health monitoring 1 . Biosensors can detect a variety of molecules through genetic circuits that use these chemicals to trigger the synthesis of a coloured protein, thereby producing an optical signal 2-4 . However, the process of protein expression limits the speed of this sensing to approximately half an hour, and optical signals are often difficult to detect in situ 5-8 . Here we combine synthetic biology and materials engineering to develop biosensors that produce electrical readouts and have detection times of minutes. We programmed Escherichia coli
