 to produce an electrical current in response to specific chemicals using a modular, eight-component, synthetic electron transport chain. As designed, this strain produced current following exposure to thiosulfate, an anion that causes microbial blooms, within 2 min. This amperometric sensor was then modified to detect an endocrine disruptor. The incorporation of a protein switch into the synthetic pathway and encapsulation of the bacteria with conductive nanomaterials enabled the detection of the endocrine disruptor in urban waterway samples within 3 min. Our results provide design rules to sense various chemicals with mass-transport-limited detection times and a new platform for miniature, low-power bioelectronic sensors that safeguard ecological and human health.", "summaryZh": "实时化学传感对于环境和健康监测应用至关重要 1 。生物传感器可以通过遗传电路检测多种分子，这些分子使用这些化学物质触发有色蛋白质的合成，从而产生光学信号 2-4 。然而，蛋白质表达的过程将这种传感的速度限制在大约半小时，并且光学信号通常难以原位检测 5-8 。在这里，我们将合成生物学和材料工程相结合，开发出可产生电读数且检测时间为几分钟的生物传感器。我们对大肠杆菌进行了编程，使其使用模块化的八组件合成电子传输链产生电流，以响应特定的化学物质。按照设计，该菌株在接触硫代硫酸盐（一种导致微生物繁殖的阴离子）后 2 分钟内产生电流。然后对该电流传感器进行修改以检测内分泌干扰物。将蛋白质开关纳入合成途径并用导电纳米材料封装细菌，使得能够在 3 分钟内检测出城市水道样本中的内分泌干扰物。我们的研究结果提供了设计规则，以在质量传输有限的检测时间内感测各种化学物质，并为微型、低功耗生物电子传感器提供了一个新平台，以保护生态和人类健康。", "titleZh": "环境污染物的实时生物电子传感。", "translationSource": "f7f33b58e5f8d2f5"}, {"pmid": "36289326", "title": "Non-canonical β-adrenergic activation of ERK at endosomes.", "journal": "Nature", "year": 2022, "published": "2022-11-01", "doi": "10.1038/s41586-022-05343-3", "doiUrl": "https://doi.org/10.1038/s41586-022-05343-3", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36289326/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["endosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：endosome。", "abstractEn": "G-protein-coupled receptors (GPCRs), the largest family of signalling receptors, as well as important drug targets, are known to activate extracellular-signal-regulated kinase (ERK)-a master regulator of cell proliferation and survival 1 . However, the precise mechanisms that underlie GPCR-mediated ERK activation are not clearly understood 2-4 . Here we investigated how spatially organized β 2 -adrenergic receptor (β 2 AR) signalling controls ERK. Using subcellularly targeted ERK activity biosensors 5 , we show that β 2 AR signalling induces ERK activity at endosomes, but not at the plasma membrane. This pool of ERK activity depends on active, endosome-localized Gα s and requires ligand-stimulated β 2 AR endocytosis. We further identify an endosomally localized non-canonical signalling axis comprising Gα s , RAF and mitogen-activated protein kinase kinase, resulting in endosomal ERK activity that propagates into the nucleus. Selective inhibition of endosomal β 2 AR and Gα s signalling blunted nuclear ERK activity, MYC gene expression and cell proliferation. These results reveal a non-canonical mechanism for the spatial regulation of ERK through GPCR signalling and identify a functionally important endosomal signalling axis.", "summaryZh": "G 蛋白偶联受体 (GPCR) 是最大的信号传导受体家族，也是重要的药物靶标，已知可激活细胞外信号调节激酶 (ERK)——细胞增殖和存活的主要调节因子 1 。然而，GPCR 介导的 ERK 激活的确切机制尚不清楚 2-4 。在这里，我们研究了空间组织的 β 2 -肾上腺素受体 (β 2 AR) 信号如何控制 ERK。使用亚细胞靶向 ERK 活性生物传感器 5 ，我们发现 β 2 AR 信号传导在内体上诱导 ERK 活性，但不在质膜上诱导 ERK 活性。该 ERK 活性池依赖于活跃的内体定位 Gα，并且需要配体刺激的 β 2 AR 内吞作用。我们进一步鉴定了一个内体定位的非规范信号轴，包括 Gαs、RAF 和丝裂原激活蛋白激酶激酶，导致内体 ERK 活性传播到细胞核中。选择性抑制内体 β 2 AR 和 Gα s 信号传导会减弱核 ERK 活性、MYC 基因表达和细胞增殖。这些结果揭示了通过 GPCR 信号传导调节 ERK 空间的非典型机制，并确定了功能上重要的内体信号传导轴。", "titleZh": "内体中 ERK 的非经典 β-肾上腺素能激活。", "translationSource": "0281fa0430a29c1e"}, {"pmid": "36198318", "title": "Calcium transients on the ER surface trigger liquid-liquid phase separation of FIP200 to specify autophagosome initiation sites.", "journal": "Cell", "year": 2022, "published": "2022-10-27", "doi": "10.1016/j.cell.2022.09.001", "doiUrl": "https://doi.org/10.1016/j.cell.2022.09.001", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36198318/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, autophagy。", "abstractEn": "The mechanism that initiates autophagosome formation on the ER in multicellular organisms is elusive. Here, we showed that autophagy stimuli trigger Ca 2+ transients on the outer surface of the ER membrane, whose amplitude, frequency, and duration are controlled by the metazoan-specific ER transmembrane autophagy protein EPG-4/EI24. Persistent Ca 2+ transients/oscillations on the cytosolic ER surface in EI24-depleted cells cause accumulation of FIP200 autophagosome initiation complexes on the ER. This defect is suppressed by attenuating ER Ca 2+ transients. Multi-modal SIM analysis revealed that Ca 2+ transients on the ER trigger the formation of dynamic and fusion-prone liquid-like FIP200 puncta. Starvation-induced Ca 2+ transients on lysosomes also induce FIP200 puncta that further move to the ER. Multiple FIP200 puncta on the ER, whose association depends on the ER proteins VAPA/B and ATL2/3, assemble into autophagosome formation sites. Thus, Ca 2+ transients are crucial for triggering phase separation of FIP200 to specify autophagosome initiation sites in metazoans.", "summaryZh": "在多细胞生物体的内质网上启动自噬体形成的机制尚不清楚。在这里，我们发现自噬刺激会触发内质网膜外表面的Ca 2+ 瞬变，其幅度、频率和持续时间由后生动物特异性内质网跨膜自噬蛋白EPG-4/EI24控制。 EI24 耗尽的细胞中胞质 ER 表面上持续的 Ca 2+ 瞬变/振荡导致 FIP200 自噬体起始复合物在 ER 上积聚。该缺陷可通过减弱 ER Ca 2+ 瞬变来抑制。多模态 SIM 分析表明，ER 上的 Ca 2+ 瞬变触发了动态且易于融合的液体状 FIP200 斑点的形成。饥饿诱导的溶酶体上的 Ca 2+ 瞬变也会诱导 FIP200 斑点进一步移动到 ER。 ER 上的多个 FIP200 点（其关联取决于 ER 蛋白 VAPA/B 和 ATL2/3）组装成自噬体形成位点。因此，Ca 2+ 瞬变对于触发 FIP200 的相分离以指定后生动物中的自噬体起始位点至关重要。", "titleZh": "ER 表面的钙瞬变触发 FIP200 的液-液相分离，以指定自噬体起始位点。", "translationSource": "a163c3cdf6d8c46f"}, {"pmid": "36261549", "title": "Gut bacteria alleviate smoking-related NASH by degrading gut nicotine.", "journal": "Nature", "year": 2022, "published": "2022-10-01", "doi": "10.1038/s41586-022-05299-4", "doiUrl": "https://doi.org/10.1038/s41586-022-05299-4", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36261549/", "categories": ["靶向蛋白降解"], "matchedTerms": ["degrader"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degrader。", "abstractEn": "Tobacco smoking is positively correlated with non-alcoholic fatty liver disease (NAFLD) 1-5 , but the underlying mechanism for this association is unclear. Here we report that nicotine accumulates in the intestine during tobacco smoking and activates intestinal AMPKα. We identify the gut bacterium Bacteroides xylanisolvens as an effective nicotine degrader. Colonization of B. xylanisolvens reduces intestinal nicotine concentrations in nicotine-exposed mice, and it improves nicotine-exacerbated NAFLD progression. Mechanistically, AMPKα promotes the phosphorylation of sphingomyelin phosphodiesterase 3 (SMPD3), stabilizing the latter and therefore increasing intestinal ceramide formation, which contributes to NAFLD progression to non-alcoholic steatohepatitis (NASH). Our results establish a role for intestinal nicotine accumulation in NAFLD progression and reveal an endogenous bacterium in the human intestine with the ability to metabolize nicotine. These findings suggest a possible route to reduce tobacco smoking-exacerbated NAFLD progression.", "summaryZh": "吸烟与非酒精性脂肪肝 (NAFLD) 呈正相关 1-5 ，但这种关联的潜在机制尚不清楚。在这里，我们报道了吸烟过程中尼古丁在肠道中积聚并激活肠道 AMPKα。我们确定肠道细菌解木聚糖拟杆菌是一种有效的尼古丁降解剂。 B. xylanisolvens 的定植可降低尼古丁暴露小鼠肠道尼古丁浓度，并改善尼古丁加剧的 NAFLD 进展。从机制上讲，AMPKα 促进鞘磷脂磷酸二酯酶 3 (SMPD3) 的磷酸化，稳定后者，从而增加肠道神经酰胺的形成，从而导致 NAFLD 进展为非酒精性脂肪性肝炎 (NASH)。我们的研究结果确定了肠道尼古丁积累在 NAFLD 进展中的作用，并揭示了人类肠道中具有代谢尼古丁能力的内源性细菌。这些发现提出了一种减少吸烟加剧的 NAFLD 进展的可能途径。", "titleZh": "肠道细菌通过降解肠道尼古丁来缓解与吸烟相关的 NASH。", "translationSource": "2d6819bebaec58aa"}, {"pmid": "36261532", "title": "HRG-9 homologues regulate haem trafficking from haem-enriched compartments.", "journal": "Nature", "year": 2022, "published": "2022-10-01", "doi": "10.1038/s41586-022-05347-z", "doiUrl": "https://doi.org/10.1038/s41586-022-05347-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36261532/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome。", "abstractEn": "Haem is an iron-containing tetrapyrrole that is critical for a variety of cellular and physiological processes 1-3 . Haem binding proteins are present in almost all cellular compartments, but the molecular mechanisms that regulate the transport and use of haem within the cell remain poorly understood 2,3 . Here we show that haem-responsive gene 9 (HRG-9) (also known as transport and Golgi organization 2 (TANGO2)) is an evolutionarily conserved haem chaperone with a crucial role in trafficking haem out of haem storage or synthesis sites in eukaryotic cells. Loss of Caenorhabditis elegans hrg-9 and its paralogue hrg-10 results in the accumulation of haem in lysosome-related organelles, the haem storage site in worms. Similarly, deletion of the hrg-9 homologue TANGO2 in yeast and mammalian cells induces haem overload in mitochondria, the site of haem synthesis. We demonstrate that TANGO2 binds haem and transfers it from cellular membranes to apo-haemoproteins. Notably, homozygous tango2 -/- zebrafish larvae develop pleiotropic symptoms including encephalopathy, cardiac arrhythmia and myopathy, and die during early development. These defects partially resemble the symptoms of human TANGO2-related metabolic encephalopathy and arrhythmias, a hereditary disease caused by mutations in TANGO2 4-8 . Thus, the identification of HRG-9 as an intracellular haem chaperone provides a biological basis for exploring the aetiology and treatment of TANGO2-related disorders.", "summaryZh": "血红素是一种含铁四吡咯，对于多种细胞和生理过程至关重要 1-3 。血红素结合蛋白几乎存在于所有细胞区室中，但调节细胞内血红素运输和使用的分子机制仍知之甚少 2,3 。在这里，我们证明血红素反应基因 9 (HRG-9)（也称为运输和高尔基体组织 2 (TANGO2)）是一种进化上保守的血红素伴侣，在真核细胞中将血红素从血红素储存或合成位点运输出方面发挥着至关重要的作用。秀丽隐杆线虫 HRG-9 及其旁系同源物 HRG-10 的丢失导致血红素在溶酶体相关细胞器（蠕虫中的血红素储存位点）中积累。同样，酵母和哺乳动物细胞中hrg-9同源物TANGO2的缺失会导致线粒体（血红素合成位点）血红素超载。我们证明 TANGO2 结合血红素并将其从细胞膜转移到脱辅基血红蛋白。值得注意的是，纯合的 tango2 -/- 斑马鱼幼虫会出现多效性症状，包括脑病、心律失常和肌病，并在早期发育过程中死亡。这些缺陷部分类似于人类 TANGO2 相关代谢性脑病和心律失常的症状，这是一种由 TANGO2 突变引起的遗传性疾病 4-8 。因此，HRG-9作为细胞内血红素伴侣的鉴定为探索TANGO2相关疾病的病因和治疗提供了生物学基础。", "titleZh": "HRG-9 同源物调节来自富含血红素的区室的血红素运输。", "translationSource": "7d14d6ba7d3d0da2"}, {"pmid": "36261529", "title": "The E3 ligase adapter cereblon targets the C-terminal cyclic imide degron.", "journal": "Nature", "year": 2022, "published": "2022-10-01", "doi": "10.1038/s41586-022-05333-5", "doiUrl": "https://doi.org/10.1038/s41586-022-05333-5", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36261529/", "categories": ["靶向蛋白降解"], "matchedTerms": ["targeted protein degradation", "degrader", "degron"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：targeted protein degradation, degrader, degron。", "abstractEn": "The ubiquitin E3 ligase substrate adapter cereblon (CRBN) is a target of thalidomide and lenalidomide 1 , therapeutic agents used in the treatment of haematopoietic malignancies 2-4 and as ligands for targeted protein degradation 5-7 . These agents are proposed to mimic a naturally occurring degron; however, the structural motif recognized by the thalidomide-binding domain of CRBN remains unknown. Here we report that C-terminal cyclic imides, post-translational modifications that arise from intramolecular cyclization of glutamine or asparagine residues, are physiological degrons on substrates for CRBN. Dipeptides bearing the C-terminal cyclic imide degron substitute for thalidomide when embedded within bifunctional chemical degraders. Addition of the degron to the C terminus of proteins induces CRBN-dependent ubiquitination and degradation in vitro and in cells. C-terminal cyclic imides form adventitiously on physiologically relevant timescales throughout the human proteome to afford a degron that is endogenously recognized and removed by CRBN. The discovery of the C-terminal cyclic imide degron defines a regulatory process that may affect the physiological function and therapeutic engagement of CRBN.", "summaryZh": "泛素 E3 连接酶底物接头 cereblon (CRBN) 是沙利度胺和来那度胺 1 的靶点，这两种治疗药物用于治疗造血系统恶性肿瘤 2-4 以及作为靶向蛋白质降解的配体 5-7 。 These agents are proposed to mimic a naturally occurring degron; however, the structural motif recognized by the thalidomide-binding domain of CRBN remains unknown.在这里，我们报道了 C 端环状酰亚胺，即由谷氨酰胺或天冬酰胺残基的分子内环化产生的翻译后修饰，是 CRBN 底物上的生理降解决定子。 Dipeptides bearing the C-terminal cyclic imide degron substitute for thalidomide when embedded within bifunctional chemical degraders. Addition of the degron to the C terminus of proteins induces CRBN-dependent ubiquitination and degradation in vitro and in cells. C 端环状酰亚胺在整个人类蛋白质组中在生理相关的时间尺度上偶然形成，以提供可被 CRBN 内源识别和去除的降解决定子。 C 端环状酰亚胺降解决定子的发现定义了可能影响 CRBN 生理功能和治疗参与的调节过程。", "titleZh": "E3 连接酶接头 cereblon 靶向 C 端环状酰亚胺降解决定子。", "translationSource": "9e9dfd8e503da790"}, {"pmid": "36261523", "title": "Clathrin-associated AP-1 controls termination of STING signalling.", "journal": "Nature", "year": 2022, "published": "2022-10-01", "doi": "10.1038/s41586-022-05354-0", "doiUrl": "https://doi.org/10.1038/s41586-022-05354-0", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36261523/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, endolysosomal。", "abstractEn": "Stimulator of interferon genes (STING) functions downstream of cyclic GMP-AMP synthase in DNA sensing or as a direct receptor for bacterial cyclic dinucleotides and small molecules to activate immunity during infection, cancer and immunotherapy 1-10 . Precise regulation of STING is essential to ensure balanced immune responses and prevent detrimental autoinflammation 11-16 . After activation, STING, a transmembrane protein, traffics from the endoplasmic reticulum to the Golgi, where its phosphorylation by the protein kinase TBK1 enables signal transduction 17-20 . The mechanism that ends STING signalling at the Golgi remains unknown. Here we show that adaptor protein complex 1 (AP-1) controls the termination of STING-dependent immune activation. We find that AP-1 sorts phosphorylated STING into clathrin-coated transport vesicles for delivery to the endolysosomal system, where STING is degraded 21 . We identify a highly conserved dileucine motif in the cytosolic C-terminal tail (CTT) of STING that, together with TBK1-dependent CTT phosphorylation, dictates the AP-1 engagement of STING. A cryo-electron microscopy structure of AP-1 in complex with phosphorylated STING explains the enhanced recognition of TBK1-activated STING. We show that suppression of AP-1 exacerbates STING-induced immune responses. Our results reveal a structural mechanism of negative regulation of STING and establish that the initiation of signalling is inextricably associated with its termination to enable transient activation of immunity.", "summaryZh": "干扰素基因刺激剂 (STING) 在 DNA 传感中的环 GMP-AMP 合酶下游发挥作用，或作为细菌环二核苷酸和小分子的直接受体，在感染、癌症和免疫治疗期间激活免疫力 1-10 。 STING 的精确调节对于确保平衡的免疫反应和预防有害的自身炎症至关重要 11-16 。激活后，STING（一种跨膜蛋白）从内质网运输到高尔基体，在那里它被蛋白激酶 TBK1 磷酸化，从而实现信号转导 17-20 。终止高尔基体 STING 信号传导的机制仍不清楚。在这里，我们展示了接头蛋白复合物 1 (AP-1) 控制 STING 依赖性免疫激活的终止。我们发现 AP-1 将磷酸化的 STING 分类到网格蛋白包被的转运囊泡中，以递送至内溶酶体系统，STING 在此被降解 21 。我们在 STING 的胞质 C 末端尾部 (CTT) 中发现了一个高度保守的二亮氨酸基序，该基序与 TBK1 依赖性 CTT 磷酸化一起决定了 STING 的 AP-1 接合。 AP-1 与磷酸化 STING 复合物的冷冻电子显微镜结构解释了 TBK1 激活的 STING 的增强识别。我们发现，抑制 AP-1 会加剧 STING 诱导的免疫反应。我们的结果揭示了 STING 负调节的结构机制，并确定信号传导的启动与其终止密切相关，从而实现免疫的瞬时激活。", "titleZh": "网格蛋白相关的 AP-1 控制 STING 信号传导的终止。", "translationSource": "69ea8d088c2b77e8"}, {"pmid": "36224385", "title": "Activation of γ-globin expression by hypoxia-inducible factor 1α.", "journal": "Nature", "year": 2022, "published": "2022-10-01", "doi": "10.1038/s41586-022-05312-w", "doiUrl": "https://doi.org/10.1038/s41586-022-05312-w", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36224385/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteasome", "ubiquitin-proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteasome, ubiquitin-proteasome。", "abstractEn": "Around birth, globin expression in human red blood cells (RBCs) shifts from γ-globin to β-globin, which results in fetal haemoglobin (HbF, α 2 γ 2 ) being gradually replaced by adult haemoglobin (HbA, α 2 β 2 ) 1 . This process has motivated the development of innovative approaches to treat sickle cell disease and β-thalassaemia by increasing HbF levels in postnatal RBCs 2 . Here we provide therapeutically relevant insights into globin gene switching obtained through a CRISPR-Cas9 screen for ubiquitin-proteasome components that regulate HbF expression. In RBC precursors, depletion of the von Hippel-Lindau (VHL) E3 ubiquitin ligase stabilized its ubiquitination target, hypoxia-inducible factor 1α (HIF1α) 3,4 , to induce γ-globin gene transcription. Mechanistically, HIF1α-HIF1β heterodimers bound cognate DNA elements in BGLT3, a long noncoding RNA gene located 2.7 kb downstream of the tandem γ-globin genes HBG1 and HBG2. This was followed by the recruitment of transcriptional activators, chromatin opening and increased long-range interactions between the γ-globin genes and their upstream enhancer. Similar induction of HbF occurred with hypoxia or with inhibition of prolyl hydroxylase domain enzymes that target HIF1α for ubiquitination by the VHL E3 ubiquitin ligase. Our findings link globin gene regulation with canonical hypoxia adaptation, provide a mechanism for HbF induction during stress erythropoiesis and suggest a new therapeutic approach for β-haemoglobinopathies.", "summaryZh": "出生前后，人红细胞 (RBC) 中的球蛋白表达从 γ 球蛋白转变为 β 球蛋白，导致胎儿血红蛋白 (HbF, α 2 γ 2 ) 逐渐被成人血红蛋白 (HbA, α 2 β 2 ) 1 取代。这一过程推动了通过提高出生后红细胞中 HbF 水平来治疗镰状细胞病和 β-地中海贫血的创新方法的开发 2 。在这里，我们提供了通过 CRISPR-Cas9 筛选调节 HbF 表达的泛素蛋白酶体成分获得的珠蛋白基因转换的治疗相关见解。在红细胞前体细胞中，von Hippel-Lindau (VHL) E3 泛素连接酶的消耗可稳定其泛素化靶标缺氧诱导因子 1α (HIF1α) 3,4 ，从而诱导 γ-珠蛋白基因转录。从机制上讲，HIF1α-HIF1β 异二聚体结合 BGLT3 中的同源 DNA 元件，BGLT3 是一种长非编码 RNA 基因，位于串联 γ 球蛋白基因 HBG1 和 HBG2 下游 2.7 kb 处。随后是转录激活因子的招募、染色质开放以及γ-珠蛋白基因与其上游增强子之间的长程相互作用增加。类似的 HbF 诱导发生在缺氧或抑制脯氨酰羟化酶结构域酶的情况下，这些酶以 HIF1α 为目标，通过 VHL E3 泛素连接酶进行泛素化。我们的研究结果将珠蛋白基因调控与典型的缺氧适应联系起来，提供了应激性红细胞生成过程中 HbF 诱导的机制，并提出了一种治疗 β-血红蛋白病的新方法。", "titleZh": "缺氧诱导因子 1α 激活 γ-珠蛋白表达。", "translationSource": "fbf0650400c41bad"}, {"pmid": "36131013", "title": "Antibody targeting of E3 ubiquitin ligases for receptor degradation.", "journal": "Nature", "year": 2022, "published": "2022-10-01", "doi": "10.1038/s41586-022-05235-6", "doiUrl": "https://doi.org/10.1038/s41586-022-05235-6", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36131013/", "categories": ["靶向蛋白降解"], "matchedTerms": ["targeted protein degradation", "protac", "proteolysis-targeting chimera", "degrader"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：targeted protein degradation, protac, proteolysis-targeting chimera, degrader。", "abstractEn": "Most current therapies that target plasma membrane receptors function by antagonizing ligand binding or enzymatic activities. However, typical mammalian proteins comprise multiple domains that execute discrete but coordinated activities. Thus, inhibition of one domain often incompletely suppresses the function of a protein. Indeed, targeted protein degradation technologies, including proteolysis-targeting chimeras 1 (PROTACs), have highlighted clinically important advantages of target degradation over inhibition 2 . However, the generation of heterobifunctional compounds binding to two targets with high affinity is complex, particularly when oral bioavailability is required 3 . Here we describe the development of proteolysis-targeting antibodies (PROTABs) that tether cell-surface E3 ubiquitin ligases to transmembrane proteins, resulting in target degradation both in vitro and in vivo. Focusing on zinc- and ring finger 3 (ZNRF3), a Wnt-responsive ligase, we show that this approach can enable colorectal cancer-specific degradation. Notably, by examining a matrix of additional cell-surface E3 ubiquitin ligases and transmembrane receptors, we demonstrate that this technology is amendable for 'on-demand' degradation. Furthermore, we offer insights on the ground rules governing target degradation by engineering optimized antibody formats. In summary, this work describes a strategy for the rapid development of potent, bioavailable and tissue-selective degraders of cell-surface proteins.", "summaryZh": "当前大多数针对质膜受体的疗法通过拮抗配体结合或酶活性发挥作用。然而，典型的哺乳动物蛋白质包含执行离散但协调的活动的多个结构域。因此，抑制一个结构域通常会不完全抑制蛋白质的功能。事实上，靶向蛋白降解技术，包括蛋白水解靶向嵌合体 1 (PROTAC)，已经凸显了靶向降解相对于抑制 2 的临床重要优势。然而，以高亲和力与两个靶标结合的异双功能化合物的生成是复杂的，特别是当需要口服生物利用度时 3 。在这里，我们描述了蛋白水解靶向抗体 (PROTAB) 的开发，该抗体将细胞表面 E3 泛素连接酶与跨膜蛋白连接，导致体外和体内靶标降解。重点关注锌指和无名指 3 (ZNRF3)（一种 Wnt 响应性连接酶），我们证明这种方法可以实现结直肠癌特异性降解。值得注意的是，通过检查额外的细胞表面 E3 泛素连接酶和跨膜受体的矩阵，我们证明该技术可针对“按需”降解进行修正。此外，我们通过设计优化的抗体形式，提供有关控制靶标降解的基本规则的见解。总之，这项工作描述了快速开发有效的、生物可利用的和组织选择性的细胞表面蛋白降解剂的策略。", "titleZh": "抗体靶向 E3 泛素连接酶以实现受体降解。", "translationSource": "052d725f1c63cecd"}, {"pmid": "36179672", "title": "Spatial engineering of E. coli with addressable phase-separated RNAs.", "journal": "Cell", "year": 2022, "published": "2022-09-29", "doi": "10.1016/j.cell.2022.09.016", "doiUrl": "https://doi.org/10.1016/j.cell.2022.09.016", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36179672/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Biochemical processes often require spatial regulation and specific microenvironments. The general lack of organelles in bacteria limits the potential of bioengineering complex intracellular reactions. Here, we demonstrate synthetic membraneless organelles in Escherichia coli termed transcriptionally engineered addressable RNA solvent droplets (TEARS). TEARS are assembled from RNA-binding protein recruiting domains fused to poly-CAG repeats that spontaneously drive liquid-liquid phase separation from the bulk cytoplasm. Targeting TEARS with fluorescent proteins revealed multilayered structures with composition and reaction robustness governed by non-equilibrium dynamics. We show that TEARS provide organelle-like bioprocess isolation for sequestering biochemical pathways, controlling metabolic branch points, buffering mRNA translation rates, and scaffolding protein-protein interactions. We anticipate TEARS to be a simple and versatile tool for spatially controlling E. coli biochemistry. Particularly, the modular design of TEARS enables applications without expression fine-tuning, simplifying the design-build-test cycle of bioengineering.", "summaryZh": "生化过程通常需要空间调节和特定的微环境。细菌普遍缺乏细胞器，限制了生物工程复杂细胞内反应的潜力。在这里，我们展示了大肠杆菌中的合成无膜细胞器，称为转录工程可寻址 RNA 溶剂滴 (TEARS)。 TEARS 由与多聚 CAG 重复序列融合的 RNA 结合蛋白募集结构域组装而成，可自发驱动细胞质中的液-液相分离。用荧光蛋白靶向 TEARS 揭示了多层结构，其组成和反应稳健性受非平衡动力学控制。我们表明，TEARS 提供了类似细胞器的生物过程隔离，用于隔离生化途径、控制代谢分支点、缓冲 mRNA 翻译速率和支架蛋白质-蛋白质相互作用。我们预计 TEARS 将成为一种简单且多功能的工具，用于空间控制大肠杆菌生物化学。特别是，TEARS 的模块化设计使得应用程序无需进行表达微调，从而简化了生物工程的设计-构建-测试周期。", "titleZh": "使用可寻址相分离 RNA 进行大肠杆菌空间工程。", "translationSource": "7de153413194700c"}, {"pmid": "36113465", "title": "Structure and mechanism of human cystine exporter cystinosin.", "journal": "Cell", "year": 2022, "published": "2022-09-29", "doi": "10.1016/j.cell.2022.08.020", "doiUrl": "https://doi.org/10.1016/j.cell.2022.08.020", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36113465/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Lysosomal amino acid efflux by proton-driven transporters is essential for lysosomal homeostasis, amino acid recycling, mTOR signaling, and maintaining lysosomal pH. To unravel the mechanisms of these transporters, we focus on cystinosin, a prototypical lysosomal amino acid transporter that exports cystine to the cytosol, where its reduction to cysteine supplies this limiting amino acid for diverse fundamental processes and controlling nutrient adaptation. Cystinosin mutations cause cystinosis, a devastating lysosomal storage disease. Here, we present structures of human cystinosin in lumen-open, cytosol-open, and cystine-bound states, which uncover the cystine recognition mechanism and capture the key conformational states of the transport cycle. Our structures, along with functional studies and double electron-electron resonance spectroscopic investigations, reveal the molecular basis for the transporter's conformational transitions and protonation switch, show conformation-dependent Ragulator-Rag complex engagement, and demonstrate an unexpected activation mechanism. These findings provide molecular insights into lysosomal amino acid efflux and a potential therapeutic strategy.", "summaryZh": "质子驱动转运蛋白的溶酶体氨基酸流出对于溶酶体稳态、氨基酸回收、mTOR 信号传导和维持溶酶体 pH 至关重要。为了揭示这些转运蛋白的机制，我们重点关注胱氨酸，这是一种典型的溶酶体氨基酸转运蛋白，它将胱氨酸输出到细胞质，在细胞质中它还原成半胱氨酸，为多种基本过程和控制营养适应提供了这种限制性氨基酸。胱氨酸突变导致胱氨酸病，这是一种毁灭性的溶酶体贮积病。在这里，我们展示了人胱氨酸在管腔开放、细胞质开放和胱氨酸结合状态下的结构，揭示了胱氨酸识别机制并捕获了运输循环的关键构象状态。我们的结构以及功能研究和双电子-电子共振光谱研究揭示了转运蛋白构象转变和质子化开关的分子基础，显示了构象依赖性 Ragulator-Rag 复合物的接合，并展示了意想不到的激活机制。这些发现提供了对溶酶体氨基酸流出的分子见解和潜在的治疗策略。", "titleZh": "人胱氨酸输出蛋白胱氨酸的结构和机制。", "translationSource": "d7536f498ba0a40a"}, {"pmid": "36055250", "title": "helixCAM: A platform for programmable cellular assembly in bacteria and human cells.", "journal": "Cell", "year": 2022, "published": "2022-09-15", "doi": "10.1016/j.cell.2022.08.012", "doiUrl": "https://doi.org/10.1016/j.cell.2022.08.012", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/36055250/", "categories": ["合成生物学"], "matchedTerms": ["programmable cell"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：programmable cell。", "abstractEn": "Interactions between cells are indispensable for signaling and creating structure. The ability to direct precise cell-cell interactions would be powerful for engineering tissues, understanding signaling pathways, and directing immune cell targeting. In humans, intercellular interactions are mediated by cell adhesion molecules (CAMs). However, endogenous CAMs are natively expressed by many cells and tend to have cross-reactivity, making them unsuitable for programming specific interactions. Here, we showcase \"helixCAM,\" a platform for engineering synthetic CAMs by presenting coiled-coil peptides on the cell surface. helixCAMs were able to create specific cell-cell interactions and direct patterned aggregate formation in bacteria and human cells. Based on coiled-coil interaction principles, we built a set of rationally designed helixCAM libraries, which led to the discovery of additional high-performance helixCAM pairs. We applied this helixCAM toolkit for various multicellular engineering applications, such as spherical layering, adherent cell targeting, and surface patterning.", "summaryZh": "细胞之间的相互作用对于信号传导和创建结构是必不可少的。指导精确的细胞间相互作用的能力对于工程组织、理解信号通路和指导免疫细胞靶向将是强大的。在人类中，细胞间相互作用是由细胞粘附分子（CAM）介导的。然而，内源性 CAM 由许多细胞天然表达，并且往往具有交叉反应性，这使得它们不适合编程特定的相互作用。在这里，我们展示了“helixCAM”，这是一个通过在细胞表面呈现卷曲螺旋肽来工程合成 CAM 的平台。 helixCAM 能够在细菌和人类细胞中产生特定的细胞间相互作用并直接形成图案聚集体。基于螺旋线圈相互作用原理，我们构建了一套合理设计的helixCAM库，从而发现了更多的高性能helixCAM对。我们将此 helixCAM 工具包应用于各种多细胞工程应用，例如球形分层、贴壁细胞靶向和表面图案化。", "titleZh": "helixCAM：细菌和人体细胞中可编程细胞组装的平台。", "translationSource": "913313f0af58f33a"}, {"pmid": "34937944", "title": "Targeting SWI/SNF ATPases in enhancer-addicted prostate cancer.", "journal": "Nature", "year": 2022, "published": "2022-01-01", "doi": "10.1038/s41586-021-04246-z", "doiUrl": "https://doi.org/10.1038/s41586-021-04246-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34937944/", "categories": ["靶向蛋白降解"], "matchedTerms": ["protac", "proteolysis-targeting chimera", "degrader"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：protac, proteolysis-targeting chimera, degrader。", "abstractEn": "The switch/sucrose non-fermentable (SWI/SNF) complex has a crucial role in chromatin remodelling 1 and is altered in over 20% of cancers 2,3 . Here we developed a proteolysis-targeting chimera (PROTAC) degrader of the SWI/SNF ATPase subunits, SMARCA2 and SMARCA4, called AU-15330. Androgen receptor (AR) + forkhead box A1 (FOXA1) + prostate cancer cells are exquisitely sensitive to dual SMARCA2 and SMARCA4 degradation relative to normal and other cancer cell lines. SWI/SNF ATPase degradation rapidly compacts cis-regulatory elements bound by transcription factors that drive prostate cancer cell proliferation, namely AR, FOXA1, ERG and MYC, which dislodges them from chromatin, disables their core enhancer circuitry, and abolishes the downstream oncogenic gene programs. SWI/SNF ATPase degradation also disrupts super-enhancer and promoter looping interactions that wire supra-physiologic expression of the AR, FOXA1 and MYC oncogenes themselves. AU-15330 induces potent inhibition of tumour growth in xenograft models of prostate cancer and synergizes with the AR antagonist enzalutamide, even inducing disease remission in castration-resistant prostate cancer (CRPC) models without toxicity. Thus, impeding SWI/SNF-mediated enhancer accessibility represents a promising therapeutic approach for enhancer-addicted cancers.", "summaryZh": "开关/蔗糖不可发酵 (SWI/SNF) 复合物在染色质重塑中发挥着至关重要的作用 1 并且在超过 20% 的癌症中发生改变 2,3 。在这里，我们开发了 SWI/SNF ATP 酶亚基 SMARCA2 和 SMARCA4 的蛋白水解靶向嵌合体 (PROTAC) 降解剂，称为 AU-15330。相对于正常细胞系和其他癌细胞系，雄激素受体 (AR) + 叉头盒 A1 (FOXA1) + 前列腺癌细胞对 SMARCA2 和 SMARCA4 双重降解极其敏感。 SWI/SNF ATPase 降解迅速压缩由驱动前列腺癌细胞增殖的转录因子（即 AR、FOXA1、ERG 和 MYC）结合的顺式调节元件，从而将它们从染色质中移出，禁用其核心增强子电路，并废除下游致癌基因程序。 SWI/SNF ATPase 降解还会破坏超级增强子和启动子循环相互作用，从而连接 AR、FOXA1 和 MYC 癌基因本身的超生理表达。 AU-15330 在前列腺癌异种移植模型中诱导肿瘤生长的有效抑制，并与 AR 拮抗剂恩杂鲁胺产生协同作用，甚至在去势抵抗性前列腺癌 (CRPC) 模型中诱导疾病缓解，且无毒性。因此，阻碍 SWI/SNF 介导的增强子可及性代表了一种有前途的治疗增强子成瘾癌症的方法。", "titleZh": "针对增强剂成瘾性前列腺癌中的 SWI/SNF ATP 酶。", "translationSource": "f8e29a3a1c8c5883"}, {"pmid": "34789879", "title": "Structural insights into Ubr1-mediated N-degron polyubiquitination.", "journal": "Nature", "year": 2021, "published": "2021-12-01", "doi": "10.1038/s41586-021-04097-8", "doiUrl": "https://doi.org/10.1038/s41586-021-04097-8", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34789879/", "categories": ["靶向蛋白降解", "溶酶体/蛋白酶体"], "matchedTerms": ["degron", "proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degron, proteasome。", "abstractEn": "The N-degron pathway targets proteins that bear a destabilizing residue at the N terminus for proteasome-dependent degradation 1 . In yeast, Ubr1-a single-subunit E3 ligase-is responsible for the Arg/N-degron pathway 2 . How Ubr1 mediates the initiation of ubiquitination and the elongation of the ubiquitin chain in a linkage-specific manner through a single E2 ubiquitin-conjugating enzyme (Ubc2) remains unknown. Here we developed chemical strategies to mimic the reaction intermediates of the first and second ubiquitin transfer steps, and determined the cryo-electron microscopy structures of Ubr1 in complex with Ubc2, ubiquitin and two N-degron peptides, representing the initiation and elongation steps of ubiquitination. Key structural elements, including a Ubc2-binding region and an acceptor ubiquitin-binding loop on Ubr1, were identified and characterized. These structures provide mechanistic insights into the initiation and elongation of ubiquitination catalysed by Ubr1.", "summaryZh": "N-degron 途径针对 N 末端带有不稳定残基的蛋白质，进行蛋白酶体依赖性降解 1 。在酵母中，Ubr1（一种单亚基 E3 连接酶）负责 Arg/N-降解决定子途径 2 。 Ubr1 如何通过单个 E2 泛素结合酶 (Ubc2) 以连锁特异性方式介导泛素化的启动和泛素链的延长仍然未知。在这里，我们开发了化学策略来模拟第一个和第二个泛素转移步骤的反应中间体，并确定了 Ubr1 与 Ubc2、泛素和两个 N-degron 肽复合物的冷冻电子显微镜结构，代表泛素化的起始和延伸步骤。鉴定并表征了关键结构元件，包括 Ubc2 结合区和 Ubr1 上的受体泛素结合环。这些结构为 Ubr1 催化的泛素化的起始和延伸提供了机制见解。", "titleZh": "Ubr1 介导的 N-降解决定子多泛素化的结构见解。", "translationSource": "2d457c07c3ce4e6c"}, {"pmid": "34741801", "title": "Mammalian hybrid pre-autophagosomal structure HyPAS generates autophagosomes.", "journal": "Cell", "year": 2021, "published": "2021-11-24", "doi": "10.1016/j.cell.2021.10.017", "doiUrl": "https://doi.org/10.1016/j.cell.2021.10.017", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34741801/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "The biogenesis of mammalian autophagosomes remains to be fully defined. Here, we used cellular and in vitro membrane fusion analyses to show that autophagosomes are formed from a hitherto unappreciated hybrid membrane compartment. The autophagic precursors emerge through fusion of FIP200 vesicles, derived from the cis-Golgi, with endosomally derived ATG16L1 membranes to generate a hybrid pre-autophagosomal structure, HyPAS. A previously unrecognized apparatus defined here controls HyPAS biogenesis and mammalian autophagosomal precursor membranes. HyPAS can be modulated by pharmacological agents whereas its formation is inhibited upon severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) infection or by expression of SARS-CoV-2 nsp6. These findings reveal the origin of mammalian autophagosomal membranes, which emerge via convergence of secretory and endosomal pathways, and show that this process is targeted by microbial factors such as coronaviral membrane-modulating proteins.", "summaryZh": "哺乳动物自噬体的生物发生仍有待完全确定。在这里，我们使用细胞和体外膜融合分析来表明自噬体是由迄今为止未被认可的混合膜室形成的。自噬前体是通过源自顺式高尔基体的 FIP200 囊泡与内体衍生的 ATG16L1 膜融合而产生的，从而产生混合的自噬体前结构 HyPAS。这里定义的一个以前未被认识的装置控制着 HyPAS 生物发生和哺乳动物自噬体前体膜。 HyPAS 可以通过药物调节，而其形成在严重急性呼吸综合征冠状病毒 2 (SARS-CoV-2) 感染或 SARS-CoV-2 nsp6 表达时受到抑制。这些发现揭示了哺乳动物自噬体膜的起源，该膜是通过分泌和内体途径的汇聚而出现的，并表明该过程是冠状病毒膜调节蛋白等微生物因子的靶标。", "titleZh": "哺乳动物杂交前自噬体结构 HyPAS 产生自噬体。", "translationSource": "3d4de8f7caa43248"}, {"pmid": "34562363", "title": "Structural basis and regulation of the reductive stress response.", "journal": "Cell", "year": 2021, "published": "2021-10-14", "doi": "10.1016/j.cell.2021.09.002", "doiUrl": "https://doi.org/10.1016/j.cell.2021.09.002", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34562363/", "categories": ["靶向蛋白降解"], "matchedTerms": ["molecular glue"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：molecular glue。", "abstractEn": "Although oxidative phosphorylation is best known for producing ATP, it also yields reactive oxygen species (ROS) as invariant byproducts. Depletion of ROS below their physiological levels, a phenomenon known as reductive stress, impedes cellular signaling and has been linked to cancer, diabetes, and cardiomyopathy. Cells alleviate reductive stress by ubiquitylating and degrading the mitochondrial gatekeeper FNIP1, yet it is unknown how the responsible E3 ligase CUL2 FEM1B can bind its target based on redox state and how this is adjusted to changing cellular environments. Here, we show that CUL2 FEM1B relies on zinc as a molecular glue to selectively recruit reduced FNIP1 during reductive stress. FNIP1 ubiquitylation is gated by pseudosubstrate inhibitors of the BEX family, which prevent premature FNIP1 degradation to protect cells from unwarranted ROS accumulation. FEM1B gain-of-function mutation and BEX deletion elicit similar developmental syndromes, showing that the zinc-dependent reductive stress response must be tightly regulated to maintain cellular and organismal homeostasis.", "summaryZh": "尽管氧化磷酸化最出名的是产生 ATP，但它也会产生活性氧 (ROS) 作为不变的副产物。 ROS 消耗低于其生理水平（一种称为还原应激的现象）会阻碍细胞信号传导，并与癌症、糖尿病和心肌病有关。细胞通过泛素化和降解线粒体看门人 FNIP1 来缓解还原应激，但尚不清楚负责的 E3 连接酶 CUL2 FEM1B 如何根据氧化还原状态结合其靶标，以及如何调整以适应不断变化的细胞环境。在这里，我们表明 CUL2 FEM1B 依靠锌作为分子胶在还原应激期间选择性地招募还原的 FNIP1。 FNIP1 泛素化由 BEX 家族的假底物抑制剂门控，可防止 FNIP1 过早降解，从而保护细胞免受不必要的 ROS 积累。 FEM1B 功能获得突变和 BEX 缺失会引发类似的发育综合征，这表明必须严格调节锌依赖性还原应激反应以维持细胞和有机体的稳态。", "titleZh": "还原应激反应的结构基础和调节。", "translationSource": "e71dcdb3fc0848fb"}, {"pmid": "34616044", "title": "Metabolic modulation of tumours with engineered bacteria for immunotherapy.", "journal": "Nature", "year": 2021, "published": "2021-10-01", "doi": "10.1038/s41586-021-04003-2", "doiUrl": "https://doi.org/10.1038/s41586-021-04003-2", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34616044/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology", "engineered bacteria"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology, engineered bacteria。", "abstractEn": "The availability of L-arginine in tumours is a key determinant of an efficient anti-tumour T cell response 1-4 . Consequently, increases of typically low L-arginine concentrations within the tumour may greatly potentiate the anti-tumour responses of immune checkpoint inhibitors, such as programmed death-ligand 1 (PD-L1)-blocking antibodies 5 . However, currently no means are available to locally increase intratumoural L-arginine levels. Here we used a synthetic biology approach to develop an engineered probiotic Escherichia coli Nissle 1917 strain that colonizes tumours and continuously converts ammonia, a metabolic waste product that accumulates in tumours 6 , to L-arginine. Colonization of tumours with these bacteria increased intratumoural L-arginine concentrations, increased the number of tumour-infiltrating T cells and had marked synergistic effects with PD-L1 blocking antibodies in the clearance of tumours. The anti-tumour effect of these bacteria was mediated by L-arginine and was dependent on T cells. These results show that engineered microbial therapies enable metabolic modulation of the tumour microenvironment leading to enhanced efficacy of immunotherapies.", "summaryZh": "L-精氨酸在肿瘤中的可用性是有效抗肿瘤 T 细胞反应的关键决定因素 1-4 。因此，肿瘤内通常较低的 L-精氨酸浓度的增加可能会大大增强免疫检查点抑制剂的抗肿瘤反应，例如程序性死亡配体 1 (PD-L1) 阻断抗体 5 。然而，目前还没有方法可以局部增加肿瘤内 L-精氨酸水平。在这里，我们使用合成生物学方法开发了一种工程益生菌大肠杆菌 Nissle 1917 菌株，该菌株定植于肿瘤并持续将氨（一种在肿瘤中积累的代谢废物）转化为 L-精氨酸 6 。这些细菌在肿瘤中的定植增加了肿瘤内 L-精氨酸的浓度，增加了肿瘤浸润 T 细胞的数量，并与 PD-L1 阻断抗体在清除肿瘤方面具有显着的协同作用。这些细菌的抗肿瘤作用由 L-精氨酸介导，并且依赖于 T 细胞。这些结果表明，工程微生物疗法能够对肿瘤微环境进行代谢调节，从而提高免疫疗法的疗效。", "titleZh": "用工程细菌对肿瘤进行代谢调节以进行免疫治疗。", "translationSource": "6882d0ec8d1e7c42"}, {"pmid": "34588695", "title": "Circadian autophagy drives iTRF-mediated longevity.", "journal": "Nature", "year": 2021, "published": "2021-10-01", "doi": "10.1038/s41586-021-03934-0", "doiUrl": "https://doi.org/10.1038/s41586-021-03934-0", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34588695/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：autophagy。", "abstractEn": "Time-restricted feeding (TRF) has recently gained interest as a potential anti-ageing treatment for organisms from Drosophila to humans 1-5 . TRF restricts food intake to specific hours of the day. Because TRF controls the timing of feeding, rather than nutrient or caloric content, TRF has been hypothesized to depend on circadian-regulated functions; the underlying molecular mechanisms of its effects remain unclear. Here, to exploit the genetic tools and well-characterized ageing markers of Drosophila, we developed an intermittent TRF (iTRF) dietary regimen that robustly extended fly lifespan and delayed the onset of ageing markers in the muscles and gut. We found that iTRF enhanced circadian-regulated transcription and that iTRF-mediated lifespan extension required both circadian regulation and autophagy, a conserved longevity pathway. Night-specific induction of autophagy was both necessary and sufficient to extend lifespan on an ad libitum diet and also prevented further iTRF-mediated lifespan extension. By contrast, day-specific induction of autophagy did not extend lifespan. Thus, these results identify circadian-regulated autophagy as a critical contributor to iTRF-mediated health benefits in Drosophila. Because both circadian regulation and autophagy are highly conserved processes in human ageing, this work highlights the possibility that behavioural or pharmaceutical interventions that stimulate circadian-regulated autophagy might provide people with similar health benefits, such as delayed ageing and lifespan extension.", "summaryZh": "限时喂养 (TRF) 最近作为一种潜在的抗衰老治疗方法引起了人们的兴趣，适用于从果蝇到人类的生物体 1-5 。 TRF 将食物摄入量限制在一天中的特定时段。由于 TRF 控制进食时间，而不是营养或热量含量，因此推测 TRF 取决于昼夜节律调节功能；其影响的潜在分子机制仍不清楚。在这里，为了利用果蝇的遗传工具和充分表征的衰老标志物，我们开发了一种间歇性 TRF (iTRF) 饮食方案，可以有效延长果蝇的寿命并延缓肌肉和肠道衰老标志物的出现。我们发现 iTRF 增强了昼夜节律调节的转录，并且 iTRF 介导的寿命延长需要昼夜节律调节和自噬（一种保守的长寿途径）。夜间特异性诱导自噬对于延长随意饮食的寿命来说是必要且充分的，并且还可以防止 iTRF 介导的寿命进一步延长。相比之下，特定日期诱导自噬并不能延长寿命。因此，这些结果表明昼夜节律调节的自噬是 iTRF 介导的果蝇健康益处的关键贡献者。由于昼夜节律调节和自噬都是人类衰老过程中高度保守的过程，因此这项工作强调了刺激昼夜节律调节自噬的行为或药物干预可能为人们提供类似的健康益处的可能性，例如延缓衰老和延长寿命。", "titleZh": "昼夜节律自噬促进 iTRF 介导的长寿。", "translationSource": "bf320ace46c34839"}, {"pmid": "34536345", "title": "Parasitic modulation of host development by ubiquitin-independent protein degradation.", "journal": "Cell", "year": 2021, "published": "2021-09-30", "doi": "10.1016/j.cell.2021.08.029", "doiUrl": "https://doi.org/10.1016/j.cell.2021.08.029", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34536345/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Certain obligate parasites induce complex and substantial phenotypic changes in their hosts in ways that favor their transmission to other trophic levels. However, the mechanisms underlying these changes remain largely unknown. Here we demonstrate how SAP05 protein effectors from insect-vectored plant pathogenic phytoplasmas take control of several plant developmental processes. These effectors simultaneously prolong the host lifespan and induce witches' broom-like proliferations of leaf and sterile shoots, organs colonized by phytoplasmas and vectors. SAP05 acts by mediating the concurrent degradation of SPL and GATA developmental regulators via a process that relies on hijacking the plant ubiquitin receptor RPN10 independent of substrate ubiquitination. RPN10 is highly conserved among eukaryotes, but SAP05 does not bind insect vector RPN10. A two-amino-acid substitution within plant RPN10 generates a functional variant that is resistant to SAP05 activities. Therefore, one effector protein enables obligate parasitic phytoplasmas to induce a plethora of developmental phenotypes in their hosts.", "summaryZh": "某些专性寄生虫以有利于其传播到其他营养级的方式诱导宿主发生复杂且实质性的表型变化。然而，这些变化背后的机制仍然很大程度上未知。在这里，我们展示了来自昆虫媒介植物病原植原体的 SAP05 蛋白效应子如何控制多个植物发育过程。这些效应器同时延长宿主的寿命，并诱导叶和不育芽、植原体和载体定植的器官的扫帚式增殖。 SAP05 通过依赖于劫持植物泛素受体 RPN10 的过程介导 SPL 和 GATA 发育调节因子的同时降解，而与底物泛素化无关。 RPN10 在真核生物中高度保守，但 SAP05 不结合昆虫载体 RPN10。植物 RPN10 内的两个氨基酸取代产生了对 SAP05 活性具有抵抗力的功能变体。因此，一种效应蛋白使得专性寄生植原体能够在宿主中诱导多种发育表型。", "titleZh": "通过不依赖泛素的蛋白质降解对宿主发育进行寄生调节。", "translationSource": "f6ba1db81750b379"}, {"pmid": "34433013", "title": "Dual film-like organelles enable spatial separation of orthogonal eukaryotic translation.", "journal": "Cell", "year": 2021, "published": "2021-09-16", "doi": "10.1016/j.cell.2021.08.001", "doiUrl": "https://doi.org/10.1016/j.cell.2021.08.001", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34433013/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Engineering new functionality into living eukaryotic systems by enzyme evolution or de novo protein design is a formidable challenge. Cells do not rely exclusively on DNA-based evolution to generate new functionality but often utilize membrane encapsulation or formation of membraneless organelles to separate distinct molecular processes that execute complex operations. Applying this principle and the concept of two-dimensional phase separation, we develop film-like synthetic organelles that support protein translation on the surfaces of various cellular membranes. These sub-resolution synthetic films provide a path to make functionally distinct enzymes within the same cell. We use these film-like organelles to equip eukaryotic cells with dual orthogonal expanded genetic codes that enable the specific reprogramming of distinct translational machineries with single-residue precision. The ability to spatially tune the output of translation within tens of nanometers is not only important for synthetic biology but has implications for understanding the function of membrane-associated protein condensation in cells.", "summaryZh": "通过酶进化或从头蛋白质设计将新功能引入活的真核系统是一项艰巨的挑战。细胞并不完全依赖基于 DNA 的进化来产生新功能，而是经常利用膜封装或无膜细胞器的形成来分离执行复杂操作的不同分子过程。应用这一原理和二维相分离的概念，我们开发了薄膜状的合成细胞器，支持蛋白质在各种细胞膜表面的翻译。这些亚分辨率合成薄膜提供了在同一细胞内制造功能不同的酶的途径。我们使用这些薄膜状细胞器为真核细胞配备双正交扩展遗传密码，从而能够以单残基精度对不同的翻译机器进行特异性重编程。在数十纳米范围内空间调整翻译输出的能力不仅对于合成生物学很重要，而且对于理解细胞中膜相关蛋白凝聚的功能也具有重要意义。", "titleZh": "双膜状细胞器能够实现正交真核翻译的空间分离。", "translationSource": "ef820d3b0b0fc020"}, {"pmid": "34450028", "title": "Rescue of a lysosomal storage disorder caused by Grn loss of function with a brain penetrant progranulin biologic.", "journal": "Cell", "year": 2021, "published": "2021-09-02", "doi": "10.1016/j.cell.2021.08.002", "doiUrl": "https://doi.org/10.1016/j.cell.2021.08.002", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34450028/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, endolysosomal。", "abstractEn": "GRN mutations cause frontotemporal dementia (GRN-FTD) due to deficiency in progranulin (PGRN), a lysosomal and secreted protein with unclear function. Here, we found that Grn -/- mice exhibit a global deficiency in bis(monoacylglycero)phosphate (BMP), an endolysosomal phospholipid we identified as a pH-dependent PGRN interactor as well as a redox-sensitive enhancer of lysosomal proteolysis and lipolysis. Grn -/- brains also showed an age-dependent, secondary storage of glucocerebrosidase substrate glucosylsphingosine. We investigated a protein replacement strategy by engineering protein transport vehicle (PTV):PGRN-a recombinant protein linking PGRN to a modified Fc domain that binds human transferrin receptor for enhanced CNS biodistribution. PTV:PGRN rescued various Grn -/- phenotypes in primary murine macrophages and human iPSC-derived microglia, including oxidative stress, lysosomal dysfunction, and endomembrane damage. Peripherally delivered PTV:PGRN corrected levels of BMP, glucosylsphingosine, and disease pathology in Grn -/- CNS, including microgliosis, lipofuscinosis, and neuronal damage. PTV:PGRN thus represents a potential biotherapeutic for GRN-FTD.", "summaryZh": "GRN 突变由于颗粒体蛋白前体 (PGRN) 缺乏而导致额颞叶痴呆 (GRN-FTD)，PGRN 是一种功能尚不清楚的溶酶体分泌蛋白。在这里，我们发现 Grn -/- 小鼠表现出双（单酰基甘油）磷酸（BMP）的全面缺乏，这是一种溶酶体磷脂，我们确定为 pH 依赖性 PGRN 相互作用物以及溶酶体蛋白水解和脂肪分解的氧化还原敏感增强剂。 Grn -/- 大脑还显示出葡萄糖脑苷脂酶底物葡萄糖基鞘氨醇的年龄依赖性二次储存。我们通过改造蛋白质转运载体 (PTV) 来研究蛋白质替代策略：PGRN - 一种重组蛋白，将 PGRN 连接到修饰的 Fc 结构域，该结构域结合人转铁蛋白受体以增强 CNS 生物分布。 PTV:PGRN 挽救了原代小鼠巨噬细胞和人 iPSC 衍生的小胶质细胞中的各种 Grn -/- 表型，包括氧化应激、溶酶体功能障碍和内膜损伤。外周递送的 PTV:PGRN 校正了 Grn -/- CNS 中的 BMP、葡萄糖基鞘氨醇和疾病病理学水平，包括小胶质细胞增生、脂褐质沉着症和神经元损伤。因此，PTV:PGRN 代表了 GRN-FTD 的潜在生物治疗药物。", "titleZh": "用脑渗透性颗粒体蛋白前体生物制剂拯救由 Grn 功能丧失引起的溶酶体贮积症。", "translationSource": "22d34ff919fff468"}, {"pmid": "34388391", "title": "Targeting Pin1 renders pancreatic cancer eradicable by synergizing with immunochemotherapy.", "journal": "Cell", "year": 2021, "published": "2021-09-02", "doi": "10.1016/j.cell.2021.07.020", "doiUrl": "https://doi.org/10.1016/j.cell.2021.07.020", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34388391/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Pancreatic ductal adenocarcinoma (PDAC) is characterized by notorious resistance to current therapies attributed to inherent tumor heterogeneity and highly desmoplastic and immunosuppressive tumor microenvironment (TME). Unique proline isomerase Pin1 regulates multiple cancer pathways, but its role in the TME and cancer immunotherapy is unknown. Here, we find that Pin1 is overexpressed both in cancer cells and cancer-associated fibroblasts (CAFs) and correlates with poor survival in PDAC patients. Targeting Pin1 using clinically available drugs induces complete elimination or sustained remissions of aggressive PDAC by synergizing with anti-PD-1 and gemcitabine in diverse model systems. Mechanistically, Pin1 drives the desmoplastic and immunosuppressive TME by acting on CAFs and induces lysosomal degradation of the PD-1 ligand PD-L1 and the gemcitabine transporter ENT1 in cancer cells, besides activating multiple cancer pathways. Thus, Pin1 inhibition simultaneously blocks multiple cancer pathways, disrupts the desmoplastic and immunosuppressive TME, and upregulates PD-L1 and ENT1, rendering PDAC eradicable by immunochemotherapy.", "summaryZh": "胰腺导管腺癌（PDAC）的特点是对当前治疗产生众所周知的耐药性，这归因于固有的肿瘤异质性和高度促纤维增生和免疫抑制的肿瘤微环境（TME）。独特的脯氨酸异构酶 Pin1 调节多种癌症途径，但其在 TME 和癌症免疫治疗中的作用尚不清楚。在这里，我们发现 Pin1 在癌细胞和癌症相关成纤维细胞 (CAF) 中过度表达，并且与 PDAC 患者的较差生存率相关。使用临床可用药物靶向 Pin1，通过在不同模型系统中与抗 PD-1 和吉西他滨协同作用，诱导侵袭性 PDAC 的完全消除或持续缓解。从机制上讲，Pin1 除了激活多种癌症途径外，还通过作用于 CAF 来驱动促纤维增生和免疫抑制 TME，并诱导癌细胞中 PD-1 配体 PD-L1 和吉西他滨转运蛋白 ENT1 的溶酶体降解。因此，Pin1 抑制同时阻断多种癌症途径，破坏促纤维增生和免疫抑制 TME，并上调 PD-L1 和 ENT1，从而使 PDAC 可通过免疫化疗根除。", "titleZh": "通过与免疫化疗协同作用，靶向 Pin1 可以根除胰腺癌。", "translationSource": "1f8bdb410c6e8bc3"}, {"pmid": "34384544", "title": "Erythroid mitochondrial retention triggers myeloid-dependent type I interferon in human SLE.", "journal": "Cell", "year": 2021, "published": "2021-08-19", "doi": "10.1016/j.cell.2021.07.021", "doiUrl": "https://doi.org/10.1016/j.cell.2021.07.021", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34384544/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteasome", "ubiquitin-proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteasome, ubiquitin-proteasome。", "abstractEn": "Emerging evidence supports that mitochondrial dysfunction contributes to systemic lupus erythematosus (SLE) pathogenesis. Here we show that programmed mitochondrial removal, a hallmark of mammalian erythropoiesis, is defective in SLE. Specifically, we demonstrate that during human erythroid cell maturation, a hypoxia-inducible factor (HIF)-mediated metabolic switch is responsible for the activation of the ubiquitin-proteasome system (UPS), which precedes and is necessary for the autophagic removal of mitochondria. A defect in this pathway leads to accumulation of red blood cells (RBCs) carrying mitochondria (Mito + RBCs) in SLE patients and in correlation with disease activity. Antibody-mediated internalization of Mito + RBCs induces type I interferon (IFN) production through activation of cGAS in macrophages. Accordingly, SLE patients carrying both Mito + RBCs and opsonizing antibodies display the highest levels of blood IFN-stimulated gene (ISG) signatures, a distinctive feature of SLE.", "summaryZh": "新的证据支持线粒体功能障碍导致系统性红斑狼疮 (SLE) 发病机制。在这里，我们发现，程序性线粒体去除（哺乳动物红细胞生成的标志）在系统性红斑狼疮中存在缺陷。具体来说，我们证明在人红系细胞成熟过程中，缺氧诱导因子（HIF）介导的代谢开关负责激活泛素蛋白酶体系统（UPS），该系统先于线粒体的自噬去除，并且是自噬去除线粒体所必需的。该途径的缺陷会导致 SLE 患者携带线粒体（Mito + RBC）的红细胞（RBC）积聚，并与疾病活动相关。抗体介导的 Mito + RBC 内化通过激活巨噬细胞中的 cGAS 诱导 I 型干扰素 (IFN) 的产生。因此，同时携带 Mito + RBC 和调理抗体的 SLE 患者显示出最高水平的血液 IFN 刺激基因 (ISG) 特征，这是 SLE 的一个显着特征。", "titleZh": "红细胞线粒体滞留会触发人类 SLE 中的骨髓依赖性 I 型干扰素。", "translationSource": "7b3022402d39b628"}, {"pmid": "34314702", "title": "Ribosome ADP-ribosylation inhibits translation and maintains proteostasis in cancers.", "journal": "Cell", "year": 2021, "published": "2021-08-19", "doi": "10.1016/j.cell.2021.07.005", "doiUrl": "https://doi.org/10.1016/j.cell.2021.07.005", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34314702/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "Defects in translation lead to changes in the expression of proteins that can serve as drivers of cancer formation. Here, we show that cytosolic NAD + synthesis plays an essential role in ovarian cancer by regulating translation and maintaining protein homeostasis. Expression of NMNAT-2, a cytosolic NAD + synthase, is highly upregulated in ovarian cancers. NMNAT-2 supports the catalytic activity of the mono(ADP-ribosyl) transferase (MART) PARP-16, which mono(ADP-ribosyl)ates (MARylates) ribosomal proteins. Depletion of NMNAT-2 or PARP-16 leads to inhibition of MARylation, increased polysome association and enhanced translation of specific mRNAs, aggregation of their translated protein products, and reduced growth of ovarian cancer cells. Furthermore, MARylation of the ribosomal proteins, such as RPL24 and RPS6, inhibits polysome assembly by stabilizing eIF6 binding to ribosomes. Collectively, our results demonstrate that ribosome MARylation promotes protein homeostasis in cancers by fine-tuning the levels of protein synthesis and preventing toxic protein aggregation.", "summaryZh": "翻译缺陷会导致蛋白质表达发生变化，从而成为癌症形成的驱动因素。在这里，我们证明胞质 NAD + 合成通过调节翻译和维持蛋白质稳态在卵巢癌中发挥重要作用。 NMNAT-2（一种胞质 NAD + 合酶）的表达在卵巢癌中高度上调。 NMNAT-2 支持单 (ADP-核糖基) 转移酶 (MART) PARP-16 的催化活性，该酶可单 (ADP-核糖基) 化 (MARyllates) 核糖体蛋白。 NMNAT-2 或 PARP-16 的耗竭会导致 MARylation 的抑制、多核糖体关联的增加和特定 mRNA 翻译的增强、其翻译蛋白产物的聚集以及卵巢癌细胞生长的减少。此外，核糖体蛋白（例如 RPL24 和 RPS6）的 MARylation 通过稳定 eIF6 与核糖体的结合来抑制多核糖体组装。总的来说，我们的结果表明，核糖体 MARylation 通过微调蛋白质合成水平和防止有毒蛋白质聚集来促进癌症中的蛋白质稳态。", "titleZh": "核糖体 ADP 核糖基化抑制翻译并维持癌症中的蛋白质稳态。", "translationSource": "ea0c425c5e44e0f7"}, {"pmid": "34314701", "title": "ELAVL4, splicing, and glutamatergic dysfunction precede neuron loss in MAPT mutation cerebral organoids.", "journal": "Cell", "year": 2021, "published": "2021-08-19", "doi": "10.1016/j.cell.2021.07.003", "doiUrl": "https://doi.org/10.1016/j.cell.2021.07.003", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/34314701/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：autophagy。", "abstractEn": "Frontotemporal dementia (FTD) because of MAPT mutation causes pathological accumulation of tau and glutamatergic cortical neuronal death by unknown mechanisms. We used human induced pluripotent stem cell (iPSC)-derived cerebral organoids expressing tau-V337M and isogenic corrected controls to discover early alterations because of the mutation that precede neurodegeneration. At 2 months, mutant organoids show upregulated expression of MAPT, glutamatergic signaling pathways, and regulators, including the RNA-binding protein ELAVL4, and increased stress granules. Over the following 4 months, mutant organoids accumulate splicing changes, disruption of autophagy function, and build-up of tau and P-tau-S396. By 6 months, tau-V337M organoids show specific loss of glutamatergic neurons as seen in individuals with FTD. Mutant neurons are susceptible to glutamate toxicity, which can be rescued pharmacologically by the PIKFYVE kinase inhibitor apilimod. Our results demonstrate a sequence of events that precede neurodegeneration, revealing molecular pathways associated with glutamate signaling as potential targets for therapeutic intervention in FTD.", "summaryZh": "MAPT 突变导致的额颞叶痴呆 (FTD) 通过未知机制导致 tau 蛋白病理性积累和谷氨酸能皮质神经元死亡。我们使用表达 tau-V337M 的人诱导多能干细胞 (iPSC) 衍生的脑类器官和同基因校正对照来发现由于神经退行性变之前的突变而引起的早期改变。 2 个月时，突变类器官显示 MAPT、谷氨酸信号通路和调节因子（包括 RNA 结合蛋白 ELAVL4）的表达上调，并且应激颗粒增加。在接下来的 4 个月内，突变类器官不断积累剪接变化、自噬功能破坏以及 tau 和 P-tau-S396 的积累。 6 个月时，tau-V337M 类器官表现出谷氨酸能神经元的特定损失，如 FTD 个体中所见。突变神经元对谷氨酸毒性敏感，可以通过 PIKFYVE 激酶抑制剂阿哌莫德进行药理学拯救。我们的结果证明了神经退行性变之前发生的一系列事件，揭示了与谷氨酸信号传导相关的分子途径作为 FTD 治疗干预的潜在目标。", "titleZh": "在 MAPT 突变脑类器官中，ELAVL4、剪接和谷氨酸功能障碍先于神经元丢失。", "translationSource": "d3b70823d9ee412a"}, {"pmid": "33338421", "title": "TMEM41B Is a Pan-flavivirus Host Factor.", "journal": "Cell", "year": 2021, "published": "2021-01-07", "doi": "10.1016/j.cell.2020.12.005", "doiUrl": "https://doi.org/10.1016/j.cell.2020.12.005", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33338421/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Flaviviruses pose a constant threat to human health. These RNA viruses are transmitted by the bite of infected mosquitoes and ticks and regularly cause outbreaks. To identify host factors required for flavivirus infection, we performed full-genome loss of function CRISPR-Cas9 screens. Based on these results, we focused our efforts on characterizing the roles that TMEM41B and VMP1 play in the virus replication cycle. Our mechanistic studies on TMEM41B revealed that all members of the Flaviviridae family that we tested require TMEM41B. We tested 12 additional virus families and found that SARS-CoV-2 of the Coronaviridae also required TMEM41B for infection. Remarkably, single nucleotide polymorphisms present at nearly 20% in East Asian populations reduce flavivirus infection. Based on our mechanistic studies, we propose that TMEM41B is recruited to flavivirus RNA replication complexes to facilitate membrane curvature, which creates a protected environment for viral genome replication.", "summaryZh": "黄病毒对人类健康构成持续威胁。这些 RNA 病毒通过受感染的蚊子和蜱虫叮咬传播，并经常引起疫情爆发。为了确定黄病毒感染所需的宿主因子，我们进行了全基因组功能丧失 CRISPR-Cas9 筛选。基于这些结果，我们集中精力描述 TMEM41B 和 VMP1 在病毒复制周期中发挥的作用。我们对 TMEM41B 的机制研究表明，我们测试的黄病毒科的所有成员都需要 TMEM41B。我们测试了另外 12 个病毒家族，发现冠状病毒科的 SARS-CoV-2 也需要 TMEM41B 才能感染。值得注意的是，东亚人群中近 20% 的单核苷酸多态性减少了黄病毒感染。根据我们的机制研究，我们建议将 TMEM41B 招募到黄病毒 RNA 复制复合物中以促进膜弯曲，从而为病毒基因组复制创造一个受保护的环境。", "titleZh": "TMEM41B 是一种泛黄病毒宿主因子。", "translationSource": "42048455188473ff"}, {"pmid": "33333024", "title": "Genetic Screens Identify Host Factors for SARS-CoV-2 and Common Cold Coronaviruses.", "journal": "Cell", "year": 2021, "published": "2021-01-07", "doi": "10.1016/j.cell.2020.12.004", "doiUrl": "https://doi.org/10.1016/j.cell.2020.12.004", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33333024/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "The Coronaviridae are a family of viruses that cause disease in humans ranging from mild respiratory infection to potentially lethal acute respiratory distress syndrome. Finding host factors common to multiple coronaviruses could facilitate the development of therapies to combat current and future coronavirus pandemics. Here, we conducted genome-wide CRISPR screens in cells infected by SARS-CoV-2 as well as two seasonally circulating common cold coronaviruses, OC43 and 229E. This approach correctly identified the distinct viral entry factors ACE2 (for SARS-CoV-2), aminopeptidase N (for 229E), and glycosaminoglycans (for OC43). Additionally, we identified phosphatidylinositol phosphate biosynthesis and cholesterol homeostasis as critical host pathways supporting infection by all three coronaviruses. By contrast, the lysosomal protein TMEM106B appeared unique to SARS-CoV-2 infection. Pharmacological inhibition of phosphatidylinositol kinases and cholesterol homeostasis reduced replication of all three coronaviruses. These findings offer important insights for the understanding of the coronavirus life cycle and the development of host-directed therapies.", "summaryZh": "冠状病毒科是一类病毒，可引起人类疾病，从轻度呼吸道感染到潜在致命的急性呼吸窘迫综合征。寻找多种冠状病毒共有的宿主因子可能有助于开发对抗当前和未来冠状病毒大流行的疗法。在这里，我们在感染 SARS-CoV-2 以及两种季节性流行的普通感冒冠状病毒 OC43 和 229E 的细胞中进行了全基因组 CRISPR 筛选。这种方法正确识别了不同的病毒进入因子 ACE2（对于 SARS-CoV-2）、氨肽酶 N（对于 229E）和糖胺聚糖（对于 OC43）。此外，我们确定磷脂酰肌醇磷酸生物合成和胆固醇稳态是支持所有三种冠状病毒感染的关键宿主途径。相比之下，溶酶体蛋白 TMEM106B 似乎是 SARS-CoV-2 感染所特有的。磷脂酰肌醇激酶和胆固醇稳态的药理学抑制减少了所有三种冠状病毒的复制。这些发现为了解冠状病毒生命周期和开发针对宿主的疗法提供了重要见解。", "titleZh": "基因筛查可识别 SARS-CoV-2 和普通感冒冠状病毒的宿主因子。", "translationSource": "08a72a15fa3d6458"}, {"pmid": "33147445", "title": "Identification of Required Host Factors for SARS-CoV-2 Infection in Human Cells.", "journal": "Cell", "year": 2021, "published": "2021-01-07", "doi": "10.1016/j.cell.2020.10.030", "doiUrl": "https://doi.org/10.1016/j.cell.2020.10.030", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33147445/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "To better understand host-virus genetic dependencies and find potential therapeutic targets for COVID-19, we performed a genome-scale CRISPR loss-of-function screen to identify host factors required for SARS-CoV-2 viral infection of human alveolar epithelial cells. Top-ranked genes cluster into distinct pathways, including the vacuolar ATPase proton pump, Retromer, and Commander complexes. We validate these gene targets using several orthogonal methods such as CRISPR knockout, RNA interference knockdown, and small-molecule inhibitors. Using single-cell RNA-sequencing, we identify shared transcriptional changes in cholesterol biosynthesis upon loss of top-ranked genes. In addition, given the key role of the ACE2 receptor in the early stages of viral entry, we show that loss of RAB7A reduces viral entry by sequestering the ACE2 receptor inside cells. Overall, this work provides a genome-scale, quantitative resource of the impact of the loss of each host gene on fitness/response to viral infection.", "summaryZh": "为了更好地了解宿主病毒遗传依赖性并找到 COVID-19 的潜在治疗靶点，我们进行了基因组规模的 CRISPR 功能丧失筛选，以确定 SARS-CoV-2 病毒感染人类肺泡上皮细胞所需的宿主因子。排名靠前的基因聚集成不同的途径，包括液泡 ATP 酶质子泵、Retromer 和 Commander 复合体。我们使用多种正交方法（例如 CRISPR 敲除、RNA 干扰敲除和小分子抑制剂）验证这些基因靶点。使用单细胞 RNA 测序，我们确定了顶级基因丢失后胆固醇生物合成中共有的转录变化。此外，考虑到 ACE2 受体在病毒进入早期阶段的关键作用，我们发现 RAB7A 的缺失会通过将 ACE2 受体隔离在细胞内来减少病毒进入。总体而言，这项工作提供了基因组规模的定量资源，以了解每个宿主基因的丢失对病毒感染的适应性/反应的影响。", "titleZh": "鉴定人类细胞中 SARS-CoV-2 感染所需的宿主因子。", "translationSource": "58136796ae072e18"}, {"pmid": "33328639", "title": "Sorting nexin 5 mediates virus-induced autophagy and immunity.", "journal": "Nature", "year": 2021, "published": "2021-01-01", "doi": "10.1038/s41586-020-03056-z", "doiUrl": "https://doi.org/10.1038/s41586-020-03056-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33328639/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "autophagy", "endosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, autophagy, endosome。", "abstractEn": "Autophagy, a process of degradation that occurs via the lysosomal pathway, has an essential role in multiple aspects of immunity, including immune system development, regulation of innate and adaptive immune and inflammatory responses, selective degradation of intracellular microorganisms, and host protection against infectious diseases 1,2 . Autophagy is known to be induced by stimuli such as nutrient deprivation and suppression of mTOR, but little is known about how autophagosomal biogenesis is initiated in mammalian cells in response to viral infection. Here, using genome-wide short interfering RNA screens, we find that the endosomal protein sorting nexin 5 (SNX5) 3,4 is essential for virus-induced, but not for basal, stress- or endosome-induced, autophagy. We show that SNX5 deletion increases cellular susceptibility to viral infection in vitro, and that Snx5 knockout in mice enhances lethality after infection with several human viruses. Mechanistically, SNX5 interacts with beclin 1 and ATG14-containing class III phosphatidylinositol-3-kinase (PI3KC3) complex 1 (PI3KC3-C1), increases the lipid kinase activity of purified PI3KC3-C1, and is required for endosomal generation of phosphatidylinositol-3-phosphate (PtdIns(3)P) and recruitment of the PtdIns(3)P-binding protein WIPI2 to virion-containing endosomes. These findings identify a context- and organelle-specific mechanism-SNX5-dependent PI3KC3-C1 activation at endosomes-for initiation of autophagy during viral infection.", "summaryZh": "自噬是一种通过溶酶体途径发生的降解过程，在免疫的多个方面具有重要作用，包括免疫系统发育、先天性和适应性免疫和炎症反应的调节、细胞内微生物的选择性降解以及宿主免受传染病的保护 1,2 。众所周知，自噬是由营养剥夺和 mTOR 抑制等刺激诱导的，但对于哺乳动物细胞中自噬体生物发生是如何响应病毒感染而启动的却知之甚少。在这里，使用全基因组短干扰 RNA 筛选，我们发现内体蛋白分选 nexin 5 (SNX5) 3,4 对于病毒诱导的自噬至关重要，但对于基础、应激或内体诱导的自噬则不然。我们发现，SNX5 缺失会增加细胞对体外病毒感染的易感性，而小鼠体内的 Snx5 敲除可增强感染多种人类病毒后的致死率。从机制上讲，SNX5 与 beclin 1 和含有 ATG14 的 III 类磷脂酰肌醇-3-激酶 (PI3KC3) 复合物 1 (PI3KC3-C1) 相互作用，增加纯化 PI3KC3-C1 的脂质激酶活性，并且是内体生成 3-磷酸磷脂酰肌醇 (PtdIns(3)P) 和招募PtdIns(3)P 结合蛋白 WIPI2 与含有病毒颗粒的内体结合。这些发现确定了一种特定于环境和细胞器的机制——在内体中 SNX5 依赖性 PI3KC3-C1 激活——在病毒感染期间启动自噬。", "titleZh": "分选 nexin 5 介导病毒诱导的自噬和免疫。", "translationSource": "17a01770d324e730"}, {"pmid": "33326746", "title": "High-Throughput Discovery and Characterization of Human Transcriptional Effectors.", "journal": "Cell", "year": 2020, "published": "2020-12-23", "doi": "10.1016/j.cell.2020.11.024", "doiUrl": "https://doi.org/10.1016/j.cell.2020.11.024", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33326746/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Thousands of proteins localize to the nucleus; however, it remains unclear which contain transcriptional effectors. Here, we develop HT-recruit, a pooled assay where protein libraries are recruited to a reporter, and their transcriptional effects are measured by sequencing. Using this approach, we measure gene silencing and activation for thousands of domains. We find a relationship between repressor function and evolutionary age for the KRAB domains, discover that Homeodomain repressor strength is collinear with Hox genetic organization, and identify activities for several domains of unknown function. Deep mutational scanning of the CRISPRi KRAB maps the co-repressor binding surface and identifies substitutions that improve stability/silencing. By tiling 238 proteins, we find repressors as short as ten amino acids. Finally, we report new activator domains, including a divergent KRAB. These results provide a resource of 600 human proteins containing effectors and demonstrate a scalable strategy for assigning functions to protein domains.", "summaryZh": "数以千计的蛋白质定位于细胞核；然而，尚不清楚其中含有转录效应子。在这里，我们开发了 HT-recruit，这是一种混合检测，其中蛋白质文库被招募给报告者，并通过测序来测量它们的转录效应。使用这种方法，我们测量了数千个域的基因沉默和激活。我们发现了 KRAB 结构域的阻遏蛋白功能与进化年龄之间的关系，发现同源结构域阻遏蛋白的强度与 Hox 遗传组织共线，并鉴定了几个功能未知的结构域的活性。 CRISPRi KRAB 的深度突变扫描可绘制共阻遏物结合表面的图谱，并识别可提高稳定性/沉默的取代。通过拼接 238 个蛋白质，我们发现了短至 10 个氨基酸的阻遏蛋白。最后，我们报告了新的激活域，包括不同的 KRAB。这些结果提供了包含效应子的 600 种人类蛋白质的资源，并展示了将功能分配给蛋白质结构域的可扩展策略。", "titleZh": "人类转录效应子的高通量发现和表征。", "translationSource": "7639c94074ba49eb"}, {"pmid": "33275901", "title": "Mapping the Degradable Kinome Provides a Resource for Expedited Degrader Development.", "journal": "Cell", "year": 2020, "published": "2020-12-10", "doi": "10.1016/j.cell.2020.10.038", "doiUrl": "https://doi.org/10.1016/j.cell.2020.10.038", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33275901/", "categories": ["靶向蛋白降解", "溶酶体/蛋白酶体"], "matchedTerms": ["targeted protein degradation", "degrader", "proteasome", "ubiquitin proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：targeted protein degradation, degrader, proteasome, ubiquitin proteasome。", "abstractEn": "Targeted protein degradation (TPD) refers to the use of small molecules to induce ubiquitin-dependent degradation of proteins. TPD is of interest in drug development, as it can address previously inaccessible targets. However, degrader discovery and optimization remains an inefficient process due to a lack of understanding of the relative importance of the key molecular events required to induce target degradation. Here, we use chemo-proteomics to annotate the degradable kinome. Our expansive dataset provides chemical leads for ∼200 kinases and demonstrates that the current practice of starting from the highest potency binder is an ineffective method for discovering active compounds. We develop multitargeted degraders to answer fundamental questions about the ubiquitin proteasome system, uncovering that kinase degradation is p97 dependent. This work will not only fuel kinase degrader discovery, but also provides a blueprint for evaluating targeted degradation across entire gene families to accelerate understanding of TPD beyond the kinome.", "summaryZh": "靶向蛋白质降解（TPD）是指利用小分子诱导泛素依赖性蛋白质降解。 TPD 对药物开发很感兴趣，因为它可以解决以前无法达到的目标。然而，由于缺乏对诱导靶标降解所需的关键分子事件的相对重要性的了解，降解剂的发现和优化仍然是一个低效的过程。在这里，我们使用化学蛋白质组学来注释可降解激酶组。我们庞大的数据集提供了约 200 种激酶的化学​​先导化合物，并表明目前从最高效力结合剂开始的做法对于发现活性化合物来说是无效的方法。我们开发多靶点降解剂来回答有关泛素蛋白酶体系统的基本问题，揭示激酶降解是 p97 依赖性的。这项工作不仅将促进激酶降解剂的发现，而且还提供了评估整个基因家族的靶向降解的蓝图，以加速对激酶组之外的 TPD 的理解。", "titleZh": "绘制可降解激酶组图谱为加速降解剂开发提供了资源。", "translationSource": "1153e6b37752e605"}, {"pmid": "33157038", "title": "β-Coronaviruses Use Lysosomes for Egress Instead of the Biosynthetic Secretory Pathway.", "journal": "Cell", "year": 2020, "published": "2020-12-10", "doi": "10.1016/j.cell.2020.10.039", "doiUrl": "https://doi.org/10.1016/j.cell.2020.10.039", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33157038/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "β-Coronaviruses are a family of positive-strand enveloped RNA viruses that includes the severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2). Much is known regarding their cellular entry and replication pathways, but their mode of egress remains uncertain. Using imaging methodologies and virus-specific reporters, we demonstrate that β-coronaviruses utilize lysosomal trafficking for egress rather than the biosynthetic secretory pathway more commonly used by other enveloped viruses. This unconventional egress is regulated by the Arf-like small GTPase Arl8b and can be blocked by the Rab7 GTPase competitive inhibitor CID1067700. Such non-lytic release of β-coronaviruses results in lysosome deacidification, inactivation of lysosomal degradation enzymes, and disruption of antigen presentation pathways. β-Coronavirus-induced exploitation of lysosomal organelles for egress provides insights into the cellular and immunological abnormalities observed in patients and suggests new therapeutic modalities. Published by Elsevier Inc.", "summaryZh": "β-冠状病毒是正链有包膜 RNA 病毒家族，其中包括严重急性呼吸综合征冠状病毒 2 (SARS-CoV-2)。人们对它们的细胞进入和复制途径了解很多，但它们的排出模式仍然不确定。使用成像方法和病毒特异性报告基因，我们证明β-冠状病毒利用溶酶体运输进行出口，而不是其他包膜病毒更常用的生物合成分泌途径。这种非常规出口受到 Arf 样小 GTPase Arl8b 的调节，并且可以被 Rab7 GTPase 竞争性抑制剂 CID1067700 阻断。 β-冠状病毒的这种非裂解性释放导致溶酶体脱酸、溶酶体降解酶失活以及抗原呈递途径破坏。 β-冠状病毒诱导的溶酶体细胞器的出口利用提供了对患者中观察到的细胞和免疫学异常的深入了解，并提出了新的治疗方式。由爱思唯尔公司出版", "titleZh": "β-冠状病毒使用溶酶体而不是生物合成分泌途径进行出口。", "translationSource": "b1b11a4849bfcc40"}, {"pmid": "33208952", "title": "MFSD12 mediates the import of cysteine into melanosomes and lysosomes.", "journal": "Nature", "year": 2020, "published": "2020-12-01", "doi": "10.1038/s41586-020-2937-x", "doiUrl": "https://doi.org/10.1038/s41586-020-2937-x", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33208952/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "Dozens of genes contribute to the wide variation in human pigmentation. Many of these genes encode proteins that localize to the melanosome-the organelle, related to the lysosome, that synthesizes pigment-but have unclear functions 1,2 . Here we describe MelanoIP, a method for rapidly isolating melanosomes and profiling their labile metabolite contents. We use this method to study MFSD12, a transmembrane protein of unknown molecular function that, when suppressed, causes darker pigmentation in mice and humans 3,4 . We find that MFSD12 is required to maintain normal levels of cystine-the oxidized dimer of cysteine-in melanosomes, and to produce cysteinyldopas, the precursors of pheomelanin synthesis made in melanosomes via cysteine oxidation 5,6 . Tracing and biochemical analyses show that MFSD12 is necessary for the import of cysteine into melanosomes and, in non-pigmented cells, lysosomes. Indeed, loss of MFSD12 reduced the accumulation of cystine in lysosomes of fibroblasts from patients with cystinosis, a lysosomal-storage disease caused by inactivation of the lysosomal cystine exporter cystinosin 7-9 . Thus, MFSD12 is an essential component of the cysteine importer for melanosomes and lysosomes.", "summaryZh": "数十个基因导致人类色素沉着的广泛变化。其中许多基因编码定位于黑素体（与溶酶体相关的细胞器，合成色素）的蛋白质，但功能尚不清楚 1,2 。在这里，我们描述了 MelanoIP，一种快速分离黑素体并分析其不稳定代谢物含量的方法。我们使用这种方法来研究 MFSD12，这是一种分子功能未知的跨膜蛋白，当受到抑制时，会导致小鼠和人类的色素沉着变深 3,4 。我们发现，MFSD12 需要维持黑素体中胱氨酸（半胱氨酸的氧化二聚体）的正常水平，并产生半胱氨酰多巴（通过半胱氨酸氧化在黑素体中合成褐黑素的前体）5,6 。示踪和生化分析表明，MFSD12 对于将半胱氨酸输入黑素体以及在非色素细胞中输入溶酶体是必需的。事实上，MFSD12 的缺失减少了胱氨酸病患者成纤维细胞溶酶体中胱氨酸的积累，胱氨酸病是一种由溶酶体胱氨酸输出蛋白胱氨酸失活引起的溶酶体贮积病 7-9 。因此，MFSD12 是黑素体和溶酶体半胱氨酸输入蛋白的重要组成部分。", "titleZh": "MFSD12 介导半胱氨酸进入黑素体和溶酶体。", "translationSource": "83c4dc9f1c5efdf1"}, {"pmid": "33208943", "title": "Small-molecule-induced polymerization triggers degradation of BCL6.", "journal": "Nature", "year": 2020, "published": "2020-12-01", "doi": "10.1038/s41586-020-2925-1", "doiUrl": "https://doi.org/10.1038/s41586-020-2925-1", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33208943/", "categories": ["合成生物学", "靶向蛋白降解"], "matchedTerms": ["synthetic biology", "targeted protein degradation"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology, targeted protein degradation。", "abstractEn": "Effective and sustained inhibition of non-enzymatic oncogenic driver proteins is a major pharmacological challenge. The clinical success of thalidomide analogues demonstrates the therapeutic efficacy of drug-induced degradation of transcription factors and other cancer targets 1-3 , but a substantial subset of proteins are resistant to targeted degradation using existing approaches 4,5 . Here we report an alternative mechanism of targeted protein degradation, in which a small molecule induces the highly specific, reversible polymerization of a target protein, followed by its sequestration into cellular foci and subsequent degradation. BI-3802 is a small molecule that binds to the Broad-complex, Tramtrack and Bric-à-brac (BTB) domain of the oncogenic transcription factor B cell lymphoma 6 (BCL6) and leads to the proteasomal degradation of BCL6 6 . We use cryo-electron microscopy to reveal how the solvent-exposed moiety of a BCL6-binding molecule contributes to a composite ligand-protein surface that engages BCL6 homodimers to form a supramolecular structure. Drug-induced formation of BCL6 filaments facilitates ubiquitination by the SIAH1 E3 ubiquitin ligase. Our findings demonstrate that a small molecule such as BI-3802 can induce polymerization coupled to highly specific protein degradation, which in the case of BCL6 leads to increased pharmacological activity compared to the effects induced by other BCL6 inhibitors. These findings open new avenues for the development of therapeutic agents and synthetic biology.", "summaryZh": "有效且持续地抑制非酶致癌驱动蛋白是一个主要的药理学挑战。沙利度胺类似物的临床成功证明了药物诱导的转录因子和其他癌症靶标降解的治疗功效 1-3 ，但很大一部分蛋白质对使用现有方法的靶向降解具有抵抗力 4,5 。在这里，我们报告了一种靶向蛋白质降解的替代机制，其中小分子诱导靶蛋白高度特异性、可逆聚合，然后将其隔离到细胞灶中并随后降解。 BI-3802 是一种小分子，可与致癌转录因子 B 细胞淋巴瘤 6 (BCL6) 的 Broad-complex、Tramtrack 和 Bric-à-brac (BTB) 结构域结合，并导致 BCL6 6 的蛋白酶体降解。我们使用冷冻电子显微镜来揭示 BCL6 结合分子的溶剂暴露部分如何形成复合配体-蛋白质表面，该表面与 BCL6 同二聚体结合形成超分子结构。药物诱导的 BCL6 丝形成促进 SIAH1 E3 泛素连接酶的泛素化。我们的研究结果表明，像 BI-3802 这样的小分子可以诱导聚合并伴有高度特异性的蛋白质降解，与其他 BCL6 抑制剂诱导的效果相比，BCL6 会导致药理活性增加。这些发现为治疗剂和合成生物学的开发开辟了新途径。", "titleZh": "小分子诱导的聚合会引发 BCL6 的降解。", "translationSource": "f39189cf581457aa"}, {"pmid": "33177715", "title": "Inhibition of PCSK9 potentiates immune checkpoint therapy for cancer.", "journal": "Nature", "year": 2020, "published": "2020-12-01", "doi": "10.1038/s41586-020-2911-7", "doiUrl": "https://doi.org/10.1038/s41586-020-2911-7", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33177715/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome。", "abstractEn": "Despite its success in achieving the long-term survival of 10-30% of treated individuals, immune therapy is still ineffective for most patients with cancer 1,2 . Many efforts are therefore underway to identify new approaches that enhance such immune 'checkpoint' therapy 3-5 (so called because its aim is to block proteins that inhibit checkpoint signalling pathways in T cells, thereby freeing those immune cells to target cancer cells). Here we show that inhibiting PCSK9-a key protein in the regulation of cholesterol metabolism 6-8 -can boost the response of tumours to immune checkpoint therapy, through a mechanism that is independent of PCSK9's cholesterol-regulating functions. Deleting the PCSK9 gene in mouse cancer cells substantially attenuates or prevents their growth in mice in a manner that depends on cytotoxic T cells. It also enhances the efficacy of immune therapy that is targeted at the checkpoint protein PD1. Furthermore, clinically approved PCSK9-neutralizing antibodies synergize with anti-PD1 therapy in suppressing tumour growth in mouse models of cancer. Inhibiting PCSK9-either through genetic deletion or using PCSK9 antibodies-increases the expression of major histocompatibility protein class I (MHC I) proteins on the tumour cell surface, promoting robust intratumoral infiltration of cytotoxic T cells. Mechanistically, we find that PCSK9 can disrupt the recycling of MHC I to the cell surface by associating with it physically and promoting its relocation and degradation in the lysosome. Together, these results suggest that inhibiting PCSK9 is a promising way to enhance immune checkpoint therapy for cancer.", "summaryZh": "尽管免疫治疗成功地使 10-30% 的治疗个体实现了长期生存，但它对大多数癌症患者仍然无效 1,2 。因此，人们正在努力寻找增强此类免疫“检查点”疗法 3-5 的新方法（之所以如此称呼，是因为其目的是阻断抑制 T 细胞中检查点信号通路的蛋白质，从而释放这些免疫细胞来靶向癌细胞）。在这里，我们表明，抑制 PCSK9（调节胆固醇代谢的关键蛋白 6-8）可以通过独立于 PCSK9 胆固醇调节功能的机制增强肿瘤对免疫检查点治疗的反应。删除小鼠癌细胞中的 PCSK9 基因会以依赖于细胞毒性 T 细胞的方式显着减弱或阻止它们在小鼠体内的生长。它还增强了针对检查点蛋白 PD1 的免疫疗法的功效。此外，临床批准的 PCSK9 中和抗体与抗 PD1 疗法协同作用，抑制小鼠癌症模型中的肿瘤生长。通过基因删除或使用 PCSK9 抗体抑制 PCSK9 会增加肿瘤细胞表面主要组织相容性蛋白 I 类 (MHC I) 蛋白的表达，促进细胞毒性 T 细胞在肿瘤内的强劲浸润。从机制上讲，我们发现 PCSK9 可以通过与 MHC I 物理结合并促进其在溶酶体中的重新定位和降解来破坏 MHC I 到细胞表面的再循环。总之，这些结果表明抑制 PCSK9 是增强癌症免疫检查点治疗的一种有前途的方法。", "titleZh": "PCSK9 的抑制可增强癌症的免疫检查点治疗。", "translationSource": "f55b0271a0c1943b"}, {"pmid": "32866962", "title": "Neurotoxic microglia promote TDP-43 proteinopathy in progranulin deficiency.", "journal": "Nature", "year": 2020, "published": "2020-12-01", "doi": "10.1038/s41586-020-2709-7", "doiUrl": "https://doi.org/10.1038/s41586-020-2709-7", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32866962/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "endolysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, endolysosomal。", "abstractEn": "Aberrant aggregation of the RNA-binding protein TDP-43 in neurons is a hallmark of frontotemporal lobar degeneration caused by haploinsufficiency in the gene encoding progranulin 1,2 . However, the mechanism leading to TDP-43 proteinopathy remains unclear. Here we use single-nucleus RNA sequencing to show that progranulin deficiency promotes microglial transition from a homeostatic to a disease-specific state that causes endolysosomal dysfunction and neurodegeneration in mice. These defects persist even when Grn -/- microglia are cultured ex vivo. In addition, single-nucleus RNA sequencing reveals selective loss of excitatory neurons at disease end-stage, which is characterized by prominent nuclear and cytoplasmic TDP-43 granules and nuclear pore defects. Remarkably, conditioned media from Grn -/- microglia are sufficient to promote TDP-43 granule formation, nuclear pore defects and cell death in excitatory neurons via the complement activation pathway. Consistent with these results, deletion of the genes encoding C1qa and C3 mitigates microglial toxicity and rescues TDP-43 proteinopathy and neurodegeneration. These results uncover previously unappreciated contributions of chronic microglial toxicity to TDP-43 proteinopathy during neurodegeneration.", "summaryZh": "神经元中 RNA 结合蛋白 TDP-43 的异常聚集是由编码颗粒体蛋白前体 1,2 的基因单倍体不足引起的额颞叶变性的标志。然而，导致 TDP-43 蛋白病的机制仍不清楚。在这里，我们使用单核 RNA 测序来证明颗粒体蛋白前体缺乏促进小胶质细胞从稳态转变为疾病特异性状态，从而导致小鼠内溶酶体功能障碍和神经变性。即使在离体培养 Grn -/- 小胶质细胞时，这些缺陷仍然存在。此外，单核RNA测序揭示了疾病终末期兴奋性神经元的选择性丧失，其特征是明显的核和细胞质TDP-43颗粒以及核孔缺陷。值得注意的是，来自 Grn -/- 小胶质细胞的条件培养基足以通过补体激活途径促进兴奋性神经元中 TDP-43 颗粒的形成、核孔缺陷和细胞死亡。与这些结果一致，编码 C1qa 和 C3 的基因的缺失减轻了小胶质细胞毒性并挽救了 TDP-43 蛋白病和神经变性。这些结果揭示了神经变性过程中慢性小胶质细胞毒性对 TDP-43 蛋白病的影响，这一点此前未被认识到。", "titleZh": "神经毒性小胶质细胞在颗粒体蛋白前体缺乏症中促进 TDP-43 蛋白病。", "translationSource": "48b46b564dc17764"}, {"pmid": "32968279", "title": "Modulating TRADD to restore cellular homeostasis and inhibit apoptosis.", "journal": "Nature", "year": 2020, "published": "2020-11-01", "doi": "10.1038/s41586-020-2757-z", "doiUrl": "https://doi.org/10.1038/s41586-020-2757-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32968279/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis", "autophagy"], "standard":
