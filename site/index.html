  <script id="literature-data" type="application/json">{"updatedAt": "2026-07-14T12:59:29+00:00", "source": "PubMed E-utilities / NCBI", "scope": "2020 年以来；CNS 正刊及 Cell/Nature/Science 系列子刊；合成生物学、靶向蛋白降解、溶酶体或蛋白酶体相关关键词。", "items": [{"pmid": "42167249", "title": "Scavenger receptor class F member 2 is an intracellular receptor for hepatitis B virus.", "journal": "Cell", "year": 2026, "published": "2026-07-09", "doi": "10.1016/j.cell.2026.04.045", "doiUrl": "https://doi.org/10.1016/j.cell.2026.04.045", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42167249/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["endosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：endosome。", "abstractEn": "Hepatitis B virus (HBV) infects hepatocytes by specific binding to the cell-surface receptor-sodium taurocholate cotransporting polypeptide (NTCP)-through the preS1 region of its large envelope protein, followed by a less well-understood transport process across the cytoplasm to the nucleus. Here, we report that scavenger receptor class F member 2 (SCARF2), a single-pass transmembrane protein, functions as an intracellular receptor for HBV. SCARF2 binds to a preS1 region downstream of the NTCP binding site through its N-terminal epidermal growth factor (EGF)-like domains 4-6, and its proline-rich C-terminal domain also plays an indispensable role in the infection. The internalized HBV virions are transported to the cytoplasmic side of nuclear pore complexes within the SCARF2-containing endosomes. HBV nucleocapsid release from the endosomal vesicles is impaired by knockdown of SCARF2. These results suggest a model in which SCARF2 conveys HBV to the periphery of nuclear pore complexes (NPCs) and ultimately leads to viral nucleocapsid release for nuclear entry.", "summaryZh": "乙型肝炎病毒 (HBV) 通过其大包膜蛋白的 preS1 区域与细胞表面受体牛磺胆酸钠共转运多肽 (NTCP) 特异性结合来感染肝细胞，然后通过一个不太了解的转运过程穿过细胞质到达细胞核。在这里，我们报道了清道夫受体 F 类成员 2 (SCARF2)，一种单次跨膜蛋白，充当 HBV 的细胞内受体。 SCARF2通过其N端表皮生长因子（EGF）样结构域4-6与NTCP结合位点下游的preS1区域结合，其富含脯氨酸的C端结构域也在感染中发挥着不可或缺的作用。内化的 HBV 病毒体被转运至含有 SCARF2 的内体中核孔复合物的细胞质侧。 SCARF2 的敲低会损害 HBV 核衣壳从内体囊泡的释放。这些结果表明，SCARF2 将 HBV 传递至核孔复合物 (NPC) 的外围，并最终导致病毒核衣壳释放以进入核。", "titleZh": "F 类清道夫受体成员 2 是乙型肝炎病毒的细胞内受体。", "translationSource": "f893f2eb98f2ed06"}, {"pmid": "42387167", "title": "Towards the construction of a virtual yeast.", "journal": "Nature", "year": 2026, "published": "2026-07-01", "doi": "10.1038/s41586-026-10574-9", "doiUrl": "https://doi.org/10.1038/s41586-026-10574-9", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42387167/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "To advance the computational simulation of cellular life, we propose a virtual yeast, an artificial intelligence (AI)-driven agent that models eukaryotic cellular behaviours by integrating multimodal biological data, mechanistic reasoning and active experimentation using Saccharomyces cerevisiae as a genetically tractable and data-rich model system. Cellular complexity is decomposed into eight function-centred modules, spanning genetic, metabolic and structural systems, each realized as a domain-specific AI tool coordinated through a large language model-based orchestration layer. Built on three data pillars, namely, mechanistic knowledge, subcellular architecture and dynamic states, the system integrates representation learning and generative modelling within a closed-loop learning pipeline that autonomously designs and executes experiments. The virtual yeast serves as both a conceptual and an operational platform to optimize biosynthetic pathways, support the generation and prioritization of hypotheses across diverse cellular processes, and accelerate target discovery. By coupling biological realism with autonomous AI reasoning, the virtual yeast establishes a generalizable blueprint for constructing virtual eukaryotic cells and advancing synthetic biology.", "summaryZh": "为了推进细胞生命的计算模拟，我们提出了一种虚拟酵母，这是一种人工智能（AI）驱动的代理，通过使用酿酒酵母作为遗传上易于处理且数据丰富的模型系统，通过集成多模式生物数据、机械推理和主动实验来模拟真核细胞行为。细胞复杂性被分解为八个以功能为中心的模块，涵盖遗传、代谢和结构系统，每个模块都实现为通过基于大型语言模型的编排层进行协调的特定领域的人工智能工具。该系统建立在机械知识、亚细胞架构和动态三个数据支柱的基础上，将表示学习和生成建模集成在一个闭环学习管道中，可自主设计和执行实验。虚拟酵母既可以作为概念平台，也可以作为操作平台来优化生物合成途径，支持跨不同细胞过程的假设的生成和优先级排序，并加速目标发现。通过将生物现实主义与自主人工智能推理相结合，虚拟酵母为构建虚拟真核细胞和推进合成生物学建立了通用蓝图。", "titleZh": "致力于构建虚拟酵母。", "translationSource": "d4cac93ca0cd2c82"}, {"pmid": "42386962", "title": "A secreted endosymbiont protein essential for colonizing host cells.", "journal": "Nature", "year": 2026, "published": "2026-07-01", "doi": "10.1038/s41586-026-10711-4", "doiUrl": "https://doi.org/10.1038/s41586-026-10711-4", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42386962/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Intracellular bacterial symbioses have arisen myriad times in eukaryotes, with dozens known from insects alone 1,2 . Beginning with Buchnera, the obligate endosymbiont of aphids, genomes of endosymbionts have illuminated their evolutionary origins and metabolic contributions to hosts 3,4 . However, the mechanisms by which non-culturable endosymbionts enter host cells and suppress cellular immune processes have remained unclear. Here we show that an uncharacterized Buchnera protein, designated SyeA, was present in the Buchnera ancestor, is secreted into the host cytoplasm, is homologous to secreted effectors of bacterial pathogens and is essential for Buchnera transmission. Buchnera is transmitted through expulsion from specialized maternal cells and uptake by embryos 5 . Using immunofluorescence microscopy, we found elevated SyeA levels after colonization of the embryonic cell, accompanied by actin accumulation at the entry site. SyeA localizes outside the host-derived membrane and actin layer surrounding each Buchnera cell within host cytoplasm. Knockdown of syeA expression disrupts colonization of embryos and embryonic development and elevates lysosomal activity, leading to Buchnera destruction 6 . Our findings provide insights into how an anciently associated, mutualistic endosymbiont achieves its intracellular existence. SyeA represents a vestige of pathogenic origins that was followed by evolution of increased host control and erosion of the original, more complex pathogenicity machinery.", "summaryZh": "细胞内细菌共生现象在真核生物中已经出现过无数次，仅昆虫中就有数十种共生现象 1,2 。从蚜虫的专性内共生体 Buchnera 开始，内共生体的基因组已经阐明了它们的进化起源和对宿主的代谢贡献 3,4 。然而，不可培养的内共生体进入宿主细胞并抑制细胞免疫过程的机制仍不清楚。在这里，我们展示了一种未表征的 Buchnera 蛋白，称为 SyeA，存在于 Buchnera 祖先中，分泌到宿主细胞质中，与细菌病原体的分泌效应子同源，并且对于 Buchnera 传播至关重要。 Buchnera 通过从专门的母体细胞中排出并被胚胎吸收而传播 5 。使用免疫荧光显微镜，我们发现胚胎细胞定植后 SyeA 水平升高，并伴随着肌动蛋白在进入位点的积累。 SyeA 位于宿主细胞质内每个 Buchnera 细胞周围的宿主衍生膜和肌动蛋白层之外。 syeA 表达的敲低会破坏胚胎的定植和胚胎发育，并提高溶酶体活性，导致 Buchnera 破坏 6 。我们的研究结果提供了关于古老相关的互利内共生体如何实现其细胞内存在的见解。 SyeA 代表了致病起源的痕迹，随后是宿主控制增强的进化和原始的、更复杂的致病机制的侵蚀。", "titleZh": "一种分泌的内共生蛋白，对于定植宿主细胞至关重要。", "translationSource": "e951fc50dac8367b"}, {"pmid": "42385704", "title": "Co-option of lysosomal machinery shapes the evolution of the intracellular photosymbiosis supporting coral reefs.", "journal": "Cell", "year": 2026, "published": "2026-07-01", "doi": "10.1016/j.cell.2026.06.015", "doiUrl": "https://doi.org/10.1016/j.cell.2026.06.015", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42385704/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Endosymbiosis has spurred the evolution of new organelles across life. Corals and other cnidarians have repeatedly evolved an organelle, called the symbiosome, which houses intracellular algal symbionts. However, the molecular mechanisms enabling this repeated evolution remain unclear. Using the sea anemone Aiptasia, we generated a high-quality proteome of the symbiosome, revealing protein trafficking mechanisms and the types of biomolecules exchanged during symbiosis. Symbiosomal enrichment of lysosomal proteins, visualization of lysosomal fusion, and reduced symbiosis following knockdown of lysosomal genes indicate that the symbiosome functions through extensive co-option of lysosomal proteins. We identified a symbiosomal bicarbonate/sulfate transporter, SLC26A11, and showed through CRISPR/Cas9 mutagenesis that this lysosomal transporter is required for symbiosis in Aiptasia and a reef-building coral. Together, these findings reveal that corals and anemones have repeatedly co-opted lysosomal proteins to concentrate carbon and shuttle metabolites to support photosymbiosis, providing a relatively simple path for the repeated evolution of new photosymbioses.", "summaryZh": "内共生刺激了生命中新细胞器的进化。珊瑚和其他刺胞动物不断进化出一种称为共生体的细胞器，其中含有细胞内藻类共生体。然而，实现这种重复进化的分子机制仍不清楚。利用海葵 Aiptasia，我们生成了高质量的共生体蛋白质组，揭示了蛋白质运输机制和共生过程中交换的生物分子类型。溶酶体蛋白的共生体富集、溶酶体融合的可视化以及溶酶体基因敲低后共生的减少表明，共生体通过溶酶体蛋白的广泛共同选择而发挥作用。我们鉴定了一种共生体碳酸氢盐/硫酸盐转运蛋白 SLC26A11，并通过 CRISPR/Cas9 诱变表明，这种溶酶体转运蛋白是 Aiptasia 和造礁珊瑚共生所必需的。总之，这些发现表明，珊瑚和海葵反复选择溶酶体蛋白来浓缩碳和穿梭代谢物以支持光共生，为新光共生的重复进化提供了相对简单的途径。", "titleZh": "溶酶体机制的共同选择塑造了支持珊瑚礁的细胞内光共生的进化。", "translationSource": "30d8d2e625181149"}, {"pmid": "42143019", "title": "Cell-autonomous control of CAR signaling and receptor shedding via ADAM17-mediated proteolysis.", "journal": "Cell", "year": 2026, "published": "2026-06-25", "doi": "10.1016/j.cell.2026.04.037", "doiUrl": "https://doi.org/10.1016/j.cell.2026.04.037", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42143019/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "We sought to endow T cell autonomous regulation of cell surface protein expression by exploiting the conditional proteolytic activity of ADAM17 following T cell activation. Screening of canonical ADAM17 substrates yielded a minimal 15-aa CD62L-derived motif that confers rapid and reversible cleavage of a receptor following T cell activation-termed activation-induced release (AIR). Embedding AIR into tonic-signaling CARs reduced basal CAR expression proportional to the degree of tonic signaling induced, curtailing exhaustion and improving antitumor potency. In non-tonic signaling CARs, AIR decreased activation-induced cell death and enhanced T cell expansion after stimulation. AIR's modularity supports higher-order logic-gating; AIR-regulated peptide masks enable antigen-dependent unmasking of an EGFR-targeting CAR. Finally, CRISPR knockin of AIR into endogenous FAS or TGFBR2 endowed them with activation-induced shedding, which enhanced tumor clearance while preserving signaling in non-activating conditions. AIR is a compact switch that provides fast, autonomous regulation of surface proteins for next-generation cell therapies.", "summaryZh": "我们试图通过利用 T 细胞激活后 ADAM17 的条件蛋白水解活性，赋予 T 细胞自主调节细胞表面蛋白表达的能力。对经典 ADAM17 底物的筛选产生了最小的 15 个氨基酸 CD62L 衍生基序，该基序可在 T 细胞激活后快速、可逆地切割受体，称为激活诱导释放 (AIR)。将 AIR 嵌入强直信号 CAR 中，可降低基础 CAR 表达，其表达与强直信号诱导的程度成正比，从而减少疲劳并提高抗肿瘤效力。在非强直信号传导 CAR 中，AIR 减少了激活诱导的细胞死亡，并增强了刺激后 T 细胞的扩增。 AIR 的模块化支持高阶逻辑门； AIR 调节的肽掩模能够实现 EGFR 靶向 CAR 的抗原依赖性揭开。最后，通过 CRISPR 将 AIR 敲入内源性 FAS 或 TGFBR2，赋予它们激活诱导的脱落，从而增强肿瘤清除，同时在非激活条件下保留信号传导。 AIR 是一种紧凑型开关，可为下一代细胞疗法提供表面蛋白的快速、自主调节。", "titleZh": "通过 ADAM17 介导的蛋白水解作用，细胞自主控制 CAR 信号传导和受体脱落。", "translationSource": "a70793c5bfccf57f"}, {"pmid": "42105761", "title": "Genetic basis of phytoalexin-mediated chemical defense in plants.", "journal": "Cell", "year": 2026, "published": "2026-06-25", "doi": "10.1016/j.cell.2026.04.021", "doiUrl": "https://doi.org/10.1016/j.cell.2026.04.021", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42105761/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Phytoalexins are core components of plant chemical defense against pathogens. However, the genetic basis and regulatory mechanisms governing their biosynthesis remain preliminary. Debneyol is a well-defined, broad-spectrum fungicidal phytoalexin. Here, we elucidate its biosynthetic pathway, key regulators, and activity against multiple pathogens. We show that debneyol is synthesized from farnesyl pyrophosphate (FPP) through three steps catalyzed by 5-epi-aristolochene synthase (EAS), 5-epi-aristolochene epoxidase (EAE), and epoxide hydrolase-1 (EH1). MCD1 (miR1919-targeted cell death-factor-1) interacts with EAS and EAE, enhancing their association and EAE activity and promoting debneyol biosynthesis. Increased MCD1 expression confers plant resistance not only against fungal but also viral and bacterial pathogens. Our work reveals a complete plant phytoalexin-based chemical defense machinery, opening avenues for engineering broad-spectrum plant resistance and industrial-scale debneyol production via synthetic biology.", "summaryZh": "植物抗毒素是植物化学防御病原体的核心成分。然而，控制其生物合成的遗传基础和调控机制仍处于初步阶段。 Debneyol 是一种性质明确的广谱杀菌植物抗毒素。在这里，我们阐明了其生物合成途径、关键调节因子以及针对多种病原体的活性。我们发现地布尼醇是由法尼基焦磷酸 (FPP) 在 5-表马兜铃烯合酶 (EAS)、5-表马兜铃烯环氧化酶 (EAE) 和环氧化物水解酶 1 (EH1) 催化下经过三个步骤合成的。 MCD1（miR1919 靶向细胞死亡因子-1）与 EAS 和 EAE 相互作用，增强它们的关联和 EAE 活性并促进 debneyol 生物合成。 MCD1 表达增加使植物不仅能抵抗真菌，还能抵抗病毒和细菌病原体。我们的工作揭示了一种完整的基于植物抗毒素的化学防御机制，为通过合成生物学工程广谱植物抗性和工业规模生产地布尼醇开辟了途径。", "titleZh": "植物抗毒素介导的化学防御的遗传基础。", "translationSource": "c657a9f6182b7fe5"}, {"pmid": "42034052", "title": "Engineered commensals for metabolic modulation of the gut-liver-brain axis.", "journal": "Cell", "year": 2026, "published": "2026-06-25", "doi": "10.1016/j.cell.2026.03.048", "doiUrl": "https://doi.org/10.1016/j.cell.2026.03.048", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42034052/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "The gut-liver-brain axis is central to metabolic and neurological homeostasis and is mediated by host- and microbiota-derived metabolites. Disruptions in this axis contribute to complex disorders, underscoring the need for targeted, multi-metabolite interventions. Here, we engineered commensal Lactobacillus plantarum WCFS1 strains to specifically modulate metabolites dysregulated in hepatic encephalopathy (HE), a disorder driven by hyperammonemia and amino acid imbalance. One strain couples ammonia assimilation with branched-chain amino acid (BCAA) biosynthesis, whereas the other enhances L-glutamine utilization to suppress ammonia generation. In two preclinical HE models, these strains reduced systemic ammonia by up to 10-fold, restored BCAA and L-glutamine balance, and improved anxiety-like and cognitive behaviors. Notably, they outperformed rifaximin, a clinically used HE therapy, while preserving gut microbiota diversity. These findings establish engineered commensals as a modular, responsive platform for multi-metabolite modulation of host-microbiota metabolism, offering a programmable strategy to restore metabolic homeostasis in disorders of the gut-liver-brain axis.", "summaryZh": "肠-肝-脑轴是代谢和神经稳态的核心，由宿主和微生物群衍生的代谢物介导。该轴的破坏会导致复杂的疾病，强调需要有针对性的多代谢干预措施。在这里，我们设计了共生植物乳杆菌 WCFS1 菌株，以特异性调节肝性脑病 (HE) 中代谢失调的代谢物，肝性脑病是一种由高氨血症和氨基酸失衡引起的疾病。一种菌株将氨同化与支链氨基酸 (BCAA) 生物合成结合起来，而另一种则增强 L-谷氨酰胺的利用以抑制氨的产生。在两个临床前 HE 模型中，这些菌株可将全身氨减少高达 10 倍，恢复 BCAA 和 L-谷氨酰胺平衡，并改善焦虑样行为和认知行为。值得注意的是，它们的表现优于临床使用的 HE 疗法利福昔明，同时保留了肠道微生物群的多样性。这些发现将工程共生体确立为一种模块化、响应性平台，用于宿主微生物群代谢的多代谢物调节，提供了一种可编程策略来恢复肠-肝-脑轴疾病的代谢稳态。", "titleZh": "用于肠-肝-脑轴代谢调节的工程共生体。", "translationSource": "f8c04a3cac17f284"}, {"pmid": "42343138", "title": "Dietary cholesterol activates a Ral-dependent pathway driving LDLR turnover.", "journal": "Nature", "year": 2026, "published": "2026-06-24", "doi": "10.1038/s41586-026-10697-z", "doiUrl": "https://doi.org/10.1038/s41586-026-10697-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42343138/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "Metabolism of the hepatic low-density lipoprotein receptor (LDLR) is a key determinant of cholesterol homeostasis 1,2 . The molecular switches that coordinate LDLR trafficking and turnover in response to nutritional cues, including high dietary cholesterol, remain poorly defined 3-6 . Here we identify a new pathway regulated by Ral GTPases that links extracellular cholesterol signals to the intracellular trafficking machinery controlling LDLR turnover. Chronic dietary cholesterol activates the Ral proteins by increasing RAS activity, routing LDLR to lysosomes for degradation and inhibiting its recycling independently of transcriptional regulation or PCSK9. Constitutive activation of Ral via RalGAPB deletion or overexpression of constitutively active Ral mutants in hepatocytes reduces LDLR levels and impairs cholesterol clearance. Ral engages the endocytic RalBP1-REPS1 complex to promote LDLR internalization and lysosomal routing, where LDLR is degraded by the lysosomal protease cathepsin A (CTSA). Ral activation directs CTSA towards lysosomes for maturation while limiting its secretion, further promoting LDLR degradation in lysosomes. Genetic variants in this pathway significantly associate with altered cholesterol in humans. Pharmacological inhibition of CTSA activity increases hepatic LDLR function and improves cholesterol clearance, offering a potential new therapeutic strategy for hypercholesterolaemia and cardiovascular disease.", "summaryZh": "肝脏低密度脂蛋白受体 (LDLR) 的代谢是胆固醇稳态的关键决定因素 1,2 。协调 LDLR 运输和周转以响应营养提示（包括高膳食胆固醇）的分子开关仍然不明确 3-6 。在这里，我们确定了一条受 Ral GTPases 调节的新途径，该途径将细胞外胆固醇信号与控制 LDLR 周转的细胞内运输机制联系起来。长期膳食胆固醇通过增加 RAS 活性、将 LDLR 传送至溶酶体进行降解并独立于转录调控或 PCSK9 抑制其循环来激活 Ral 蛋白。通过肝细胞中 RalGAPB 缺失或组成型活性 Ral 突变体的过度表达来组成型激活 Ral，可降低 LDLR 水平并损害胆固醇清除率。 Ral 与内吞性 RalBP1-REPS1 复合物结合，促进 LDLR 内化和溶酶体路径，其中 LDLR 被溶酶体蛋白酶组织蛋白酶 A (CTSA) 降解。 Ral 激活将 CTSA 引导至溶酶体成熟，同时限制其分泌，进一步促进溶酶体中 LDLR 的降解。该途径中的遗传变异与人类胆固醇的改变显着相关。 CTSA 活性的药理学抑制可增加肝脏 LDLR 功能并改善胆固醇清除率，为高胆固醇血症和心血管疾病提供潜在的新治疗策略。", "titleZh": "膳食胆固醇激活 Ral 依赖性途径，驱动 LDLR 更新。", "translationSource": "400ae5c036e6bf8a"}, {"pmid": "42343134", "title": "The mutational landscape of STING-induced immunity.", "journal": "Nature", "year": 2026, "published": "2026-06-24", "doi": "10.1038/s41586-026-10685-3", "doiUrl": "https://doi.org/10.1038/s41586-026-10685-3", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42343134/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：autophagy。", "abstractEn": "Stimulator of interferon genes (STING) is an evolutionary conserved immune signalling protein with key roles in host defence, cancer, senescence and inflammation 1-3 . Downstream of STING, type I interferon, inflammatory cytokine signalling and non-canonical autophagy are governed by a multilayered mechanism integrating ligand-induced structural transitions, protein-protein interactions and coordinated intracellular trafficking 4-13 . Despite its central role in immunity and relevance as therapeutic target 14 , the sequence elements that govern STING (in)activation in cells remain incompletely understood. Here we developed a massively parallel assay to systematically chart the sequence-function landscape of STING. Profiling thousands of single amino-acid variants, we identified structural and functional determinants that shape the immunostimulatory capacity of STING and its ability to translate ligand recognition into distinct signalling outputs. Cryogenic-electron microscopy structures of select STING hyperactive variants revealed new regulatory principles dictating conformational transition from inactive to signalling-competent states of STING. Mutational effects are widespread across the functional landscape and can sensitize STING towards the natural ligand 2'3'-cGAMP 15-18 or decouple interferon induction from non-canonical autophagy, demonstrating a diversity of possible responses that can be accessed through single point substitutions. Finally, our data showed the clinical and evolutionary relevance of naturally occurring STING protein variants. Collectively, these findings define molecular principles that tune STING activity and chart the landscape of its functional potential across immune contexts.", "summaryZh": "干扰素基因刺激物 (STING) 是一种进化保守的免疫信号蛋白，在宿主防御、癌症、衰老和炎症中发挥关键作用 1-3 。 STING 下游、I 型干扰素、炎性细胞因子信号传导和非典型自噬受多层机制的控制，该机制整合了配体诱导的结构转变、蛋白质-蛋白质相互作用和协调的细胞内运输 4-13 。尽管其在免疫中发挥核心作用并作为治疗靶标 14 ，但控制细胞中 STING (in) 激活的序列元件仍不完全清楚。在这里，我们开发了一种大规模并行分析来系统地绘制 STING 的序列功能图谱。通过分析数千个单一氨基酸变体，我们确定了影响 STING 免疫刺激能力及其将配体识别转化为不同信号输出的能力的结构和功能决定因素。选择 STING 高度活跃变体的低温电子显微镜结构揭示了新的调控原则，决定了 STING 从非活性状态到信号传导状态的构象转变。突变效应在整个功能领域广泛存在，可以使 STING 对天然配体 2'3'-cGAMP 15-18 敏感，或将干扰素诱导与非典型自噬解耦，从而证明可以通过单点替换获得多种可能的反应。最后，我们的数据显示了自然发生的 STING 蛋白变体的临床和进化相关性。总的来说，这些发现定义了调节 STING 活性的分子原理，并绘制了其在免疫环境中的功能潜力图谱。", "titleZh": "STING 诱导免疫的突变景观。", "translationSource": "c6a8a481f3f69fa6"}, {"pmid": "42276042", "title": "Complete biosynthesis of the anticancer cephalotaxinone and homoerythratine.", "journal": "Cell", "year": 2026, "published": "2026-06-11", "doi": "10.1016/j.cell.2026.06.007", "doiUrl": "https://doi.org/10.1016/j.cell.2026.06.007", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42276042/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Cephalotaxine-type and homoerythrina-type alkaloids are structurally unique and biologically important natural products isolated from endangered species that belong to the genus Cephalotaxus. Among them, homoharringtonine (HHT [1]) is a marketed drug used to treat leukemia. However, the scalable production of HHT is significantly hindered by limited natural resources. Despite intensive investigation over half a century, the complete biosynthetic pathways of these alkaloids remain unknown. Here, we applied a comprehensive multi-omics analysis and used a set of chemically synthesized standard compounds to identify the missing enzymes required for the biosynthesis of cephalotaxinone and homoerythratine. We also uncovered a rare case of divergent oxidation catalyzed by two highly homologous cytochrome P450 enzymes, CfCYP2 and CfCYP3, in the biosynthesis of two structurally distinct alkaloids. We further identified the key residues that significantly affect the divergent oxidation outcomes and ultimately reconstituted the complete biosynthetic pathways for producing these two alkaloids in N. benthamiana.", "summaryZh": "三尖杉属和高红杉属生物碱是从三尖杉属濒危物种中分离出来的结构独特且具有重要生物学意义的天然产物。其中，高三尖杉酯碱（HHT[1]）是已上市的用于治疗白血病的药物。然而，有限的自然资源严重阻碍了 HHT 的规模化生产。尽管经过半个多世纪的深入研究，这些生物碱的完整生物合成途径仍然未知。在这里，我们应用了全面的多组学分析，并使用一组化学合成的标准化合物来鉴定头孢西酮和高赤藓碱生物合成所需的缺失酶。我们还发现了在两种结构不同的生物碱的生物合成中由两种高度同源的细胞色素 P450 酶 CfCYP2 和 CfCYP3 催化的发散氧化的罕见情况。我们进一步确定了显着影响不同氧化结果的关键残基，并最终重建了本塞姆氏烟草中生产这两种生物碱的完整生物合成途径。", "titleZh": "抗癌头孢紫杉酮和高赤藓碱的完整生物合成。", "translationSource": "41af52ba03c0c0cc"}, {"pmid": "41999741", "title": "2'3'-cGAMP-induced membrane shearing promotes broad antiphage immunity.", "journal": "Cell", "year": 2026, "published": "2026-06-11", "doi": "10.1016/j.cell.2026.03.043", "doiUrl": "https://doi.org/10.1016/j.cell.2026.03.043", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41999741/", "categories": ["靶向蛋白降解"], "matchedTerms": ["molecular glue"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：molecular glue。", "abstractEn": "Cyclic-oligonucleotide-based anti-phage signaling system (CBASS), a central prokaryotic antiviral strategy and evolutionary ancestor of the mammalian cyclic GMP-AMP synthase (cGAS)-stimulator of interferon genes (STING) pathway, relies on cyclic-nucleotide-activated effectors to elicit immunity. The most prevalent effectors are transmembrane (TM) proteins, yet their mechanisms remain unknown. Here, we show how a representative three transmembrane (3TM)-SMODS-associated fused to various effector domains (SAVED) effector couples ligand sensing to membrane disruption. Upon binding 2'3'-cyclic GMP-AMP (cGAMP)-synthesized by bacterial cGAS/DncV-like nucleotidyltransferase (CD-NTase) with features resembling mammalian cGAS-3TM-SAVED assembles stepwise from an apo monomer through a transient dimer into extended filaments. Filament assembly employs 2'3'-cGAMP as molecular glue linking SAVED domains and reorients TM helices and amphipathic hairpins into vertically offset arrays. Both arrays bear opposing hydrophobic and hydrophilic faces, thereby driving vertical lipid shearing. This shearing generates a linear pore array that permeabilizes membranes and triggers cell death. These findings uncover the long-missing mechanism of CBASS TM effectors and establish vertical membrane shearing as an unrecognized principle of membrane disruption across domains of life.", "summaryZh": "基于环寡核苷酸的抗噬菌体信号系统（CBASS）是一种核心原核抗病毒策略，也是哺乳动物环 GMP-AMP 合酶（cGAS）-干扰素基因刺激剂（STING）途径的进化祖先，依赖环核苷酸激活的效应子来引发免疫。最普遍的效应子是跨膜 (TM) 蛋白，但其机制仍不清楚。在这里，我们展示了代表性的三跨膜 (3TM)-SMODS 相关融合到各种效应器域 (SAVED) 效应器如何将配体传感与膜破坏耦合起来。结合由细菌 cGAS/DncV 样核苷酸转移酶 (CD-NTase) 合成的 2'3'-环状 GMP-AMP (cGAMP) 后，其特征类似于哺乳动物 cGAS-3TM-SAVED，从 apo 单体通过瞬时二聚体逐步组装成延伸丝。细丝组装采用 2'3'-cGAMP 作为连接 SAVED 结构域的分子胶，并将 TM 螺旋和两亲性发夹重新定向为垂直偏移阵列。两个阵列都具有相反的疏水面和亲水面，从而驱动垂直脂质剪切。这种剪切产生线性孔阵列，使膜透化并引发细胞死亡。这些发现揭示了 CBASS TM 效应器长期缺失的机制，并将垂直膜剪切确立为生命领域膜破坏的一个未被认识的原理。", "titleZh": "2'3'-cGAMP 诱导的膜剪切可促进广泛的抗噬菌体免疫。", "translationSource": "318486f7959f13a1"}, {"pmid": "42271059", "title": "Molecular glue degraders of HuR suppress BRAF-mutant colorectal cancer.", "journal": "Nature", "year": 2026, "published": "2026-06-10", "doi": "10.1038/s41586-026-10613-5", "doiUrl": "https://doi.org/10.1038/s41586-026-10613-5", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42271059/", "categories": ["靶向蛋白降解"], "matchedTerms": ["molecular glue", "degrader", "degron"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：molecular glue, degrader, degron。", "abstractEn": "BRAF gain-of-function mutations, particularly BRAF(V600E), affect roughly 10% of all patients with colorectal cancer (CRC), and portend poor prognosis with limited therapeutic interventions. BRAF inhibitors such as encorafenib are ineffective due to MAPK pathway reactivation driven by BRAF dimerization. Combined inhibition of BRAF and EGFR, although approved therapies, results in short survival benefits and frequent treatment resistance and relapse 1-3 . Here, through rational chemical library design coupled with parallel proteomic screening, we identified dHuR as a molecular glue degrader of human antigen R (HuR), an RNA-binding protein that drives tumour growth, invasion and therapy resistance. dHuR binds to the CRBN ubiquitin ligase to create a unique benzofuran-tethered composite surface to recruit HuR as a neosubstrate by engaging its β-hairpin G-loop degron, as revealed by the cryo-electron microscopy structure of the ternary complex. dHuR abrogated BRAF expression by inducing its exon 18 skipping, and demonstrated superior suppression of BRAF-mutant CRC tumours including those gaining resistance to BRAF inhibitors. Finally, we performed kinome library CRISPR screening and revealed that inactivation of EGFR or MEK enhanced dHuR cytotoxicity, thus establishing a combinatorial strategy to treat patients with refractory BRAF-mutant CRC.", "summaryZh": "BRAF 功能获得性突变，尤其是 BRAF(V600E)，影响大约 10% 的结直肠癌 (CRC) 患者，并且预示着治疗干预措施有限的预后不良。由于 BRAF 二聚化驱动的 MAPK 通路重新激活，BRAF 抑制剂（例如 encorafenib）无效。 BRAF 和 EGFR 的联合抑制虽然已获得批准，但会导致短期生存获益以及频繁的治疗耐药和复发 1-3 。在这里，通过合理的化学文库设计结合平行蛋白质组学筛选，我们确定 dHuR 是人类抗原 R (HuR) 的分子胶降解剂，HuR 是一种驱动肿瘤生长、侵袭和治疗抵抗的 RNA 结合蛋白。 dHuR 与 CRBN 泛素连接酶结合，形成独特的苯并呋喃系留复合表面，通过结合其 β-发夹 G 环降解决定子来招募 HuR 作为新底物，如三元复合物的冷冻电子显微镜结构所示。 dHuR 通过诱导其外显子 18 跳跃来消除 BRAF 表达，并表现出对 BRAF 突变的 CRC 肿瘤（包括对 BRAF 抑制剂产生耐药性的肿瘤）的卓越抑制作用。最后，我们进行了激酶组文库 CRISPR 筛选，发现 EGFR 或 MEK 失活增强了 dHuR 细胞毒性，从而建立了治疗难治性 BRAF 突变 CRC 患者的组合策略。", "titleZh": "HuR 的分子胶降解剂可抑制 BRAF 突变型结直肠癌。", "translationSource": "99f33e53efcf7e97"}, {"pmid": "42236937", "title": "LASER couples damage sensing to ESCRT assembly for lysosome repair.", "journal": "Nature", "year": 2026, "published": "2026-06-03", "doi": "10.1038/s41586-026-10604-6", "doiUrl": "https://doi.org/10.1038/s41586-026-10604-6", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42236937/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "Lysosomal membrane integrity is essential for cell survival, but how damage sensing is spatiotemporally coupled to repair remains poorly understood. Recruitment and assembly of endosomal sorting complex required for transport (ESCRT) I-III rapidly counteracts membrane damage, but it is unclear how ESCRT-I recognizes defective lysosomal membranes. Here, leveraging genome-wide CRISPRi screens in a damage-sensitized genetic background, we identified LC3/GABARAP-assisted stimulator for ESCRT recruitment (LASER), a multicomponent protein assembly that forms rapidly upon calcium release from damaged lysosomes and couples sensing of lysosomal membrane damage to ESCRT-dependent repair. At the core of LASER is TFG, an endoplasmic reticulum exit-site-resident protein that translocates to damaged lysosomes by binding to ATG8 family proteins (LC3 and GABARAP) conjugated to lysosomal phospholipids. ATG8-bound TFG forms oligomeric assemblies that directly recruit the essential ESCRT-I subunit TSG101 via conserved motif recognition enhanced by avidity-driven interactions. TFG binding to TSG101 stimulates sequential ESCRT-I-II-III polymerization and promotes membrane repair. TFG mutations that drive hereditary spastic paraplegia disrupt its oligomerization and impair lysosomal ESCRT recruitment and membrane resealing, implicating defective repair as a driver of TFG-associated neurodegeneration. Thus, LASER promotes ESCRT polymerization at damaged lysosomes and couples damage sensing to membrane repair.", "summaryZh": "溶酶体膜完整性对于细胞生存至关重要，但损伤感知如何在时空上与修复耦合仍然知之甚少。运输所需的内体分选复合物 (ESCRT) I-III 的募集和组装可快速抵消膜损伤，但尚不清楚 ESCRT-I 如何识别有缺陷的溶酶体膜。在这里，利用损伤敏感遗传背景下的全基因组 CRISPRi 筛选，我们鉴定了用于 ESCRT 募集 (LASER) 的 LC3/GABARAP 辅助刺激物，这是一种多组分蛋白质组装体，在钙从受损的溶酶体中释放后迅速形成，并将溶酶体膜损伤的感应与 ESCRT 依赖性修复结合起来。 LASER 的核心是 TFG，这是一种内质网出口位点驻留蛋白，可通过与与溶酶体磷脂缀合的 ATG8 家族蛋白（LC3 和 GABARAP）结合而转位至受损的溶酶体。 ATG8 结合的 TFG 形成寡聚体组装体，通过亲合力驱动的相互作用增强的保守基序识别直接招募必需的 ESCRT-I 亚基 TSG101。 TFG 与 TSG101 结合会刺激连续的 ESCRT-I-II-III 聚合并促进膜修复。导致遗传性痉挛性截瘫的 TFG 突变会破坏其寡聚化，并损害溶酶体 ESCRT 募集和膜重新密封，这表明修复缺陷是 TFG 相关神经变性的驱动因素。因此，LASER 促进受损溶酶体处的 ESCRT 聚合，并将损伤传感与膜修复结合起来。", "titleZh": "激光将损伤传感与 ESRT 组件耦合以进行溶酶体修复。", "translationSource": "11da8afa377e9538"}, {"pmid": "42056510", "title": "Submicrometre sampling of living cells by macrophages.", "journal": "Nature", "year": 2026, "published": "2026-06-01", "doi": "10.1038/s41586-026-10435-5", "doiUrl": "https://doi.org/10.1038/s41586-026-10435-5", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42056510/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome。", "abstractEn": "An effective immune system must sample and develop healthy self-identity to prevent autoimmunity and to discern pathogenic insults 1-3 . Self-proteins are presented to T cells in the thymus during immune cell development 2,3 and must be presented throughout the body to maintain regulatory T cell populations 4-6 and to provide tonic signals to sustain conventional T cells over time 7-9 . Observations of continuous apoptosis in some organs together with the ingestion of that material by myeloid populations has led to a conventional understanding of ongoing cell death as a major source of self-antigens 10 . Here we used a series of companion imaging and vesicular labelling technologies to reveal an alternative process undertaken by macrophages that results in non-destructive, direct sampling of living cells. This process requires cell-cell contact, does not require caspase activation and occurs via trogocytosis-like stretching of the target cell into the macrophage, which leads to the generation of submicrometre-sized vesicles that contain cytoplasm. Using a high-dimensional flow-based method for labelling vesicles, we demonstrate that live-sampled material is distinctly processed and is poorly subjected to fusion with lysosomes. The material also produces differential effects on the presentation of antigen to CD4 T cells compared with CD8 T cells. Disruption of this trafficking by redirecting antigen to the lysosome significantly reduced the associated macrophage-mediated priming of CD8 T cells. These results demonstrate an important and substantial sampling of living cells by the immune system, with clear consequences for maintaining the border of immunity.", "summaryZh": "有效的免疫系统必须采样并发展健康的自我认同，以防止自身免疫并识别致病性损伤 1-3 。自身蛋白在免疫细胞发育过程中被呈递给胸腺中的 T 细胞 2,3 并且必须呈递到整个身体以维持调节性 T 细胞群 4-6 并提供滋补信号以维持常规 T 细胞随时间的推移 7-9 。对某些器官中持续细胞凋亡的观察以及髓系细胞群对该物质的摄入导致了对持续细胞死亡作为自身抗原的主要来源的传统理解 10 。在这里，我们使用了一系列伴随成像和囊泡标记技术来揭示巨噬细胞进行的替代过程，从而对活细胞进行非破坏性的直接采样。该过程需要细胞与细胞接触，不需要半胱天冬酶激活，并且通过靶细胞向巨噬细胞中的类似吞噬作用的拉伸而发生，这导致含有细胞质的亚微米大小的囊泡的生成。使用基于高维流的方法来标记囊泡，我们证明了活体采样材料经过明显的处理，并且与溶酶体的融合较差。与 CD8 T 细胞相比，该材料还对 CD4 T 细胞的抗原呈递产生不同的影响。通过将抗原重定向至溶酶体来破坏这种运输，显着减少了巨噬细胞介导的 CD8 T 细胞的启动。这些结果表明，免疫系统对活细胞进行了重要且大量的采样，对维持免疫边界具有明显的影响。", "titleZh": "巨噬细胞对活细胞进行亚微米采样。", "translationSource": "360afee7d1486f32"}, {"pmid": "42056506", "title": "Pervasive and programmed nucleosome distortion on single chromatin fibres.", "journal": "Nature", "year": 2026, "published": "2026-06-01", "doi": "10.1038/s41586-026-10418-6", "doiUrl": "https://doi.org/10.1038/s41586-026-10418-6", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42056506/", "categories": ["靶向蛋白降解"], "matchedTerms": ["degron"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degron。", "abstractEn": "Despite decades of biochemical and structural studies of the nucleosome 1 , researchers lack genome-scale methods to determine variability in nucleosome structure along individual chromatin fibres. To address this, here we present Iteratively Defined Lengths of Inaccessibility (IDLI), a computational method that maps the single-molecule co-occupancy of structurally distinct nucleosomes, subnucleosomes and other protein-DNA interactions through long-read single-molecule footprinting 2,3 . IDLI classifies methylase-inaccessible footprints on individual chromatin fibres into (i) linker-histone-associated nucleosomes; (ii) nucleosomes with focal DNA accessibility along the nucleosome wrap; (iii) unwrapped nucleosomes; and (iv) subnucleosomal species such as hexasomes, tetrasomes and other short DNA protections. Applying IDLI to chromatin from mouse embryonic stem cells, we discover that more than 85% of nucleosomes exhibit intranucleosomally accessible DNA (nucleosome 'distortion'). We observe epigenomic-domain- and expression-level-specific patterns of distortion, including at promoters and mouse satellite repeat sequences. Transcription factor (TF) motif occurrence correlates significantly with distinct types of distortion, and degron experiments provide evidence of direct regulation by TFs. We apply IDLI to in vitro endoderm differentiation in human induced pluripotent stem cells and primary mouse hepatocytes. In both cases, we observe distortion at pioneer TF FOXA2 binding sites, demonstrating that distortion is developmentally encoded and present in vivo. Finally, genetic experiments in mice show that a nucleosome-binding domain of FOXA2 directly affects nucleosome structure in vivo, implicating these protein-nucleosome interactions as direct mediators of distortion. Our work suggests extreme but regulated nucleosome structural variability at the single-molecule level. Furthermore, our approach offers opportunities to model TF binding, nucleosome remodelling and cell-type-specific chromatin regulation across biological contexts.", "summaryZh": "尽管对核小体 1 进行了数十年的生化和结构研究，但研究人员缺乏基因组规模的方法来确定沿单个染色质纤维的核小体结构的变异性。为了解决这个问题，我们在这里提出了迭代定义的不可接近长度（IDLI），这是一种计算方法，通过长读长单分子足迹来映射结构不同的核小体、亚核小体和其他蛋白质-DNA 相互作用的单分子共占用 2,3 。 IDLI 将单个染色质纤维上甲基化酶不可接近的足迹分类为 (i) 连接组蛋白相关核小体； (ii) 沿着核小体包裹具有焦点DNA可及性的核小体； (iii) 未包裹的核小体； (iv) 亚核小体种类，例如六体、四体和其他短 DNA 保护。将 IDLI 应用到小鼠胚胎干细胞的染色质中，我们发现超过 85% 的核小体表现出核小体内可接近的 DNA（核小体“扭曲”）。我们观察到表观基因组域和表达水平特异性的扭曲模式，包括启动子和小鼠卫星重复序列。转录因子 (TF) 基序的出现与不同类型的扭曲显着相关，降解决定子实验提供了 TF 直接调节的证据。我们将 IDLI 应用于人诱导多能干细胞和原代小鼠肝细胞的体外内胚层分化。在这两种情况下，我们都在先锋 TF FOXA2 结合位点处观察到扭曲，证明扭曲是发育编码的并存在于体内。最后，小鼠遗传实验表明，FOXA2 的核小体结合域直接影响体内核小体结构，表明这些蛋白质-核小体相互作用是扭曲的直接介质。 我们的工作表明单分子水平上存在极端但受调节的核小体结构变异。此外，我们的方法提供了跨生物环境模拟 TF 结合、核小体重塑和细胞类型特异性染色质调控的机会。", "titleZh": "单染色质纤维上普遍存在的程序性核小体扭曲。", "translationSource": "afa699baf1faf44c"}, {"pmid": "41917274", "title": "Structure of the mouse cytoplasmic lattice.", "journal": "Nature", "year": 2026, "published": "2026-06-01", "doi": "10.1038/s41586-026-10442-6", "doiUrl": "https://doi.org/10.1038/s41586-026-10442-6", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41917274/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "The fertilized egg relies almost entirely on maternal stores in the oocyte to ensure the successful initiation of development 1 . The cytoplasmic lattices (CPLs) in mammalian oocytes store maternal-expressed proteins and have an essential role in embryogenesis 2,3 . Impairing multiple CPL members leads to early embryonic arrest, resulting in infertility in mammals. However, the mechanism underlying the assembly and storage of CPLs remains largely unknown. Here we report the cryo-electron microscopy structure of a native mouse CPL repeating unit (approximately 4 MDa) at 3.74 Å resolution. This repeating unit exhibits a tripartite architecture comprising a framework, extended linkers and a CPL core. The external framework is built from PADI6 decamers and the subcortical maternal complexes. Two linkers formed by NLRP4F polymerize the frameworks into an extended filament. In the CPL core, the epigenetic regulator UHRF1 is trapped by PADI6, UBE2D and NLRP14 in a compact, autoinhibited conformation that prevents nuclear entry and ubiquitin ligase activity. Moreover, the CPL core stores GTP-bound α/β-tubulin heterodimers and inactive SCF E3-ubiquitin ligase components (FBXW-SKP1 complex) in a poised but restrained state. These features establish CPLs as a dynamic regulatory pool that enables rapid microtubule assembly and tightly controlled ubiquitination during the oocyte-to-embryo transition. Together, this semi-in situ structure illuminates CPL assembly and storage-module organization, and establishes CPLs as specialized proteostasis organelles for maternal regulation in oocytes and early embryonic development.", "summaryZh": "受精卵几乎完全依赖卵母细胞中的母体储存来确保发育的成功启动 1 。哺乳动物卵母细胞中的细胞质格子 (CPL) 储存母体表达的蛋白质，并在胚胎发生中发挥重要作用 2,3 。损害多个 CPL 成员会导致早期胚胎停滞，导致哺乳动物不育。然而，CPL 组装和存储的机制仍然很大程度上未知。在这里，我们报告了天然小鼠 CPL 重复单元（约 4 MDa）的冷冻电子显微镜结构，分辨率为 3.74 Å。该重复单元呈现出三方架构，包括框架、扩展链接器和 CPL 核心。外部框架由 PADI6 十聚体和皮质下母体复合体构建。 NLRP4F 形成的两个连接体将框架聚合成延伸的丝。在 CPL 核心中，表观遗传调节因子 UHRF1 被 PADI6、UBE2D 和 NLRP14 捕获，形成紧凑的自抑制构象，从而阻止核进入和泛素连接酶活性。此外，CPL 核心以平衡但受约束的状态存储 GTP 结合的 α/β-微管蛋白异二聚体和失活的 SCF E3-泛素连接酶成分（FBXW-SKP1 复合物）。这些功能使 CPL 成为一个动态调节库，可在卵母细胞到胚胎的转变过程中实现快速微管组装和严格控制的泛素化。总之，这种半原位结构阐明了 CPL 组装和存储模块组织，并将 CPL 确立为专门的蛋白质稳态细胞器，用于卵母细胞和早期胚胎发育的母体调节。", "titleZh": "小鼠细胞质晶格的结构。", "translationSource": "936a7f95022ad263"}, {"pmid": "42092352", "title": "Disrupted molecular glue complex drives RAS inhibitor resistance.", "journal": "Cell", "year": 2026, "published": "2026-05-14", "doi": "10.1016/j.cell.2026.03.031", "doiUrl": "https://doi.org/10.1016/j.cell.2026.03.031", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42092352/", "categories": ["靶向蛋白降解"], "matchedTerms": ["molecular glue"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：molecular glue。", "abstractEn": "Tri-complex inhibitors (TCIs) are molecular glues that bind the active, guanosine triphosphate (GTP)-bound state of RAS and recruit cyclophilin A (CYPA) to form a synthetic complex that blocks oncogenic signaling. Although these agents have shown clinical activity in RAS mutant cancers, resistance mechanisms remain poorly defined. Here, we analyzed paired baseline and end-of-treatment samples from 40 patients treated with the RAS inhibitor daraxonrasib and identified recurrent alterations in 18 cases. Structural and functional analyses revealed that acquired mutations confer resistance by disrupting interactions essential for daraxonrasib binding to RAS, including RAS Y64 mutations, or by enhancing the RAS-RAF interaction, thereby favoring native RAS-RAF signaling, including RAS Y71 or kinase-dead/hypoactive BRAF mutations. We then identified a TCI that targets RAS Y64 mutants and combination therapies to target resistance driven by kinase-dead BRAF. These findings uncover convergent resistance mechanisms that undermine the molecular glue function and offer a mechanistic blueprint for enhancing therapeutic efficacy in RAS-driven malignancies.", "summaryZh": "三复合物抑制剂 (TCIs) 是一种分子胶，可结合 RAS 的活性三磷酸鸟苷 (GTP) 结合状态，并招募亲环蛋白 A (CYPA) 以形成阻断致癌信号传导的合成复合物。尽管这些药物已在 RAS 突变癌症中表现出临床活性，但耐药机制仍不清楚。在这里，我们分析了 40 名接受 RAS 抑制剂 daraxonrasib 治疗的患者的配对基线和治疗结束样本，并确定了 18 例患者的复发性改变。结构和功能分析显示，获得性突变通过破坏 daraxonrasib 与 RAS 结合所必需的相互作用（包括 RAS Y64 突变）或通过增强 RAS-RAF 相互作用，从而有利于天然 RAS-RAF 信号传导（包括 RAS Y71 或激酶死亡/活性减退的 BRAF 突变）来赋予耐药性。然后，我们确定了一种针对 RAS Y64 突变体的 TCI 和针对激酶死亡 BRAF 驱动的耐药性的联合疗法。这些发现揭示了破坏分子胶功能的聚合耐药机制，并为增强 RAS 驱动的恶性肿瘤的治疗效果提供了机制蓝图。", "titleZh": "分子胶复合物被破坏会导致 RAS 抑制剂产生耐药性。", "translationSource": "9da390defe90b557"}, {"pmid": "42061400", "title": "Proteostasis sustains T cell differentiation potential and tumor-infiltrating lymphocyte function.", "journal": "Cell", "year": 2026, "published": "2026-05-14", "doi": "10.1016/j.cell.2026.02.019", "doiUrl": "https://doi.org/10.1016/j.cell.2026.02.019", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/42061400/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteasome", "proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteasome, proteostasis。", "abstractEn": "Tumor-infiltrating lymphocytes (TIL) often fail to restrain tumor growth due to progressive differentiation into an \"exhausted\" state. Tissue-resident memory T cells (T RM ) maintain protection from infection for years in healthy tissues, and patient tumors that contain TIL with T RM features are associated with better prognosis. Proteomic and transcriptomic profiling of T cell populations identified proteostasis as a significant factor distinguishing T RM and progenitor-exhausted TIL from terminally exhausted TIL, including loss of E3 ubiquitin ligases NEURL3, RNF149, and WSB1, with accumulation of unfolded proteins despite functional proteasome activity. Enforced expression of these ligases in T cells preserved stem-like TCF1 + populations and improved function in tumors and chronic infection, whereas deficiency impaired TIL and altered T cell differentiation during acute infection. Sustained ligase expression rescued the accumulation of unfolded proteins in TIL and improved immunotherapy outcomes in preclinical models, underscoring the critical role of proteostasis in TIL function and highlighting a promising avenue for advancing cancer immunotherapy.", "summaryZh": "肿瘤浸润淋巴细胞（TIL）通常无法抑制肿瘤生长，因为它逐渐分化为“耗尽”状态。组织驻留记忆 T 细胞 (TRM) 在健康组织中保持多年免受感染的保护，含有具有 TRM 特征的 TIL 的患者肿瘤与更好的预后相关。 T 细胞群的蛋白质组学和转录组学分析发现，蛋白质稳态是区分 TRM 和祖细胞耗尽的 TIL 与终末耗尽的 TIL 的重要因素，包括 E3 泛素连接酶 NEURL3、RNF149 和 WSB1 的丢失，尽管具有功能性蛋白酶体活性，但未折叠蛋白的积累。这些连接酶在 T 细胞中的强制表达保留了干细胞样 TCF1 + 群体，并改善了肿瘤和慢性感染中的功能，而缺乏会损害 TIL 并改变急性感染期间的 T 细胞分化。持续的连接酶表达挽救了 TIL 中未折叠蛋白的积累，并改善了临床前模型中的免疫治疗结果，强调了蛋白质稳态在 TIL 功能中的关键作用，并强调了推进癌症免疫治疗的有希望的途径。", "titleZh": "蛋白质稳态维持 T 细胞分化潜力和肿瘤浸润淋巴细胞功能。", "translationSource": "fb8df0dcbf86eff8"}, {"pmid": "41875888", "title": "Pan-neurodegeneration proteomics reveals disease subtypes and molecular signatures.", "journal": "Cell", "year": 2026, "published": "2026-05-14", "doi": "10.1016/j.cell.2026.02.026", "doiUrl": "https://doi.org/10.1016/j.cell.2026.02.026", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41875888/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Neurodegenerative diseases (NDs) pose clinical challenges due to their complexity and molecular heterogeneity. Here, we present a pan-neurodegeneration atlas (PanNDA) from multilayer, deep proteomic analysis of 2,279 human brain samples spanning 6 major NDs: Alzheimer's disease (AD), Lewy body dementia (LBD), frontotemporal lobar degeneration with TDP-43 pathology, progressive supranuclear palsy with tau pathology, vascular dementia, and Parkinson's disease. PanNDA integrates data from whole proteome, detergent-insoluble proteome, and posttranslational modifications (phosphorylation and ubiquitination), enabling intra- and inter-disease comparisons. Intra-disease analyses uncover distinct molecular subtypes (e.g., three in AD and four in LBD), reveal dysregulated pathways, and prioritize top-ranked proteins. Inter-disease comparisons identify shared alterations in NDs, such as GPNMB in microglial and lysosomal activation and NPTX2 in synaptic regulation, alongside disease-specific changes and hub regulators within protein networks. Overall, PanNDA provides a systems-level framework for understanding ND mechanisms and serves as a foundational resource that is accessible via an interactive website: https://penglab.shinyapps.io/pannda.", "summaryZh": "神经退行性疾病（ND）因其复杂性和分子异质性而带来临床挑战。在这里，我们提出了一个泛神经变性图谱 (PanNDA)，该图谱对 2,279 个人脑样本进行了多层、深层蛋白质组学分析，涵盖 6 个主要 ND：阿尔茨海默病 (AD)、路易体痴呆 (LBD)、具有 TDP-43 病理学的额颞叶变性、具有 tau 病理学的进行性核上性麻痹、血管性痴呆和帕金森病。 PanNDA 整合了整个蛋白质组、去污剂不溶性蛋白质组和翻译后修饰（磷酸化和泛素化）的数据，从而能够进行疾病内和疾病间比较。疾病内分析揭示了不同的分子亚型（例如，AD 中的三种亚型和 LBD 中的四种亚型），揭示失调的途径，并优先考虑排名靠前的蛋白质。疾病间比较确定了 ND 中的共同改变，例如小胶质细胞和溶酶体激活中的 GPNMB 和突触调节中的 NPTX2，以及蛋白质网络内的疾病特异性变化和中枢调节因子。总体而言，PanNDA 提供了一个用于理解 ND 机制的系统级框架，并作为可通过交互式网站访问的基础资源：https://penglab.shinyapps.io/pannda。", "titleZh": "泛神经变性蛋白质组学揭示疾病亚型和分子特征。", "translationSource": "94e746ce3851a067"}, {"pmid": "41922778", "title": "AhR inhibition promotes axon regeneration via a stress-growth switch.", "journal": "Nature", "year": 2026, "published": "2026-05-01", "doi": "10.1038/s41586-026-10295-z", "doiUrl": "https://doi.org/10.1038/s41586-026-10295-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41922778/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "Axon regeneration is limited in the mammalian central nervous system 1 . Neurons must balance stress responses with regenerative demands after axonal injury 2 , but the mechanisms remain unclear. Here we identify aryl hydrocarbon receptor (AhR), a ligand-activated basic helix-loop-helix/PER-ARNT-SIM (bHLH-PAS) transcription factor, as a key regulator of this stress-growth switch. We show that ligand-mediated AhR signalling restrains axon growth, whereas neuronal deletion or pharmacological inhibition of AhR promotes axonal regeneration and functional recovery in both peripheral nerve and spinal cord injury models. Mechanistic studies reveal that axotomy-induced AhR activation in dorsal root ganglion neurons enforces proteostasis and stress-response programs to preserve tissue integrity. By contrast, AhR ablation redirects the neuronal response towards elevated de novo translation and pro-growth signalling, enabling axon regeneration. This growth-promoting effect requires HIF1α, with shared transcriptional targets enriched for metabolic and regenerative pathways. Single-cell and epigenomic analyses further revealed that the AhR regulon engages the integrated stress response and DNA hydroxymethylation to rewire neuronal injury-response programs. Together, our findings establish AhR as a neuronal brake on axon regeneration, integrating environmental sensing, protein homeostasis and metabolic signalling to control the balance between stress adaptation and axonal repair.", "summaryZh": "哺乳动物中枢神经系统的轴突再生受到限制 1 。神经元必须在轴突损伤后平衡应激反应和再生需求 2 ，但其机制仍不清楚。在这里，我们确定了芳基碳氢化合物受体（AhR），一种配体激活的碱性螺旋-环-螺旋/PER-ARNT-SIM（bHLH-PAS）转录因子，作为这种应激增长开关的关键调节因子。我们发现，在周围神经和脊髓损伤模型中，配体介导的 AhR 信号传导抑制轴突生长，而 AhR 的神经元缺失或药物抑制可促进轴突再生和功能恢复。机制研究表明，轴切术诱导的背根神经节神经元中的 AhR 激活可增强蛋白质稳态和应激反应程序，以保持组织完整性。相比之下，AhR 消融将神经元反应重定向到增强的从头翻译和促生长信号传导，从而实现轴突再生。这种生长促进作用需要 HIF1α，其具有丰富的代谢和再生途径的共享转录靶点。单细胞和表观基因组分析进一步表明，AhR 调节子参与整合的应激反应和 DNA 羟甲基化来重新连接神经元损伤反应程序。总之，我们的研究结果确立了 AhR 作为轴突再生的神经元制动器，整合环境传感、蛋白质稳态和代谢信号传导以控制应激适应和轴突修复之间的平衡。", "titleZh": "AhR 抑制通过压力生长开关促进轴突再生。", "translationSource": "c3f7d0d070f737a9"}, {"pmid": "41851457", "title": "Proteasome-guided haem signalling axis contributes to T cell exhaustion.", "journal": "Nature", "year": 2026, "published": "2026-05-01", "doi": "10.1038/s41586-026-10250-y", "doiUrl": "https://doi.org/10.1038/s41586-026-10250-y", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41851457/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteasome"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteasome。", "abstractEn": "The accumulation of depolarized mitochondria commits T cells to exhaustion 1-3 , yet the precise mechanism remains unclear. Here we find that exhausted CD8 + T cells increase proteasome activity owing to the accumulation of depolarized mitochondria, which drives the selective degradation of mitochondrial proteins and the release of regulatory haem through haemoprotein breakdown. In turn, increased regulatory haem disrupts BACH2-mediated transcriptional regulation, thereby exacerbating T cell exhaustion and compromising stemness-like properties. Inhibition of nuclear import of regulatory haem prevents BACH2 degradation and enhances the anti-tumour efficacy of antigen-specific T cells. We find that the therapeutic efficacy of human CD19 + chimeric antigen receptor (CAR)-T cells in patients with B cell acute lymphoblastic leukaemia negatively correlates with the proteasome gene signature in their CAR-T cells. Manufacturing CAR-T cells in the presence of bortezomib, an FDA-approved proteasome inhibitor, prevents T cell exhaustion and improves therapeutic efficacy. Our findings identify a proteasome-guided haem signalling axis, governed by mitochondrial integrity, as a regulator of CD8 + T cell exhaustion and propose innovative therapeutic strategies that exploit this pathway to optimize adoptive cellular immunotherapy.", "summaryZh": "去极化线粒体的积累使 T 细胞耗尽 1-3 ，但确切的机制仍不清楚。在这里，我们发现，耗尽的 CD8 + T 细胞由于去极化线粒体的积累而增加了蛋白酶体活性，这驱动了线粒体蛋白的选择性降解并通过血红蛋白分解释放调节血红素。反过来，调节性血红素的增加会破坏 BACH2 介导的转录调节，从而加剧 T 细胞耗竭并损害干性样特性。抑制调节血红素的核输入可防止 BACH2 降解并增强抗原特异性 T 细胞的抗肿瘤功效。我们发现人 CD19 + 嵌合抗原受体 (CAR)-T 细胞对 B 细胞急性淋巴细胞白血病患者的治疗效果与其 CAR-T 细胞中的蛋白酶体基因特征负相关。在 FDA 批准的蛋白酶体抑制剂硼替佐米的存在下制造 CAR-T 细胞，可以防止 T 细胞耗竭并提高治疗效果。我们的研究结果确定了由线粒体完整性控制的蛋白酶体引导的血红素信号轴作为 CD8 + T 细胞耗竭的调节剂，并提出了利用该途径来优化过继性细胞免疫疗法的创新治疗策略。", "titleZh": "蛋白酶体引导的血红素信号轴导致 T 细胞耗竭。", "translationSource": "1a3cb49668b1c9aa"}, {"pmid": "41813887", "title": "Immune evasive DNA donors and recombinases license kilobase-scale writing.", "journal": "Nature", "year": 2026, "published": "2026-05-01", "doi": "10.1038/s41586-026-10241-z", "doiUrl": "https://doi.org/10.1038/s41586-026-10241-z", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41813887/", "categories": ["合成生物学"], "matchedTerms": ["genome writing"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：genome writing。", "abstractEn": "Genome-editing technologies that use recombinases to insert kilobase-scale DNA sequences into mammalian genomes canonically require large double-stranded DNA (dsDNA) donors 1,2 . However, dsDNA molecules evoke problematic and toxic innate immune responses, limiting integration efficiencies and generally constraining applicability to ex vivo or immune-deficient contexts. By harnessing mechanisms of integrative prokaryotic viruses and mobile genetic elements, here we demonstrate that recombinases are compatible with immune evasive circular single-stranded DNA molecules optimally bearing a partial-duplex region that reconstitutes the recombinase recognition sequence. This approach, which we term integration through nucleus-synthesized template addition of large lengths (INSTALL), is compatible with diverse protein and RNA-guided recombinases for high-fidelity kilobase-scale human genome writing. INSTALL minimizes innate immune responses in primary human cells and in mice, improving recombinase-mediated integration efficiencies and supporting systemic in vivo non-viral DNA delivery by substantially increasing tolerability and broadening the dosing range compared with lipid nanoparticle-delivered dsDNA molecules. Together, INSTALL overcomes fundamental challenges for DNA delivery and integration methods by synergizing immune-stealth nucleic acids with recombinases to enable kilobase-scale integration strategies without viral vectors.", "summaryZh": "使用重组酶将千碱基级 DNA 序列插入哺乳动物基因组的基因组编辑技术通常需要大型双链 DNA (dsDNA) 供体 1,2 。然而，dsDNA 分子会引发有问题且有毒的先天免疫反应，限制整合效率，并通常限制其在离体或免疫缺陷环境中的适用性。通过利用整合原核病毒和可移动遗传元件的机制，我们在此证明重组酶与免疫逃避环形单链DNA分子相容，该分子最佳地带有可重构重组酶识别序列的部分双链体区域。这种方法，我们称之为通过核合成大长度模板添加（INSTALL）进行的整合，与多种蛋白质和RNA引导的重组酶兼容，可实现高保真千碱基级人类基因组写入。与脂质纳米颗粒递送的 dsDNA 分子相比，INSTALL 最大限度地减少了原代人类细胞和小鼠的先天免疫反应，提高了重组酶介导的整合效率，并通过大幅提高耐受性和拓宽剂量范围来支持全身体内非病毒 DNA 递送。 INSTALL 通过将免疫隐形核酸与重组酶协同作用，克服了 DNA 递送和整合方法的基本挑战，从而无需病毒载体即可实现千碱基级整合策略。", "titleZh": "免疫逃避 DNA 供体和重组酶许可千碱基级写入。", "translationSource": "7d3004e1182e4afb"}, {"pmid": "41928514", "title": "Complete biosynthesis of nicotine.", "journal": "Cell", "year": 2026, "published": "2026-04-30", "doi": "10.1016/j.cell.2026.03.034", "doiUrl": "https://doi.org/10.1016/j.cell.2026.03.034", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41928514/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Nicotine, tobacco's addictive and potent insecticidal alkaloid, has shaped human history, agriculture, and the plants that produce it. However, the enzymatic steps and reaction mechanisms involved in nicotine biosynthesis remain elusive. Here, we reveal that the final coupling reaction is stabilized by glycosylation via a uridine diphosphate (UDP)-glycosyltransferase, reduced and activated by an A622, condensed through a stereoselective intermolecular Mannich-like reaction, sequentially oxidized by a berberine bridge enzyme-like (BBL), and finally deglycosylated by a β-glucosidase to yield nicotine. A 5-component metabolon assembles at vacuolar membranes to channel both nicotine biosynthesis and its transport. We reconstituted this metabolon both in vitro and heterologously in vivo. Abrogating any of these components depletes nicotine accumulations. A multidrug and toxic compound extrusion (MATE) transporter is essential for efficiently engineering nicotine production in heterologous plant species, which confers pest resistance. This work completes the nicotine biosynthesis pathway and provides critical insights into the intermolecular Mannich-like reaction, a fundamental mechanism for scaffold formation in many plant alkaloids.", "summaryZh": "尼古丁是烟草中一种令人上瘾的强效杀虫生物碱，它塑造了人类历史、农业和生产尼古丁的植物。然而，尼古丁生物合成中涉及的酶促步骤和反应机制仍然难以捉摸。在这里，我们揭示了最终的偶联反应通过尿苷二磷酸（UDP）-糖基转移酶的糖基化来稳定，由A622还原和激活，通过立体选择性分子间曼尼希样反应缩合，随后由小檗碱桥酶样（BBL）氧化，最后由β-葡萄糖苷酶去糖基化产生尼古丁。 5 组分代谢物在液泡膜上组装，以引导尼古丁生物合成及其运输。我们在体外和体内异源重建了这种代谢。废除任何这些成分都会消耗尼古丁的积累。多药和有毒化合物挤压（MATE）转运蛋白对于有效设计异源植物中尼古丁的生产至关重要，从而赋予害虫抗性。这项工作完成了尼古丁生物合成途径，并为分子间曼尼希样反应提供了重要的见解，分子间曼尼希反应是许多植物生物碱支架形成的基本机制。", "titleZh": "尼古丁的完全生物合成。", "translationSource": "64fa61c86ae357d0"}, {"pmid": "41430436", "title": "NAC controls nascent chain fate through tunnel sensing and chaperone action.", "journal": "Nature", "year": 2026, "published": "2026-04-01", "doi": "10.1038/s41586-025-10058-2", "doiUrl": "https://doi.org/10.1038/s41586-025-10058-2", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41430436/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "The nascent polypeptide-associated complex (NAC) is a conserved ribosome-bound factor with essential yet incompletely understood roles in protein biogenesis 1 . Here we show that NAC is a multi-faceted regulator that coordinates translation elongation, co-translational folding and organelle targeting through distinct interactions with nascent polypeptides both inside and outside the ribosome exit tunnel. Using NAC-selective ribosome profiling in Caenorhabditis elegans, we identify thousands of sequence-specific NAC binding events across the nascent proteome, revealing broad co-translational engagement with hydrophobic and helical motifs in cytosolic, nuclear, endoplasmic reticulum and mitochondrial proteins. Unexpectedly, we discover an intra-tunnel-sensing mode in which NAC engages ribosomes with extremely short nascent polypeptides inside the exit tunnel in a sequence-specific manner. Moreover, initial NAC interactions induce an early elongation slowdown that tunes ribosome flux and prevent ribosome collisions, linking the chaperone activity of NAC to kinetic control of translation. We propose that NAC action protects aggregation-prone intermediates by shielding amphipathic helices, thus promoting cytonuclear folding. NAC also supports mitochondrial membrane protein biogenesis and endoplasmic reticulum targeting by early recognition of signal sequences and transmembrane domains. Our findings establish NAC as an early-acting, multi-faceted orchestrator of co-translational proteostasis, with distinct mechanisms of action on nascent chains depending on their sequence features and subcellular destinations.", "summaryZh": "新生多肽相关复合物 (NAC) 是一种保守的核糖体结合因子，在蛋白质生物合成中具有重要但尚未完全了解的作用 1 。在这里，我们证明 NAC 是一种多面调节剂，通过与核糖体出口通道内外的新生多肽的不同相互作用来协调翻译延伸、共翻译折叠和细胞器靶向。使用秀丽隐杆线虫中的 NAC 选择性核糖体分析，我们在新生蛋白质组中鉴定了数千个序列特异性 NAC 结合事件，揭示了与胞质、核、内质网和线粒体蛋白中疏水和螺旋基序的广泛共翻译参与。出乎意料的是，我们发现了一种隧道内传感模式，其中 NAC 以序列特异性方式在出口隧道内将核糖体与极短的新生多肽结合。此外，最初的 NAC 相互作用会诱导早期延伸减慢，从而调节核糖体通量并防止核糖体碰撞，将 NAC 的伴侣活性与翻译的动力学控制联系起来。我们认为 NAC 作用通过屏蔽两亲性螺旋来保护易于聚集的中间体，从而促进细胞核折叠。 NAC 还通过信号序列和跨膜结构域的早期识别来支持线粒体膜蛋白生物发生和内质网靶向。我们的研究结果表明，NAC 是一种早期作用、多方面的共翻译蛋白质稳态协调器，根据其序列特征和亚细胞目的地，对新生链具有不同的作用机制。", "titleZh": "NAC 通过隧道传感和伴侣作用来控制新生链的命运。", "translationSource": "8fb604947780bfc4"}, {"pmid": "41299171", "title": "Inhibitors supercharge kinase turnover through native proteolytic circuits.", "journal": "Nature", "year": 2026, "published": "2026-01-01", "doi": "10.1038/s41586-025-09763-9", "doiUrl": "https://doi.org/10.1038/s41586-025-09763-9", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41299171/", "categories": ["靶向蛋白降解"], "matchedTerms": ["targeted protein degradation", "protac", "proteolysis-targeting chimera", "molecular glue", "degrader"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：targeted protein degradation, protac, proteolysis-targeting chimera, molecular glue, degrader。", "abstractEn": "Targeted protein degradation is a pharmacological strategy that relies on small molecules such as proteolysis-targeting chimeras (PROTACs) or molecular glues, which induce proximity between a target protein and an E3 ubiquitin ligase to prompt target ubiquitination and proteasomal degradation 1 . Sporadic reports indicated that ligands designed to inhibit a target can also induce its destabilization 2-4 . Among others, this has repeatedly been observed for kinase inhibitors 5-7 . However, we lack an understanding of the frequency, generalizability and mechanistic underpinnings of these phenomena. Here, to address this knowledge gap, we generated dynamic abundance profiles of 98 kinases after cellular perturbations with 1,570 kinase inhibitors, revealing 160 selective instances of inhibitor-induced kinase destabilization. Kinases prone to degradation are frequently annotated as HSP90 clients, therefore affirming chaperone deprivation as an important route of destabilization. However, detailed investigation of inhibitor-induced degradation of LYN, BLK and RIPK2 revealed a differentiated, common mechanistic logic whereby inhibitors function by inducing a kinase state that is more efficiently cleared by endogenous degradation mechanisms. Mechanistically, effects can manifest by ligand-induced changes in cellular activity, localization or higher-order assemblies, which may be triggered by direct target engagement or network effects. Collectively, our data suggest that inhibitor-induced kinase degradation is a common event and positions supercharging of endogenous degradation circuits as an alternative to classical proximity-inducing degraders.", "summaryZh": "靶向蛋白质降解是一种药理学策略，依赖于蛋白水解靶向嵌合体 (PROTAC) 或分子胶等小分子，诱导靶蛋白与 E3 泛素连接酶接近，从而促进靶标泛素化和蛋白酶体降解 1 。零星报告表明，旨在抑制靶标的配体也可能导致其不稳定 2-4 。其中，这一现象已在激酶抑制剂中反复观察到 5-7 。然而，我们对这些现象的频率、普遍性和机制基础缺乏了解。为了弥补这一知识差距，我们在使用 1,570 种激酶抑制剂进行细胞扰动后生成了 98 种激酶的动态丰度谱，揭示了抑制剂诱导的激酶不稳定的 160 个选择性实例。易于降解的激酶经常被注释为 HSP90 客户，因此确认伴侣剥夺是不稳定的重要途径。然而，对抑制剂诱导的 LYN、BLK 和 RIPK2 降解的详细研究揭示了一种不同的、共同的机制逻辑，即抑制剂通过诱导激酶状态发挥作用，而激酶状态可以通过内源性降解机制更有效地清除。从机制上讲，效应可以通过配体诱导的细胞活性、定位或高阶组装的变化来体现，这些变化可能是由直接靶标参与或网络效应触发的。总的来说，我们的数据表明抑制剂诱导的激酶降解是一种常见事件，并将内源性降解回路的增压作为经典邻近诱导降解剂的替代方案。", "titleZh": "抑制剂通过天然蛋白水解回路增强激酶周转。", "translationSource": "6c1364acfb227ed2"}, {"pmid": "41193816", "title": "Secretome translation shaped by lysosomes and lunapark-marked ER junctions.", "journal": "Nature", "year": 2026, "published": "2026-01-01", "doi": "10.1038/s41586-025-09718-0", "doiUrl": "https://doi.org/10.1038/s41586-025-09718-0", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41193816/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal。", "abstractEn": "The endoplasmic reticulum (ER) is a highly interconnected membrane network that serves as a central site for protein synthesis and maturation 1 . A crucial subset of ER-associated transcripts, termed secretome mRNAs, encode secretory, lumenal and integral membrane proteins, representing nearly one-third of human protein-coding genes 1 . Unlike cytosolic mRNAs, secretome mRNAs undergo co-translational translocation, and thus require precise coordination between translation and protein insertion 2,3 . Disruption of this process, such as through altered elongation rates 4 , activates stress response pathways that impede cellular growth, raising the question of whether secretome translation is spatially organized to ensure fidelity. Here, using live-cell single-molecule imaging, we demonstrate that secretome mRNA translation is preferentially localized to ER junctions that are enriched with the structural protein lunapark and in close proximity to lysosomes. Lunapark depletion reduced ribosome density and translation efficiency of secretome mRNAs near lysosomes, an effect that was dependent on eIF2-mediated initiation and was reversed by the integrated stress response inhibitor ISRIB. Lysosome-associated translation was further modulated by nutrient status: amino acid deprivation enhanced lysosome-proximal translation, whereas lysosomal pH neutralization suppressed it. These findings identify a mechanism by which ER junctional proteins and lysosomal activity cooperatively pattern secretome mRNA translation, linking ER architecture and nutrient sensing to the production of secretory and membrane proteins.", "summaryZh": "内质网 (ER) 是一个高度互连的膜网络，是蛋白质合成和成熟的中心部位 1 。 ER 相关转录物的一个重要子集，称为分泌组 mRNA，编码分泌蛋白、腔蛋白和整合膜蛋白，代表近三分之一的人类蛋白编码基因 1 。与胞质 mRNA 不同，分泌组 mRNA 会发生共翻译易位，因此需要翻译和蛋白质插入之间的精确协调 2,3 。破坏这一过程，例如通过改变伸长率 4 ，会激活阻碍细胞生长的应激反应途径，从而提出分泌蛋白组翻译是否在空间上组织以确保保真度的问题。在这里，利用活细胞单分子成像，我们证明分泌组 mRNA 翻译优先定位于富含结构蛋白 lunapark 且紧邻溶酶体的内质网连接处。 Lunapark 耗竭降低了核糖体密度和溶酶体附近分泌组 mRNA 的翻译效率，这种效应依赖于 eIF2 介导的启动，并被集成应激反应抑制剂 ISRIB 逆转。溶酶体相关翻译进一步受到营养状态的调节：氨基酸剥夺增强了溶酶体近端翻译，而溶酶体 pH 中和则抑制了它。这些发现确定了一种机制，通过该机制，内质网连接蛋白和溶酶体活性协同调节分泌蛋白组 mRNA 翻译，将内质网结构和营养传感与分泌蛋白和膜蛋白的产生联系起来。", "titleZh": "由溶酶体和 Lunapark 标记的 ER 连接形成的分泌蛋白组翻译。", "translationSource": "4d582e9aff35d4f9"}, {"pmid": "41205601", "title": "Phase separation to buffer growth-mediated dilution in synthetic circuits.", "journal": "Cell", "year": 2025, "published": "2025-12-24", "doi": "10.1016/j.cell.2025.10.017", "doiUrl": "https://doi.org/10.1016/j.cell.2025.10.017", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41205601/", "categories": ["合成生物学"], "matchedTerms": ["synthetic circuit", "synthetic gene circuit", "gene circuit"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic circuit, synthetic gene circuit, gene circuit。", "abstractEn": "Fluctuations in host cell growth pose a critical challenge for maintaining reliable function in synthetic gene circuits. Growth-mediated dilution causes a global reduction in circuit component concentrations, which can significantly destabilize circuit behavior. However, effective strategies to counteract this problem remain lacking. Here, we present a phase-separation-based strategy to directly mitigate dilution effects. By fusing transcription factors (TFs) to intrinsically disordered regions (IDRs), we drive the formation of transcriptional condensates that concentrate TFs at their target promoters. These condensates buffer against prolonged rapid dilution of TF concentration and preserve bistable memory in self-activation circuits across variable growth conditions. We further show that this approach improves production efficiency in a cinnamic acid biosynthesis pathway. Together, our results establish liquid-liquid phase separation as an emerging design principle for constructing resilient synthetic circuits that maintain robust performance under dynamic growth conditions.", "summaryZh": "宿主细胞生长的波动对维持合成基因电路的可靠功能提出了严峻的挑战。生长介导的稀释会导致电路元件浓度整体降低，这会显着破坏电路行为的稳定性。然而，仍然缺乏解决这一问题的有效策略。在这里，我们提出了一种基于相分离的策略来直接减轻稀释效应。通过将转录因子 (TF) 与本质无序区域 (IDR) 融合，我们驱动转录缩合物的形成，将 TF 集中在其目标启动子处。这些冷凝物可以缓冲 TF 浓度的长时间快速稀释，并在可变生长条件下的自激活电路中保留双稳态记忆。我们进一步表明，这种方法提高了肉桂酸生物合成途径的生产效率。总之，我们的结果将液-液相分离确立为一种新兴的设计原理，用于构建在动态生长条件下保持稳健性能的弹性合成电路。", "titleZh": "相分离可缓冲合成电路中生长介导的稀释。", "translationSource": "8d71941cd9d8144c"}, {"pmid": "41197626", "title": "Mapping chromatin structure at base-pair resolution unveils a unified model of cis-regulatory element interactions.", "journal": "Cell", "year": 2025, "published": "2025-12-11", "doi": "10.1016/j.cell.2025.10.013", "doiUrl": "https://doi.org/10.1016/j.cell.2025.10.013", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41197626/", "categories": ["靶向蛋白降解"], "matchedTerms": ["degron"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：degron。", "abstractEn": "Chromatin structure is a key determinant of gene expression in eukaryotes, but it has not been possible to define the structure of cis-regulatory elements at the scale of the proteins that bind them. Here, we generate multidimensional chromosome conformation capture (3C) maps at base-pair resolution using Micro Capture-C ultra (MCCu). This can resolve contacts between individual transcription factor motifs within cis-regulatory elements. Using degron systems, we show that removal of Mediator complex components alters fine-scale promoter structure and that nucleosome depletion plays a key role in transcription factor-driven enhancer-promoter contacts. We observe that chromatin is partitioned into nanoscale domains by nucleosome-depleted regions. This structural conformation is reproduced by chemically specific coarse-grained molecular dynamics simulations of the physicochemical properties of chromatin. Combining MCCu with molecular dynamics simulations and super-resolution microscopy allows us to propose a unified model in which the biophysical properties of chromatin orchestrate contacts between cis-regulatory elements.", "summaryZh": "染色质结构是真核生物基因表达的关键决定因素，但尚不可能在结合顺式调控元件的蛋白质规模上定义它们的结构。在这里，我们使用 Micro Capture-C ultra (MCCu) 以碱基对分辨率生成多维染色体构象捕获 (3C) 图。这可以解决顺式调控元件内各个转录因子基序之间的接触。使用降解决定子系统，我们表明去除介体复合体成分会改变精细启动子结构，并且核小体耗竭在转录因子驱动的增强子-启动子接触中起着关键作用。我们观察到染色质被核小体耗尽区域划分为纳米级区域。这种结构构象是通过染色质物理化学性质的化学特异性粗粒度分子动力学模拟来重现的。将 MCCu 与分子动力学模拟和超分辨率显微镜相结合，使我们能够提出一个统一的模型，其中染色质的生物物理特性协调顺式调控元件之间的接触。", "titleZh": "以碱基对分辨率绘制染色质结构揭示了顺式调控元件相互作用的统一模型。", "translationSource": "532b3f99d5aee2bf"}, {"pmid": "41094135", "title": "Isolation, engineering and ecology of temperate phages from the human gut.", "journal": "Nature", "year": 2025, "published": "2025-11-01", "doi": "10.1038/s41586-025-09614-7", "doiUrl": "https://doi.org/10.1038/s41586-025-09614-7", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41094135/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Large-scale metagenomic and data-mining efforts have revealed an expansive diversity of bacteriophages (phages) within the human gut 1-3 . However, functional understanding of phage-host interactions within this complex environment is limited, largely due to a lack of cultured isolates available for experimental validation. Here we characterize 134 inducible prophages originating from 252 human gut bacterial isolates using 10 different induction conditions to expand the experimentally validated temperate phage-host pairs originating from the human gut. Importantly, only 18% of computationally predicted prophages could be induced in pure cultures. Moreover, we construct a 78-member synthetic microbiome that, when co-cultured in the presence of human colonic cells (Caco2), led to the induction of 35% phage species. Using cultured isolates, we demonstrate that human host-associated cellular products may act as induction agents, providing a possible link between gastrointestinal cell lysis and temperate phage populations 4,5 . We provide key insights into prophage diversity and genetics, including a genetic pathway for domestication, finding that polylysogeny was common and resulted in coordinated prophage induction, and that differential induction can be influenced by divergent prophage integration sites. More broadly, our study highlights the importance of culture-based techniques, alongside experimental validation, genomics and computational prediction, to understand the biology and function of temperate phages in the human gut microbiome. These culture-based approaches will enable applications across synthetic biology, biotechnology and microbiome fields.", "summaryZh": "大规模宏基因组和数据挖掘工作揭示了人类肠道内噬菌体的广泛多样性 1-3 。然而，对这种复杂环境中噬菌体-宿主相互作用的功能性理解是有限的，这主要是由于缺乏可用于实验验证的培养分离株。在这里，我们使用 10 种不同的诱导条件来表征源自 252 种人类肠道细菌分离株的 134 种诱导型前噬菌体，以扩展源自人类肠道的经实验验证的温带噬菌体-宿主对。重要的是，只有 18% 的计算预测前噬菌体可以在纯培养物中诱导。此外，我们构建了一个由 78 个成员组成的合成微生物组，当与人类结肠细胞 (Caco2) 共培养时，可诱导 35% 的噬菌体种类。使用培养的分离株，我们证明人类宿主相关的细胞产物可以充当诱导剂，提供胃肠道细胞裂解和温带噬菌体群体之间的可能联系 4,5 。我们提供了关于原噬菌体多样性和遗传学的重要见解，包括驯化的遗传途径，发现多溶源很常见并导致协调的原噬菌体诱导，并且差异诱导可能受到不同的原噬菌体整合位点的影响。更广泛地说，我们的研究强调了基于培养的技术以及实验验证、基因组学和计算预测的重要性，以了解人类肠道微生物组中温带噬菌体的生物学和功能。这些基于培养的方法将使合成生物学、生物技术和微生物组领域的应用成为可能。", "titleZh": "人类肠道温带噬菌体的分离、工程和生态学。", "translationSource": "4e9b05d6871c3c04"}, {"pmid": "41034580", "title": "Proteotoxic stress response drives T cell exhaustion and immune evasion.", "journal": "Nature", "year": 2025, "published": "2025-11-01", "doi": "10.1038/s41586-025-09539-1", "doiUrl": "https://doi.org/10.1038/s41586-025-09539-1", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/41034580/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis, autophagy。", "abstractEn": "Chronic infections and cancer cause T cell dysfunction known as exhaustion. This cell state is caused by persistent antigen exposure, suboptimal co-stimulation and a plethora of hostile factors that dampen protective immunity and limit the efficacy of immunotherapies 1-4 . The mechanisms that underlie T cell exhaustion remain poorly understood. Here we analyse the proteome of CD8 + exhausted T (T ex ) cells across multiple states of exhaustion in the context of both chronic viral infections and cancer. We show that there is a non-stochastic pathway-specific discordance between mRNA and protein dynamics between T effector (T eff ) and T ex cells. We identify a distinct proteotoxic stress response (PSR) in T ex cells, which we term T ex -PSR. Contrary to canonical stress responses that induce a reduction in protein synthesis 5,6 , T ex -PSR involves an increase in global translation activity and an upregulation of specialized chaperone proteins. T ex -PSR is further characterized by the accumulation of protein aggregates and stress granules and an increase in autophagy-dominant protein catabolism. We establish that disruption of proteostasis alone can convert T eff cells to T ex cells, and we link T ex -PSR mechanistically to persistent AKT signalling. Finally, disruption of T ex -PSR-associated chaperones in CD8 + T cells improves cancer immunotherapy in preclinical models. Moreover, a high T ex -PSR in T cells from patients with cancer confers poor responses to clinical immunotherapy. Collectively, our findings indicate that T ex -PSR is a hallmark and a mechanistic driver of T cell exhaustion, which raises the possibility of targeting proteostasis pathways as an approach for cancer immunotherapy.", "summaryZh": "慢性感染和癌症会导致 T 细胞功能障碍，即疲劳。这种细胞状态是由持续的抗原暴露、次优的共刺激和过多的敌对因素引起的，这些因素会抑制保护性免疫并限制免疫疗法的功效 1-4 。 T 细胞耗竭的机制仍知之甚少。在这里，我们分析了慢性病毒感染和癌症背景下多种衰竭状态下 CD8 + 衰竭 T (T ex ) 细胞的蛋白质组。我们发现 T 效应细胞 (T eff ) 和 T ex 细胞之间的 mRNA 和蛋白质动力学之间存在非随机途径特异性不一致。我们在 T ex 细胞中发现了一种独特的蛋白毒性应激反应 (PSR)，我们将其称为 T ex -PSR。与导致蛋白质合成减少的典型应激反应相反 5,6 ，T ex -PSR 涉及整体翻译活性的增加和专门伴侣蛋白的上调。 T ex -PSR 的进一步特征是蛋白质聚集体和应激颗粒的积累以及自噬主导的蛋白质分解代谢的增加。我们确定，仅破坏蛋白质稳态就可以将 T eff 细胞转化为 T ex 细胞，并且我们将 T ex -PSR 机制与持续的 AKT 信号传导联系起来。最后，CD8 + T 细胞中 T ex -PSR 相关伴侣的破坏可改善临床前模型中的癌症免疫治疗。此外，癌症患者 T 细胞中的高 T ex -PSR 导致对临床免疫治疗的反应较差。总的来说，我们的研究结果表明，T ex -PSR 是 T 细胞耗竭的标志和机制驱动因素，这提高了将蛋白质稳态通路作为癌症免疫治疗方法的可能性。", "titleZh": "蛋白毒性应激反应会导致 T 细胞耗竭和免疫逃避。", "translationSource": "b4db4e77e51209d8"}, {"pmid": "40963021", "title": "Structural basis for mTORC1 activation on the lysosomal membrane.", "journal": "Nature", "year": 2025, "published": "2025-11-01", "doi": "10.1038/s41586-025-09545-3", "doiUrl": "https://doi.org/10.1038/s41586-025-09545-3", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/40963021/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "lysosomal", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, lysosomal, autophagy。", "abstractEn": "The mechanistic target of rapamycin complex 1 (mTORC1) integrates growth factor (GF) and nutrient signals to stimulate anabolic processes connected to cell growth and inhibit catabolic processes such as autophagy 1,2 . GF signalling through the tuberous sclerosis complex regulates the lysosomally localized small GTPase RAS homologue enriched in brain (RHEB) 3 . Direct binding of RHEB-GTP to the mTOR kinase subunit of mTORC1 allosterically activates the kinase by inducing a large-scale conformational change 4 . Here we reconstituted mTORC1 activation on membranes by RHEB, RAGs and Ragulator. Cryo-electron microscopy showed that RAPTOR and mTOR interact directly with the membrane. Full engagement of the membrane anchors is required for optimal alignment of the catalytic residues in the mTOR kinase active site. Converging signals from GFs and nutrients drive mTORC1 recruitment to and activation on lysosomal membrane in a four-step process, consisting of (1) RAG-Ragulator-driven recruitment to within ~100 Å of the lysosomal membrane; (2) RHEB-driven recruitment to within ~40 Å; (3) RAPTOR-membrane engagement and intermediate enzyme activation; and (4) mTOR-membrane engagement and full enzyme activation. RHEB and membrane engagement combined leads to full catalytic activation and structurally explains GF and nutrient signal integration at the lysosome.", "summaryZh": "雷帕霉素复合物 1 (mTORC1) 的机制靶标整合了生长因子 (GF) 和营养信号，以刺激与细胞生长相关的合成代谢过程并抑制自噬等分解代谢过程 1,2 。通过结节性硬化症复合体的 GF 信号传导可调节大脑中富集的溶酶体定位的小 GTP 酶 RAS 同源物 (RHEB) 3 。 RHEB-GTP 与 mTORC1 的 mTOR 激酶亚基直接结合，通过诱导大规模构象变化来变构激活激酶 4 。在这里，我们通过 RHEB、RAG 和 Ragulator 重建了膜上的 mTORC1 激活。冷冻电镜显示 RAPTOR 和 mTOR 直接与膜相互作用。 mTOR 激酶活性位点中催化残基的最佳排列需要膜锚的完全接合。来自 GF 和营养物的汇聚信号通过四步过程驱动 mTORC1 募集到溶酶体膜并在其上激活，包括 (1) RAG-Ragulator 驱动的募集到溶酶体膜的约 100 Å 范围内； (2) RHEB 驱动的招募范围在 ~40 Å 以内； (3) RAPTOR-膜接合和中间酶激活； (4) mTOR 膜结合和酶的完全激活。 RHEB 和膜结合导致完全催化激活，并从结构上解释了溶酶体中的 GF 和营养信号整合。", "titleZh": "溶酶体膜上 mTORC1 激活的结构基础。", "translationSource": "1fc81eaaa9533718"}, {"pmid": "40840445", "title": "Adenosine kinase and ADAL coordinate detoxification of modified adenosines to safeguard metabolism.", "journal": "Cell", "year": 2025, "published": "2025-10-30", "doi": "10.1016/j.cell.2025.07.041", "doiUrl": "https://doi.org/10.1016/j.cell.2025.07.041", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/40840445/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "RNA contains diverse post-transcriptional modifications, and its catabolic breakdown yields numerous modified nucleosides requiring correct processing, but the mechanisms remain unknown. Here, we demonstrate that three RNA-derived modified adenosines, N 6 -methyladenosine (m 6 A), N 6 ,N 6 -dimethyladenosine (m 6,6 A), and N 6 -isopentenyladenosine (i 6 A), are sequentially metabolized into inosine monophosphate (IMP) to mitigate their intrinsic cytotoxicity. After phosphorylation by adenosine kinase (ADK), they undergo deamination by adenosine deaminase-like (ADAL). In Adal knockout mice, N 6 -modified adenosine monophosphates (AMPs) accumulate and allosterically inhibit AMP-activated protein kinase (AMPK), dysregulating glucose metabolism. Furthermore, ADK deficiency, linked to human inherited disorders of purine metabolism, elevates levels of the three modified adenosines, resulting in early lethality in mice. Mechanistically, excessive m 6 A, m 6,6 A, and i 6 A impair lysosomal function by interfering with lysosomal membrane proteins, thereby disrupting lipid metabolism and causing cellular toxicity. Through this nucleotide metabolism pathway and mechanism, cells detoxify modified adenosines, linking modified RNA metabolism to human disease.", "summaryZh": "RNA 含有多种转录后修饰，其分解代谢分解产生大量需要正确处理的修饰核苷，但其机制仍不清楚。在这里，我们证明了三种 RNA 衍生的修饰腺苷，N 6 -甲基腺苷 (m 6 A)、N 6 ,N 6 -二甲基腺苷 (m 6,6 A) 和 N 6 -异戊烯基腺苷 (i 6 A)，依次代谢为单磷酸肌苷 (IMP)，以减轻其内在细胞毒性。被腺苷激酶 (ADK) 磷酸化后，它们会被腺苷脱氨酶样 (ADAL) 脱氨。在 Adal 基因敲除小鼠中，N 6 修饰的单磷酸腺苷 (AMP) 积累并变构抑制 AMP 激活的蛋白激酶 (AMPK)，从而失调葡萄糖代谢。此外，ADK 缺乏与人类遗传性嘌呤代谢紊乱有关，会提高三种修饰腺苷的水平，导致小鼠早期死亡。从机制上讲，过量的 m 6 A、m 6,6 A 和 i 6 A 通过干扰溶酶体膜蛋白来损害溶酶体功能，从而扰乱脂质代谢并引起细胞毒性。通过这种核苷酸代谢途径和机制，细胞对修饰的腺苷进行解毒，将修饰的 RNA 代谢与人类疾病联系起来。", "titleZh": "腺苷激酶和 ADAL 协调修饰腺苷的解毒以保护新陈代谢。", "translationSource": "c0ea17de62b528fc"}, {"pmid": "39695235", "title": "Lithocholic acid binds TULP3 to activate sirtuins and AMPK to slow down ageing.", "journal": "Nature", "year": 2025, "published": "2025-07-01", "doi": "10.1038/s41586-024-08348-2", "doiUrl": "https://doi.org/10.1038/s41586-024-08348-2", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/39695235/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Lithocholic acid (LCA) is accumulated in mammals during calorie restriction and it can activate AMP-activated protein kinase (AMPK) to slow down ageing 1 . However, the molecular details of how LCA activates AMPK and induces these biological effects are unclear. Here we show that LCA enhances the activity of sirtuins to deacetylate and subsequently inhibit vacuolar H + -ATPase (v-ATPase), which leads to AMPK activation through the lysosomal glucose-sensing pathway. Proteomics analyses of proteins that co-immunoprecipitated with sirtuin 1 (SIRT1) identified TUB-like protein 3 (TULP3), a sirtuin-interacting protein 2 , as a LCA receptor. In detail, LCA-bound TULP3 allosterically activates sirtuins, which then deacetylate the V1E1 subunit of v-ATPase on residues K52, K99 and K191. Muscle-specific expression of a V1E1 mutant (3KR), which mimics the deacetylated state, strongly activates AMPK and rejuvenates muscles in aged mice. In nematodes and flies, LCA depends on the TULP3 homologues tub-1 and ktub, respectively, to activate AMPK and extend lifespan and healthspan. Our study demonstrates that activation of the TULP3-sirtuin-v
