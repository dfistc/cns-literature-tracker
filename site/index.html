"2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis, autophagy。", "abstractEn": "Cell death in human diseases is often a consequence of disrupted cellular homeostasis. If cell death is prevented without restoring cellular homeostasis, it may lead to a persistent dysfunctional and pathological state. Although mechanisms of cell death have been thoroughly investigated 1-3 , it remains unclear how homeostasis can be restored after inhibition of cell death. Here we identify TRADD 4-6 , an adaptor protein, as a direct regulator of both cellular homeostasis and apoptosis. TRADD modulates cellular homeostasis by inhibiting K63-linked ubiquitination of beclin 1 mediated by TRAF2, cIAP1 and cIAP2, thereby reducing autophagy. TRADD deficiency inhibits RIPK1-dependent extrinsic apoptosis and proteasomal stress-induced intrinsic apoptosis. We also show that the small molecules ICCB-19 and Apt-1 bind to a pocket on the N-terminal TRAF2-binding domain of TRADD (TRADD-N), which interacts with the C-terminal domain (TRADD-C) and TRAF2 to modulate the ubiquitination of RIPK1 and beclin 1. Inhibition of TRADD by ICCB-19 or Apt-1 blocks apoptosis and restores cellular homeostasis by activating autophagy in cells with accumulated mutant tau, α-synuclein, or huntingtin. Treatment with Apt-1 restored proteostasis and inhibited cell death in a mouse model of proteinopathy induced by mutant tau(P301S). We conclude that pharmacological targeting of TRADD may represent a promising strategy for inhibiting cell death and restoring homeostasis to treat human diseases.", "summaryZh": "人类疾病中的细胞死亡通常是细胞稳态破坏的结果。如果在不恢复细胞稳态的情况下阻止细胞死亡，则可能导致持续的功能障碍和病理状态。尽管细胞死亡机制已被彻底研究 1-3 ，但仍不清楚抑制细胞死亡后如何恢复稳态。在这里，我们确定了 TRADD 4-6（一种接头蛋白）作为细胞稳态和细胞凋亡的直接调节剂。 TRADD 通过抑制 TRAF2、cIAP1 和 cIAP2 介导的 K63 连接的 beclin 1 泛素化来调节细胞稳态，从而减少自噬。 TRADD 缺陷会抑制 RIPK1 依赖性外源性细胞凋亡和蛋白酶体应激诱导的内源性细胞凋亡。我们还表明，小分子 ICCB-19 和 Apt-1 与 TRADD (TRADD-N) N 端 TRAF2 结合结构域上的口袋结合，后者与 C 端结构域 (TRADD-C) 和 TRAF2 相互作用，调节 RIPK1 和 beclin 1 的泛素化。ICCB-19 或 Apt-1 抑制 TRADD 可阻止细胞凋亡，并通过激活自噬来恢复细胞稳态。具有累积突变 tau、α-突触核蛋白或亨廷顿蛋白的细胞。在突变 tau (P301S) 诱导的蛋白质病小鼠模型中，使用 Apt-1 治疗可恢复蛋白质稳态并抑制细胞死亡。我们的结论是，TRADD 的药理学靶向可能是抑制细胞死亡和恢复体内平衡以治疗人类疾病的一种有前途的策略。", "titleZh": "调节 TRADD 以恢复细胞稳态并抑制细胞凋亡。", "translationSource": "ea54cabe9402b3db"}, {"pmid": "32968278", "title": "Initiation of a conserved trophectoderm program in human, cow and mouse embryos.", "journal": "Nature", "year": 2020, "published": "2020-11-01", "doi": "10.1038/s41586-020-2759-x", "doiUrl": "https://doi.org/10.1038/s41586-020-2759-x", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32968278/", "categories": ["靶向蛋白降解"], "matchedTerms": ["trim-away"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：trim-away。", "abstractEn": "Current understandings of cell specification in early mammalian pre-implantation development are based mainly on mouse studies. The first lineage differentiation event occurs at the morula stage, with outer cells initiating a trophectoderm (TE) placental progenitor program. The inner cell mass arises from inner cells during subsequent developmental stages and comprises precursor cells of the embryo proper and yolk sac 1 . Recent gene-expression analyses suggest that the mechanisms that regulate early lineage specification in the mouse may differ in other mammals, including human 2-5 and cow 6 . Here we show the evolutionary conservation of a molecular cascade that initiates TE segregation in human, cow and mouse embryos. At the morula stage, outer cells acquire an apical-basal cell polarity, with expression of atypical protein kinase C (aPKC) at the contact-free domain, nuclear expression of Hippo signalling pathway effectors and restricted expression of TE-associated factors such as GATA3, which suggests initiation of a TE program. Furthermore, we demonstrate that inhibition of aPKC by small-molecule pharmacological modulation or Trim-Away protein depletion impairs TE initiation at the morula stage. Our comparative embryology analysis provides insights into early lineage specification and suggests that a similar mechanism initiates a TE program in human, cow and mouse embryos.", "summaryZh": "目前对早期哺乳动物植入前发育中细胞规范的理解主要基于小鼠研究。第一个谱系分化事件发生在桑葚胚阶段，外部细胞启动滋养外胚层 (TE) 胎盘祖细胞程序。内细胞团由随后发育阶段的内细胞产生，并包含胚胎本身和卵黄囊的前体细胞 1 。最近的基因表达分析表明，小鼠中调节早期谱系规范的机制可能与其他哺乳动物不同，包括人类 2-5 和牛 6 。在这里，我们展示了在人类、牛和小鼠胚胎中启动 TE 分离的分子级联的进化保守性。在桑葚胚阶段，外层细胞获得顶端-基底细胞极性，在非接触域表达非典型蛋白激酶 C (aPKC)、Hippo 信号通路效应子的核表达以及 TE 相关因子（如 GATA3）的限制性表达，这表明 TE 程序的启动。此外，我们证明，通过小分子药理学调节或 Trim-Away 蛋白消耗来抑制 aPKC 会损害桑葚胚阶段的 TE 启动。我们的比较胚胎学分析提供了对早期谱系规范的见解，并表明类似的机制在人类、牛和小鼠胚胎中启动了 TE 程序。", "titleZh": "在人类、牛和小鼠胚胎中启动保守的滋养外胚层程序。", "translationSource": "45accced34264f94"}, {"pmid": "33064991", "title": "Timeline: Vaccines.", "journal": "Cell", "year": 2020, "published": "2020-10-15", "doi": "10.1016/j.cell.2020.09.039", "doiUrl": "https://doi.org/10.1016/j.cell.2020.09.039", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33064991/", "categories": ["合成生物学"], "matchedTerms": ["synthetic biology"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：synthetic biology。", "abstractEn": "Infectious diseases killed hundreds of million people, made empires and civilizations vulnerable, and recently took away our freedom to go out, walk, work, travel, meet friends, and visit relatives during the Covid-19 lockdown. Vaccination freed humans from most of infectious diseases of the past. By starting with a virus grown in a cow, vaccination has been propelled by new technologies such as viral growth in eggs and cell culture, chemical conjugation, recombinant DNA, genomics, and synthetic biology. The revolutionary progress in science and technologies increases the confidence that vaccines will continue to provide solutions for the wellbeing of modern society.", "summaryZh": "传染病夺去了数亿人的生命，使帝国和文明变得脆弱，最近在 Covid-19 封锁期间剥夺了我们外出、散步、工作、旅行、会见朋友和探亲的自由。疫苗接种使人类摆脱了过去的大多数传染病。从牛体内培养的病毒开始，疫苗接种已受到新技术的推动，例如鸡蛋和细胞培养中的病毒生长、化学结合、重组 DNA、基因组学和合成生物学。科学技术的革命性进步增强了人们对疫苗将继续为现代社会福祉提供解决方案的信心。", "titleZh": "时间表：疫苗。", "translationSource": "f406b716868ff8cb"}, {"pmid": "33029011", "title": "eIF2α controls memory consolidation via excitatory and somatostatin neurons.", "journal": "Nature", "year": 2020, "published": "2020-10-01", "doi": "10.1038/s41586-020-2805-8", "doiUrl": "https://doi.org/10.1038/s41586-020-2805-8", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/33029011/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "An important tenet of learning and memory is the notion of a molecular switch that promotes the formation of long-term memory 1-4 . The regulation of proteostasis is a critical and rate-limiting step in the consolidation of new memories 5-10 . One of the most effective and prevalent ways to enhance memory is by regulating the synthesis of proteins controlled by the translation initiation factor eIF2 11 . Phosphorylation of the α-subunit of eIF2 (p-eIF2α), the central component of the integrated stress response (ISR), impairs long-term memory formation in rodents and birds 11-13 . By contrast, inhibiting the ISR by mutating the eIF2α phosphorylation site, genetically 11 and pharmacologically inhibiting the ISR kinases 14-17 , or mimicking reduced p-eIF2α with the ISR inhibitor ISRIB 11 , enhances long-term memory in health and disease 18 . Here we used molecular genetics to dissect the neuronal circuits by which the ISR gates cognitive processing. We found that learning reduces eIF2α phosphorylation in hippocampal excitatory neurons and a subset of hippocampal inhibitory neurons (those that express somatostatin, but not parvalbumin). Moreover, ablation of p-eIF2α in either excitatory or somatostatin-expressing (but not parvalbumin-expressing) inhibitory neurons increased general mRNA translation, bolstered synaptic plasticity and enhanced long-term memory. Thus, eIF2α-dependent mRNA translation controls memory consolidation via autonomous mechanisms in excitatory and somatostatin-expressing inhibitory neurons.", "summaryZh": "学习和记忆的一个重要原则是促进长期记忆形成的分子开关的概念 1-4 。蛋白质稳态的调节是新记忆巩固的关键和限速步骤 5-10 。增强记忆最有效和最普遍的方法之一是调节由翻译起始因子 eIF2 控制的蛋白质的合成 11 。 eIF2 的 α 亚基 (p-eIF2α) 是综合应激反应 (ISR) 的核心成分，其磷酸化会损害啮齿动物和鸟类的长期记忆形成 11-13 。相比之下，通过突变 eIF2α 磷酸化位点、从基因上 11 和药理学上抑制 ISR 激酶 14-17 或用 ISR 抑制剂 ISRIB 模拟还原的 p-eIF2α 11 来抑制 ISR，可以增强健康和疾病中的长期记忆 18 。在这里，我们使用分子遗传学来剖析 ISR 控制认知处理的神经元回路。我们发现学习会降低海马兴奋性神经元和海马抑制性神经元（表达生长抑素但不表达小白蛋白的神经元）的 eIF2α 磷酸化。此外，在兴奋性或表达生长抑素（但不表达小清蛋白）的抑制性神经元中消除 p-eIF2α 会增加一般 mRNA 翻译，增强突触可塑性并增强长期记忆。因此，eIF2α依赖性mRNA翻译通过兴奋性神经元和表达生长抑素的抑制性神经元的自主机制控制记忆巩固。", "titleZh": "eIF2α 通过兴奋性神经元和生长抑素神经元控制记忆巩固。", "translationSource": "1d42f6265d785aae"}, {"pmid": "32968282", "title": "Functional genomic landscape of cancer-intrinsic evasion of killing by T cells.", "journal": "Nature", "year": 2020, "published": "2020-10-01", "doi": "10.1038/s41586-020-2746-2", "doiUrl": "https://doi.org/10.1038/s41586-020-2746-2", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32968282/", "categories": ["合成生物学", "溶酶体/蛋白酶体"], "matchedTerms": ["genetic circuit", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：genetic circuit, autophagy。", "abstractEn": "The genetic circuits that allow cancer cells to evade destruction by the host immune system remain poorly understood 1-3 . Here, to identify a phenotypically robust core set of genes and pathways that enable cancer cells to evade killing mediated by cytotoxic T lymphocytes (CTLs), we performed genome-wide CRISPR screens across a panel of genetically diverse mouse cancer cell lines that were cultured in the presence of CTLs. We identify a core set of 182 genes across these mouse cancer models, the individual perturbation of which increases either the sensitivity or the resistance of cancer cells to CTL-mediated toxicity. Systematic exploration of our dataset using genetic co-similarity reveals the hierarchical and coordinated manner in which genes and pathways act in cancer cells to orchestrate their evasion of CTLs, and shows that discrete functional modules that control the interferon response and tumour necrosis factor (TNF)-induced cytotoxicity are dominant sub-phenotypes. Our data establish a central role for genes that were previously identified as negative regulators of the type-II interferon response (for example, Ptpn2, Socs1 and Adar1) in mediating CTL evasion, and show that the lipid-droplet-related gene Fitm2 is required for maintaining cell fitness after exposure to interferon-γ (IFNγ). In addition, we identify the autophagy pathway as a conserved mediator of the evasion of CTLs by cancer cells, and show that this pathway is required to resist cytotoxicity induced by the cytokines IFNγ and TNF. Through the mapping of cytokine- and CTL-based genetic interactions, together with in vivo CRISPR screens, we show how the pleiotropic effects of autophagy control cancer-cell-intrinsic evasion of killing by CTLs and we highlight the importance of these effects within the tumour microenvironment. Collectively, these data expand our knowledge of the genetic circuits that are involved in the evasion of the immune system by cancer cells, and highlight genetic interactions that contribute to phenotypes associated with escape from killing by CTLs.", "summaryZh": "癌细胞能够逃避宿主免疫系统破坏的遗传回路仍知之甚少 1-3 。在这里，为了确定一组表型强大的核心基因和通路，使癌细胞能够逃避细胞毒性 T 淋巴细胞 (CTL) 介导的杀伤，我们对一组在 CTL 存在下培养的遗传多样性小鼠癌细胞系进行了全基因组 CRISPR 筛选。我们在这些小鼠癌症模型中确定了一组由 182 个基因组成的核心基因，这些基因的个体扰动会增加癌细胞对 CTL 介导的毒性的敏感性或抵抗力。使用遗传共相似性对我们的数据集进行系统探索，揭示了基因和通路在癌细胞中作用以协调其逃避 CTL 的分层和协调方式，并表明控制干扰素反应和肿瘤坏死因子 (TNF) 诱导的细胞毒性的离散功能模块是主要的亚表型。我们的数据确立了先前被确定为 II 型干扰素反应负调节因子的基因（例如 Ptpn2、Socs1 和 Adar1）在介导 CTL 逃避中的核心作用，并表明脂滴相关基因 Fitm2 在暴露于干扰素-γ (IFNγ) 后是维持细胞健康所必需的。此外，我们还发现自噬途径是癌细胞逃避 CTL 的保守介质，并表明该途径是抵抗细胞因子 IFNγ 和 TNF 诱导的细胞毒性所必需的。 通过绘制基于细胞因子和 CTL 的遗传相互作用图谱，结合体内 CRISPR 筛选，我们展示了自噬的多效性如何控制癌细胞内在逃避 CTL 杀伤，并强调了这些效应在肿瘤微环境中的重要性。总的来说，这些数据扩展了我们对癌细胞逃避免疫系统所涉及的遗传回路的认识，并强调了有助于逃避 CTL 杀伤相关表型的遗传相互作用。", "titleZh": "癌症的功能基因组景观——T 细胞本质上逃避杀伤。", "translationSource": "7e36436acaefe3c0"}, {"pmid": "32879490", "title": "In-cell architecture of the nuclear pore and snapshots of its turnover.", "journal": "Nature", "year": 2020, "published": "2020-10-01", "doi": "10.1038/s41586-020-2670-5", "doiUrl": "https://doi.org/10.1038/s41586-020-2670-5", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32879490/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：autophagy。", "abstractEn": "Nuclear pore complexes (NPCs) fuse the inner and outer membranes of the nuclear envelope. They comprise hundreds of nucleoporins (Nups) that assemble into multiple subcomplexes and form large central channels for nucleocytoplasmic exchange 1,2 . How this architecture facilitates messenger RNA export, NPC biogenesis and turnover remains poorly understood. Here we combine in situ structural biology and integrative modelling with correlative light and electron microscopy and molecular perturbation to structurally analyse NPCs in intact Saccharomyces cerevisiae cells within the context of nuclear envelope remodelling. We find an in situ conformation and configuration of the Nup subcomplexes that was unexpected from the results of previous in vitro analyses. The configuration of the Nup159 complex appears critical to spatially accommodate its function as an mRNA export platform, and as a mediator of NPC turnover. The omega-shaped nuclear envelope herniae that accumulate in nup116Δ cells 3 conceal partially assembled NPCs lacking multiple subcomplexes, including the Nup159 complex. Under conditions of starvation, herniae of a second type are formed that cytoplasmically expose NPCs. These results point to a model of NPC turnover in which NPC-containing vesicles bud off from the nuclear envelope before degradation by the autophagy machinery. Our study emphasizes the importance of investigating the structure-function relationship of macromolecular complexes in their cellular context.", "summaryZh": "核孔复合体（NPC）融合核膜的内膜和外膜。它们由数百个核孔蛋白 (Nups) 组成，这些核孔蛋白组装成多个子复合物并形成用于核质交换的大型中央通道 1,2 。这种结构如何促进信使 RNA 输出、NPC 生物发生和周转仍知之甚少。在这里，我们将原位结构生物学和综合建模与相关光学和电子显微镜以及分子扰动相结合，在核膜重塑的背景下对完整酿酒酵母细胞中的 NPC 进行结构分析。我们发现了 Nup 子复合物的原位构象和构型，这在之前的体外分析结果中是出乎意料的。 Nup159 复合体的配置对于在空间上适应其作为 mRNA 输出平台和 NPC 周转介体的功能似乎至关重要。在 nup116Δ 细胞 3 中积累的欧米伽形核膜疝隐藏了部分组装的 NPC，缺乏多个子复合体，包括 Nup159 复合体。在饥饿条件下，会形成第二种类型的疝气，使 NPC 的细胞质暴露。这些结果指出了 NPC 周转模型，其中含有 NPC 的囊泡在被自噬机制降解之前从核膜中出芽。我们的研究强调了研究细胞环境中大分子复合物的结构-功能关系的重要性。", "titleZh": "核孔的细胞内结构及其周转快照。", "translationSource": "b570b592ac8db61b"}, {"pmid": "32814905", "title": "Structural basis for dimerization quality control.", "journal": "Nature", "year": 2020, "published": "2020-10-01", "doi": "10.1038/s41586-020-2636-7", "doiUrl": "https://doi.org/10.1038/s41586-020-2636-7", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32814905/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["proteostasis"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：proteostasis。", "abstractEn": "Most quality control pathways target misfolded proteins to prevent toxic aggregation and neurodegeneration 1 . Dimerization quality control further improves proteostasis by eliminating complexes of aberrant composition 2 , but how it detects incorrect subunits remains unknown. Here we provide structural insight into target selection by SCF-FBXL17, a dimerization-quality-control E3 ligase that ubiquitylates and helps to degrade inactive heterodimers of BTB proteins while sparing functional homodimers. We find that SCF-FBXL17 disrupts aberrant BTB dimers that fail to stabilize an intermolecular β-sheet around a highly divergent β-strand of the BTB domain. Complex dissociation allows SCF-FBXL17 to wrap around a single BTB domain, resulting in robust ubiquitylation. SCF-FBXL17 therefore probes both shape and complementarity of BTB domains, a mechanism that is well suited to establish quality control of complex composition for recurrent interaction modules.", "summaryZh": "大多数质量控制途径都针对错误折叠的蛋白质，以防止毒性聚集和神经变性 1 。二聚化质量控制通过消除异常组合物 2 的复合物进一步改善蛋白质稳态，但其如何检测不正确的亚基仍然未知。在这里，我们提供了 SCF-FBXL17 靶标选择的结构见解，SCF-FBXL17 是一种二聚化质量控制 E3 连接酶，可泛素化并帮助降解 BTB 蛋白的非活性异二聚体，同时保留功能性同二聚体。我们发现 SCF-FBXL17 破坏了异常的 BTB 二聚体，这些二聚体无法稳定 BTB 结构域高度分歧的 β 链周围的分子间 β 折叠。复杂的解离使 SCF-FBXL17 能够包裹单个 BTB 结构域，从而产生强大的泛素化。因此，SCF-FBXL17 探测 BTB 结构域的形状和互补性，这种机制非常适合为循环交互模块的复杂组合物建立质量控制。", "titleZh": "二聚质量控制的结构基础。", "translationSource": "c2e3bfc7de1669c2"}, {"pmid": "32941802", "title": "A Cellular Mechanism to Detect and Alleviate Reductive Stress.", "journal": "Cell", "year": 2020, "published": "2020-10-01", "doi": "10.1016/j.cell.2020.08.034", "doiUrl": "https://doi.org/10.1016/j.cell.2020.08.034", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32941802/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Metazoan organisms rely on conserved stress response pathways to alleviate adverse conditions and preserve cellular integrity. Stress responses are particularly important in stem cells that provide lifetime support for tissue formation and repair, but how these protective systems are integrated into developmental programs is poorly understood. Here we used myoblast differentiation to identify the E3 ligase CUL2 FEM1B and its substrate FNIP1 as core components of the reductive stress response. Reductive stress, as caused by prolonged antioxidant signaling or mitochondrial inactivity, reverts the oxidation of invariant Cys residues in FNIP1 and allows CUL2 FEM1B to recognize its target. The ensuing proteasomal degradation of FNIP1 restores mitochondrial activity to preserve redox homeostasis and stem cell integrity. The reductive stress response is therefore built around a ubiquitin-dependent rheostat that tunes mitochondrial activity to redox needs and implicates metabolic control in coordination of stress and developmental signaling.", "summaryZh": "后生动物依靠保守的应激反应途径来缓解不利条件并保持细胞完整性。应激反应对于为组织形成和修复提供终生支持的干细胞尤其重要，但人们对这些保护系统如何整合到发育程序中知之甚少。在这里，我们利用成肌细胞分化来鉴定 E3 连接酶 CUL2 FEM1B 及其底物 FNIP1 作为还原应激反应的核心成分。由延长的抗氧化信号传导或线粒体不活动引起的还原应激可恢复 FNIP1 中不变的 Cys 残基的氧化，并使 CUL2 FEM1B 能够识别其靶标。随后的 FNIP1 蛋白酶体降解可恢复线粒体活性，以保持氧化还原稳态和干细胞完整性。因此，还原应激反应是围绕泛素依赖性变阻器构建的，该变阻器根据氧化还原需求调节线粒体活性，并暗示协调应激和发育信号传导的代谢控制。", "titleZh": "检测和缓解还原应激的细胞机制。", "translationSource": "30aeb32e9bc8a121"}, {"pmid": "32937105", "title": "A Network of Macrophages Supports Mitochondrial Homeostasis in the Heart.", "journal": "Cell", "year": 2020, "published": "2020-10-01", "doi": "10.1016/j.cell.2020.08.031", "doiUrl": "https://doi.org/10.1016/j.cell.2020.08.031", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32937105/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：autophagy。", "abstractEn": "Cardiomyocytes are subjected to the intense mechanical stress and metabolic demands of the beating heart. It is unclear whether these cells, which are long-lived and rarely renew, manage to preserve homeostasis on their own. While analyzing macrophages lodged within the healthy myocardium, we discovered that they actively took up material, including mitochondria, derived from cardiomyocytes. Cardiomyocytes ejected dysfunctional mitochondria and other cargo in dedicated membranous particles reminiscent of neural exophers, through a process driven by the cardiomyocyte's autophagy machinery that was enhanced during cardiac stress. Depletion of cardiac macrophages or deficiency in the phagocytic receptor Mertk resulted in defective elimination of mitochondria from the myocardial tissue, activation of the inflammasome, impaired autophagy, accumulation of anomalous mitochondria in cardiomyocytes, metabolic alterations, and ventricular dysfunction. Thus, we identify an immune-parenchymal pair in the murine heart that enables transfer of unfit material to preserve metabolic stability and organ function. VIDEO ABSTRACT.", "summaryZh": "心肌细胞承受着跳动心脏的强烈机械应力和代谢需求。目前尚不清楚这些寿命长且很少更新的细胞是否能够自行保持体内平衡。在分析健康心肌内的巨噬细胞时，我们发现它们主动吸收来自心肌细胞的物质，包括线粒体。心肌细胞通过心肌细胞自噬机制驱动的过程，将功能失调的线粒体和其他物质排出到专门的膜颗粒中，这种颗粒让人想起神经外泌体，而心肌细胞的自噬机制在心脏应激过程中会增强。心脏巨噬细胞的耗竭或吞噬细胞受体 Mertk 的缺陷导致心肌组织中线粒体的消除缺陷、炎症小体的激活、自噬受损、心肌细胞中异常线粒体的积累、代谢改变和心室功能障碍。因此，我们在小鼠心脏中发现了一对免疫实质对，它能够转移不合适的物质以保持代谢稳定性和器官功能。视频摘要。", "titleZh": "巨噬细胞网络支持心脏线粒体稳态。", "translationSource": "fd049befbdaf7b0d"}, {"pmid": "32814015", "title": "An ESCRT-III Polymerization Sequence Drives Membrane Deformation and Fission.", "journal": "Cell", "year": 2020, "published": "2020-09-03", "doi": "10.1016/j.cell.2020.07.021", "doiUrl": "https://doi.org/10.1016/j.cell.2020.07.021", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32814015/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosome", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosome, autophagy。", "abstractEn": "The endosomal sorting complex required for transport-III (ESCRT-III) catalyzes membrane fission from within membrane necks, a process that is essential for many cellular functions, from cell division to lysosome degradation and autophagy. How it breaks membranes, though, remains unknown. Here, we characterize a sequential polymerization of ESCRT-III subunits that, driven by a recruitment cascade and by continuous subunit-turnover powered by the ATPase Vps4, induces membrane deformation and fission. During this process, the exchange of Vps24 for Did2 induces a tilt in the polymer-membrane interface, which triggers transition from flat spiral polymers to helical filament to drive the formation of membrane protrusions, and ends with the formation of a highly constricted Did2-Ist1 co-polymer that we show is competent to promote fission when bound on the inside of membrane necks. Overall, our results suggest a mechanism of stepwise changes in ESCRT-III filament structure and mechanical properties via exchange of the filament subunits to catalyze ESCRT-III activity. Crown", "summaryZh": "转运 III (ESCRT-III) 所需的内体分选复合物催化膜颈内的膜裂变，这一过程对于从细胞分裂到溶酶体降解和自噬等许多细胞功能至关重要。然而，它如何打破膜仍然未知。在这里，我们描述了 ESCRT-III 亚基的顺序聚合，该聚合由招募级联和 ATPase Vps4 驱动的连续亚基周转驱动，诱导膜变形和裂变。在此过程中，Vps24 与 Did2 的交换引起聚合物-膜界面的倾斜，从而触发从扁平螺旋聚合物到螺旋丝的转变，从而驱动膜突起的形成，并最终形成高度收缩的 Did2-Ist1 共聚物，我们证明该共聚物在结合在膜颈内侧时能够促进裂变。总的来说，我们的结果表明了通过交换细丝亚基来催化 ESCRT-III 活性，逐步改变 ESCRT-III 细丝结构和机械性能的机制。皇冠", "titleZh": "ESCRT-III 聚合序列驱动膜变形和裂变。", "translationSource": "5afddb01fdaa4f52"}, {"pmid": "32848248", "title": "Structure of the C9orf72 ARF GAP complex that is haploinsufficient in ALS and FTD.", "journal": "Nature", "year": 2020, "published": "2020-09-01", "doi": "10.1038/s41586-020-2633-x", "doiUrl": "https://doi.org/10.1038/s41586-020-2633-x", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32848248/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal。", "abstractEn": "Mutation of C9orf72 is the most prevalent defect associated with amyotrophic lateral sclerosis and frontotemporal degeneration 1 . Together with hexanucleotide-repeat expansion 2,3 , haploinsufficiency of C9orf72 contributes to neuronal dysfunction 4-6 . Here we determine the structure of the C9orf72-SMCR8-WDR41 complex by cryo-electron microscopy. C9orf72 and SMCR8 both contain longin and DENN (differentially expressed in normal and neoplastic cells) domains 7 , and WDR41 is a β-propeller protein that binds to SMCR8 such that the whole structure resembles an eye slip hook. Contacts between WDR41 and the DENN domain of SMCR8 drive the lysosomal localization of the complex in conditions of amino acid starvation. The structure suggested that C9orf72-SMCR8 is a GTPase-activating protein (GAP), and we found that C9orf72-SMCR8-WDR41 acts as a GAP for the ARF family of small GTPases. These data shed light on the function of C9orf72 in normal physiology, and in amyotrophic lateral sclerosis and frontotemporal degeneration.", "summaryZh": "C9orf72 突变是与肌萎缩侧索硬化症和额颞叶变性相关的最常见缺陷 1 。 C9orf72 的单倍体不足与六核苷酸重复扩展 2,3 一起导致神经元功能障碍 4-6 。在这里，我们通过冷冻电子显微镜确定了 C9orf72-SMCR8-WDR41 复合物的结构。 C9orf72 和 SMCR8 均含有 longin 和 DENN（在正常细胞和肿瘤细胞中差异表达）结构域 7 ，WDR41 是一种 β-螺旋桨蛋白，与 SMCR8 结合，使得整个结构类似于眼滑钩。 WDR41 和 SMCR8 的 DENN 结构域之间的接触驱动复合物在氨基酸饥饿条件下的溶酶体定位。该结构表明 C9orf72-SMCR8 是一种 GTP 酶激活蛋白 (GAP)，我们发现 C9orf72-SMCR8-WDR41 充当小 GTP 酶 ARF 家族的 GAP。这些数据揭示了 C9orf72 在正常生理学、肌萎缩侧索硬化症和额颞叶变性中的功能。", "titleZh": "在 ALS 和 FTD 中单倍体不足的 C9orf72 ARF GAP 复合体的结构。", "translationSource": "95d127ee1938b8a0"}, {"pmid": "32612235", "title": "A substrate-specific mTORC1 pathway underlies Birt-Hogg-Dubé syndrome.", "journal": "Nature", "year": 2020, "published": "2020-09-01", "doi": "10.1038/s41586-020-2444-0", "doiUrl": "https://doi.org/10.1038/s41586-020-2444-0", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32612235/", "categories": ["溶酶体/蛋白酶体"], "matchedTerms": ["lysosomal", "autophagy"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：lysosomal, autophagy。", "abstractEn": "The mechanistic target of rapamycin complex 1 (mTORC1) is a key metabolic hub that controls the cellular response to environmental cues by exerting its kinase activity on multiple substrates 1-3 . However, whether mTORC1 responds to diverse stimuli by differentially phosphorylating specific substrates is poorly understood. Here we show that transcription factor EB (TFEB), a master regulator of lysosomal biogenesis and autophagy 4,5 , is phosphorylated by mTORC1 via a substrate-specific mechanism that is mediated by Rag GTPases. Owing to this mechanism, the phosphorylation of TFEB-unlike other substrates of mTORC1, such as S6K and 4E-BP1- is strictly dependent on the amino-acid-mediated activation of RagC and RagD GTPases, but is insensitive to RHEB activity induced by growth factors. This mechanism has a crucial role in Birt-Hogg-Dubé syndrome, a disorder that is caused by mutations in the RagC and RagD activator folliculin (FLCN) and is characterized by benign skin tumours, lung and kidney cysts and renal cell carcinoma 6,7 . We found that constitutive activation of TFEB is the main driver of the kidney abnormalities and mTORC1 hyperactivity in a mouse model of Birt-Hogg-Dubé syndrome. Accordingly, depletion of TFEB in kidneys of these mice fully rescued the disease phenotype and associated lethality, and normalized mTORC1 activity. Our findings identify a mechanism that enables differential phosphorylation of mTORC1 substrates, the dysregulation of which leads to kidney cysts and cancer.", "summaryZh": "雷帕霉素复合物 1 (mTORC1) 的机制靶标是一个关键的代谢中心，通过在多种底物上发挥其激酶活性来控制细胞对环境信号的反应 1-3 。然而，mTORC1 是否通过差异磷酸化特定底物来响应不同的刺激尚不清楚。在这里，我们发现转录因子 EB (TFEB) 是溶酶体生物发生和自噬的主要调节因子 4,5 ，通过 Rag GTPases 介导的底物特异性机制被 mTORC1 磷酸化。由于这种机制，与 mTORC1 的其他底物（例如 S6K 和 4E-BP1）不同，TFEB 的磷酸化严格依赖于氨基酸介导的 RagC 和 RagD GTPases 的激活，但对生长因子诱导的 RHEB 活性不敏感。这种机制在 Birt-Hogg-Dubé 综合征中发挥着至关重要的作用，该综合征是一种由 RagC 和 RagD 激活剂卵泡素 (FLCN) 突变引起的疾病，其特征是良性皮肤肿瘤、肺和肾囊肿以及肾细胞癌 6,7 。我们发现，在 Birt-Hogg-Dubé 综合征小鼠模型中，TFEB 的组成性激活是肾脏异常和 mTORC1 过度活跃的主要驱动因素。因此，这些小鼠肾脏中 TFEB 的消耗完全挽救了疾病表型和相关的致死率，并使 mTORC1 活性正常化。我们的研究结果确定了一种能够实现 mTORC1 底物差异磷酸化的机制，其失调会导致肾囊肿和癌症。", "titleZh": "Birt-Hogg-Dubé 综合征的基础是底物特异性 mTORC1 通路。", "translationSource": "26fb0c80325e55ae"}, {"pmid": "32494016", "title": "The CDK inhibitor CR8 acts as a molecular glue degrader that depletes cyclin K.", "journal": "Nature", "year": 2020, "published": "2020-09-01", "doi": "10.1038/s41586-020-2374-x", "doiUrl": "https://doi.org/10.1038/s41586-020-2374-x", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32494016/", "categories": ["靶向蛋白降解"], "matchedTerms": ["molecular glue", "degrader"], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：molecular glue, degrader。", "abstractEn": "Molecular glue compounds induce protein-protein interactions that, in the context of a ubiquitin ligase, lead to protein degradation 1 . Unlike traditional enzyme inhibitors, these molecular glue degraders act substoichiometrically to catalyse the rapid depletion of previously inaccessible targets 2 . They are clinically effective and highly sought-after, but have thus far only been discovered serendipitously. Here, through systematically mining databases for correlations between the cytotoxicity of 4,518 clinical and preclinical small molecules and the expression levels of E3 ligase components across hundreds of human cancer cell lines 3-5 , we identify CR8-a cyclin-dependent kinase (CDK) inhibitor 6 -as a compound that acts as a molecular glue degrader. The CDK-bound form of CR8 has a solvent-exposed pyridyl moiety that induces the formation of a complex between CDK12-cyclin K and the CUL4 adaptor protein DDB1, bypassing the requirement for a substrate receptor and presenting cyclin K for ubiquitination and degradation. Our studies demonstrate that chemical alteration of surface-exposed moieties can confer gain-of-function glue properties to an inhibitor, and we propose this as a broader strategy through which target-binding molecules could be converted into molecular glues.", "summaryZh": "分子胶化合物诱导蛋白质-蛋白质相互作用，在泛素连接酶的背景下，导致蛋白质降解 1 。与传统的酶抑制剂不同，这些分子胶降解剂以亚化学计量的方式发挥作用，催化先前无法达到的靶标的快速消耗 2 。它们在临床上有效且备受追捧，但迄今为止只是偶然发现的。在此，通过系统地挖掘数据库，了解 4,518 个临床和临床前小分子的细胞毒性与数百种人类癌细胞系 3-5 中 E3 连接酶成分的表达水平之间的相关性，我们确定了 CR8（一种细胞周期蛋白依赖性激酶 (CDK) 抑制剂 6）作为一种充当分子胶降解剂的化合物。 CR8 的 CDK 结合形式具有暴露于溶剂的吡啶基部分，可诱导 CDK12-细胞周期蛋白 K 和 CUL4 衔接蛋白 DDB1 之间形成复合物，绕过对底物受体的需求，并呈递细胞周期蛋白 K 进行泛素化和降解。我们的研究表明，表面暴露部分的化学改变可以赋予抑制剂功能获得胶的特性，我们建议将其作为一种更广泛的策略，通过该策略可以将靶标结合分子转化为分子胶。", "titleZh": "CDK 抑制剂 CR8 充当分子胶降解剂，消耗细胞周期蛋白 K。", "translationSource": "39a41663189173d3"}, {"pmid": "32780992", "title": "Converting Escherichia coli to a Synthetic Methylotroph Growing Solely on Methanol.", "journal": "Cell", "year": 2020, "published": "2020-08-20", "doi": "10.1016/j.cell.2020.07.010", "doiUrl": "https://doi.org/10.1016/j.cell.2020.07.010", "pubmedUrl": "https://pubmed.ncbi.nlm.nih.gov/32780992/", "categories": ["待人工复核"], "matchedTerms": [], "standard": "2020 年以来；期刊属于 CNS 正刊或 Cell/Nature/Science 系列子刊；题名/摘要命中：关键词待复核。", "abstractEn": "Methanol, being electron rich and derivable from methane or CO 2 , is a potentially renewable one-carbon (C1) feedstock for microorganisms. Although the ribulose monophosphate (RuMP) cycle used by methylotrophs to assimilate methanol differs from the typical sugar metabolism by only three enzymes, turning a non-methylotrophic organism to a synthetic methylotroph that grows to a high cell density has been challenging. Here we reprogrammed E. coli using metabolic robustness criteria followed by laboratory evolution to establish a strain that can efficiently utilize methanol as the sole carbon source. This synthetic methylotroph alleviated a so far uncharacterized hurdle, DNA-protein crosslinking (DPC), by insertion sequence (IS)-mediated copy number variations (CNVs) and balanced the metabolic flux by mutations. Being capable of growing at a rate comparable with natural methylotrophs in a wide range of methanol concentrations, this synthetic methylotrophic strain illustrates genome editing and evolution for microbial tropism changes and expands the scope of biological C1 conversion.", "summaryZh": "甲醇富含电子，可衍生自甲烷或CO 2 ，​​是一种潜在的可再生微生物单碳(C1) 原料。尽管甲基营养菌用于同化甲醇的核酮糖单磷酸（RuMP）循环与仅通过三种酶进行的典型糖代谢不同，但将非甲基营养生物转变为生长至高细胞密度的合成甲基营养菌一直具有挑战性。在这里，我们使用代谢稳健性标准对大肠杆菌进行了重新编程，然后进行实验室进化，以建立能够有效利用甲醇作为唯一碳源的菌株。这种合成的甲基营养菌通过插入序列 (IS) 介导的拷贝数变异 (CNV) 缓解了迄今为止未知的障碍，即 DNA-蛋白质交联 (DPC)，并通过突变平衡了代谢通量。这种合成的甲基营养菌株能够在各种甲醇浓度下以与天然甲基营养菌株相当的速度生长，说明了微生物向性变化的基因组编辑和进化，并扩大了生物 C1 转化的范围。", "titleZh": "将大肠杆菌转化为仅靠甲醇生长的合成甲基营养菌。", "translationSource": "8e1ae6f25a88aed5"}]}</script>
  <script>
    const data = JSON.parse(document.getElementById("literature-data").textContent);
    const allCategory = "全部主题";
    const allJournal = "全部期刊";
    const allYear = "全部年份";
    const state = { category: allCategory, journal: allJournal, year: allYear, query: "" };
    const els = {
      total: document.getElementById("total"),
      shown: document.getElementById("shown"),
      updated: document.getElementById("updated"),
      list: document.getElementById("list"),
      query: document.getElementById("query"),
      category: document.getElementById("category"),
      journal: document.getElementById("journal"),
      year: document.getElementById("year"),
      reset: document.getElementById("reset"),
    };
    function unique(values) { return Array.from(new Set(values)).filter(Boolean); }
    function fillSelect(el, values) {
      el.innerHTML = values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }
    function formatTime(value) {
      if (!value) return "尚未更新";
      return new Intl.DateTimeFormat("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).format(new Date(value));
    }
    function render() {
      const term = state.query.trim().toLowerCase();
      const items = data.items.filter(item => {
        const text = `${item.title} ${item.titleZh || ""} ${item.journal} ${item.doi} ${item.summaryZh} ${(item.matchedTerms || []).join(" ")}`.toLowerCase();
        return (state.category === allCategory || item.categories.includes(state.category))
          && (state.journal === allJournal || item.journal === state.journal)
          && (state.year === allYear || String(item.year) === state.year)
          && (!term || text.includes(term));
      });
      els.shown.textContent = items.length;
      els.list.innerHTML = items.length ? items.map(renderItem).join("") : `<div class="empty">没有匹配的文献。可以放宽主题、期刊或年份筛选。</div>`;
    }
    function renderItem(item) {
      const chips = [...item.categories.map(name => `<span class="chip">${escapeHtml(name)}</span>`), `<span class="chip muted">${item.year}</span>`, `<span class="chip muted">${escapeHtml(item.journal)}</span>`].join("");
      return `<article>
        <div class="article-head">
          <div><div class="chips">${chips}</div><h2>${escapeHtml(item.title)}</h2><p class="title-zh">${escapeHtml(item.titleZh || "中文题名待翻译")}</p></div>
          <div class="links"><a href="${escapeHtml(item.doiUrl)}" target="_blank" rel="noreferrer">DOI</a><a href="${escapeHtml(item.pubmedUrl)}" target="_blank" rel="noreferrer">PubMed</a></div>
        </div>
        <dl>
          <div><dt>DOI</dt><dd>${escapeHtml(item.doi)}</dd></div>
          <div><dt>发表时间</dt><dd>${escapeHtml(item.published || item.year)}</dd></div>
          <div><dt>命中词</dt><dd>${escapeHtml((item.matchedTerms || []).join(" / ") || "关键词复核")}</dd></div>
        </dl>
        <div class="body">
          <section><h3>纳入标准</h3><p>${escapeHtml(item.standard)}</p></section>
          <section><h3>摘要中文翻译</h3><p>${escapeHtml(item.summaryZh || "中文摘要待翻译")}</p></section>
        </div>
      </article>`;
    }
    fillSelect(els.category, [allCategory, ...unique(data.items.flatMap(item => item.categories)).sort()]);
    fillSelect(els.journal, [allJournal, ...unique(data.items.map(item => item.journal)).sort()]);
    fillSelect(els.year, [allYear, ...unique(data.items.map(item => String(item.year))).sort().reverse()]);
    els.total.textContent = data.items.length;
    els.updated.textContent = formatTime(data.updatedAt);
    els.query.addEventListener("input", event => { state.query = event.target.value; render(); });
    els.category.addEventListener("change", event => { state.category = event.target.value; render(); });
    els.journal.addEventListener("change", event => { state.journal = event.target.value; render(); });
    els.year.addEventListener("change", event => { state.year = event.target.value; render(); });
    els.reset.addEventListener("click", () => {
      state.category = allCategory; state.journal = allJournal; state.year = allYear; state.query = "";
      els.query.value = ""; els.category.value = allCategory; els.journal.value = allJournal; els.year.value = allYear;
      render();
    });
    render();
  </script>
</body>
</html>
